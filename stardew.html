<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Journalism Valley — Investigative Farming | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #170f08;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      background:
        radial-gradient(circle at 25% 15%, rgba(150, 110, 50, .14), transparent 50%),
        radial-gradient(circle at 75% 85%, rgba(70, 130, 60, .12), transparent 50%),
        #170f08;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw - 16px, 168vh - 290px, 760px);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 6px solid #2c2014;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .65), inset 0 0 16px rgba(0, 0, 0, .8);
    }

    canvas#screen {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    /* ===== controls below the screen (never over the image) ===== */
    .pad {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(100vw - 16px, 760px);
      padding: 10px 14px;
      background: #221709;
      border: 2px solid #3c2c16;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
    }

    .dpad {
      position: relative;
      width: 108px;
      height: 108px;
      flex: 0 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #4a3820;
      border: 2px solid #66502e;
      color: #e0cb9a;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .dpad button:active { background: #6e5630; }
    .dpad .up { top: 0; left: 36px; }
    .dpad .down { bottom: 0; left: 36px; }
    .dpad .left { top: 36px; left: 0; }
    .dpad .right { top: 36px; right: 0; }
    .dpad .mid { top: 36px; left: 36px; background: #32250f; border-color: #32250f; pointer-events: none; border-radius: 4px; }

    .pad-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      color: #f0dfae;
      background: #44351c;
      border: 2px solid #6e5830;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill-btn:active { background: #6e5630; }

    .key-hint {
      font-size: 7px;
      line-height: 1.7;
      color: #8a774e;
      text-align: center;
    }

    .ab {
      position: relative;
      width: 116px;
      height: 96px;
      flex: 0 0 auto;
    }

    .ab button {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      border: 0;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .45);
      touch-action: none;
    }

    .ab button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, .45); }
    .ab .a { right: 0; top: 0; background: #4e8a38; border: 2px solid #7ab85c; }
    .ab .b { left: 0; bottom: 0; background: #9c5230; border: 2px solid #c87c50; }

    .quit-link {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #9a8a64;
      text-decoration: none;
      border: 2px solid #4a3820;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(23, 15, 8, .8);
    }

    .quit-link:hover { color: #fff; border-color: #9a8a64; }

    @media (max-width: 560px) {
      body { gap: 8px; padding: 6px; }
      .pad { padding: 8px 8px; gap: 6px; }
      .dpad { width: 96px; height: 96px; }
      .dpad button { width: 32px; height: 32px; }
      .dpad .up, .dpad .down { left: 32px; }
      .dpad .mid { top: 32px; left: 32px; }
      .key-hint { display: none; }
      .ab { width: 104px; height: 88px; }
      .ab button { width: 48px; height: 48px; }
    }

    /* desktop (mouse + teclado): esconde o pad, mostra dica de teclas, tela maior */
    .kbd-bar {
      display: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      line-height: 1.8;
      color: #8d8498;
      text-align: center;
      padding: 4px 10px;
    }

    @media (hover: hover) and (pointer: fine) {
      .pad { display: none; }
      .kbd-bar { display: block; }
      .screen-wrap { width: min(100vw - 16px, 152vh - 120px, 840px); }
    }

    .quit-link {
      font-size: 9px !important;
      color: #fff !important;
      border: 2px solid #e07868 !important;
      background: rgba(192, 70, 60, .92) !important;
      border-radius: 8px !important;
      padding: 9px 13px !important;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .4);
    }
    .quit-link:hover { background: #d85848 !important; }

    .audio-ctl {
      position: fixed;
      top: 10px;
      left: 12px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(25, 22, 30, .92);
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .audio-ctl button {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      background: none;
      border: 0;
      color: #d8d0e0;
      cursor: pointer;
      line-height: 1;
    }
    .audio-ctl input[type=range] { width: 74px; accent-color: #b04a40; cursor: pointer; }
    @media (max-width: 560px) { .audio-ctl input[type=range] { width: 52px; } }
  </style>
</head>

    function makeSprite(rows, scale = 1) {
      const h = rows.length, w = Math.max(...rows.map(r => r.length));

      c.width = w * scale; c.height = h * scale;
      const x = c.getContext('2d');
      for (let j = 0; j < h; j++) for (let i = 0; i < rows[j].length; i++) {
        const col = PAL[rows[j][i]];
        if (col) { x.fillStyle = col; x.fillRect(i * scale, j * scale, scale, scale); }

      return c;
    }

    function px(x, y, w, h, col) { g.fillStyle = col; g.fillRect(x | 0, y | 0, w, h); }

    function frame9(x, y, w, h, opts = {}) {
      const bg = opts.bg || '#f8f4e4', edge = opts.edge || '#c89858', dark = opts.dark || '#6b4626';
      px(x + 2, y + 2, w - 4, h - 4, bg);
      px(x + 2, y, w - 4, 2, dark); px(x + 2, y + h - 2, w - 4, 2, dark);
      px(x, y + 2, 2, h - 4, dark); px(x + w - 2, y + 2, 2, h - 4, dark);
      px(x + 2, y + 2, w - 4, 1, edge); px(x + 2, y + h - 3, w - 4, 1, edge);
      px(x + 2, y + 2, 1, h - 4, edge); px(x + w - 3, y + 2, 1, h - 4, edge);
    }

    function text(str, x, y, col = '#303030', size = 8) {
      g.font = size + 'px "Press Start 2P"';
      g.textBaseline = 'top';
      g.fillStyle = col;
      g.fillText(str, x, y);
    }

    function textC(str, cx, y, col, size = 8) {
      g.font = size + 'px "Press Start 2P"';
      const w = g.measureText(str).width;
      text(str, Math.round(cx - w / 2), y, col, size);
    }

    function bar(x, y, w, ratio, colFull) {
      px(x - 1, y - 1, w + 2, 6, '#43301f');
      px(x, y, w, 4, '#e8e0cc');
      const col = colFull || (ratio > .5 ? '#58c858' : ratio > .25 ? '#f0c020' : '#e05038');
      px(x, y, Math.max(0, Math.round(w * ratio)), 4, col);
    }

    /* =====================================================================
       CHIPTUNE — original 8-bar loops, pure WebAudio, no samples
       ===================================================================== */
    let AC = null, musGain = null, musTimer = null, musTheme = null, musNodes = [];
    const midi = n => 440 * Math.pow(2, (n - 69) / 12);

    const THEMES = {
      farm: {
        bpm: 116, vol: .045,
        voices: [
          {
            wave: 'square', vol: .55, notes: [
              [67, .5], [69, .5], [72, 1], [67, 1], [64, 1],

              [67, .5], [69, .5], [72, 1], [74, 1], [76, 1],

              [43, 1], [50, 1], [43, 1], [50, 1],

              [55, 4],

    function ensureAC() {
      if (AC) return;
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        musGain = AC.createGain();
        musGain.gain.value = 1;
        musGain.connect(AC.destination);
      } catch (e) { AC = null; }
    }

    function noteAt(t, m, dur, wave, vol, dest) {
      const o = AC.createOscillator();
      o.type = wave; o.frequency.setValueAtTime(midi(m), t);
      const e = AC.createGain();
      e.gain.setValueAtTime(0.0001, t);
      e.gain.linearRampToValueAtTime(vol, t + .015);
      e.gain.setValueAtTime(vol, Math.max(t + .02, t + dur - .05));
      e.gain.linearRampToValueAtTime(0.0001, t + dur);
      o.connect(e); e.connect(dest);
      o.start(t); o.stop(t + dur + .03);
    }

    function stopMusic() {
      const el = document.getElementById('bgm');
      if (el) { el.pause(); el.currentTime = 0; }
      musTheme = null;
      if (musTimer) clearTimeout(musTimer);
      musTimer = null; musTheme = null;
      musNodes.forEach(n => { try { n.disconnect(); } catch (e) { } });
      musNodes = [];
    }

    const bgm = document.getElementById('bgm');
    bgm.volume = .45;

    function playTheme(name) {
      // música original do site (tema Stardew) — mesma faixa na fazenda e na caverna
      musTheme = name;
      bgm.play().catch(() => { });
    }

    function scheduleLoop(t0) {
      if (!musTheme) return;
      const th = THEMES[musTheme], spb = 60 / th.bpm;
      const gn = AC.createGain();
      gn.gain.value = th.vol;
      gn.connect(musGain);
      musNodes.push(gn);
      let dur = 0;
      for (const v of th.voices) {
        let t = t0;
        for (const [m, b] of v.notes) {
          if (m > 0) noteAt(t, m, b * spb * .92, v.wave, v.vol, gn);
          t += b * spb;
        }
        dur = Math.max(dur, t - t0);
      }
      musTimer = setTimeout(() => scheduleLoop(t0 + dur), Math.max(50, (t0 + dur - AC.currentTime) * 1000 - 250));
    }

    function playJingle() {
      if (!AC) return;
      const gn = AC.createGain(); gn.gain.value = .06; gn.connect(musGain);
      const t = AC.currentTime + .05;
      [[72, 0, .18], [76, .18, .18], [79, .36, .18], [84, .54, .5]].forEach(([m, off, d]) =>
        noteAt(t + off, m, d, 'square', .6, gn));
    }

    function sfx(m, d = .08, wave = 'square') {
      if (!AC) return;
      const gn = AC.createGain(); gn.gain.value = .04; gn.connect(musGain);
      noteAt(AC.currentTime + .01, m, d, wave, .6, gn);
    }

    /* =====================================================================
       MESSAGES / TOASTS

    function say(...pages) { game.msg = { pages, idx: 0 }; }
    function toast(txt) { game.toast = { txt, t: 0 }; }

    const SIGN_PAGES = [
      ['HOW TO GROW A STORY:', 'C or TOOL swaps tools.', 'HOE tills the plot. SEEDS', 'plant a story seed (a tip).'],
      ['CAN waters = REPORTING.', 'Water daily + sleep in bed:', '3 watered days = ripe PAUTA.', 'HAND harvests = PUBLISH!'],

      'SECRET FUND PAID FOR A PARROT',

    ];

    /* =====================================================================
       WORLD LOGIC
       ===================================================================== */
    function syncToolBtn() {
      toolBtn.textContent = 'TOOL · ' + TOOLS[game.tool];
    }

    function selectTool(i) {
      if (i === 4 && game.map !== 'cave') { toast('PICKAXE: cave only!'); return; }
      if (game.tool === i) return;
      game.tool = i;
      syncToolBtn();
      sfx(72, .05);
    }

    function cycleTool() {
      const n = game.map === 'cave' ? 5 : 4;
      game.tool = (game.tool + 1) % n;
      syncToolBtn();
      sfx(72, .05);
    }

    function spendEnergy(cost) {
      if (game.energy < cost) {
        say(['You are out of energy.', 'Even the coffee judges you.', 'Crawl into bed and sleep.']);
        return false;
      }
      game.energy -= cost;
      return true;
    }

    function facingTile() {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[game.dir];
      return { x: game.px + d[0], y: game.py + d[1] };
    }

    function collectItem(it) {
      game.items = game.items.filter(i => i !== it);
      sfx(79, .07);
      if (it.type === 'coffee') {
        game.energy = Math.min(ENERGY_MAX, game.energy + 25);
        toast('HOT COFFEE +25 ENERGY');
        saveGame();
        return;
      }
      game.inv[it.type] = (game.inv[it.type] || 0) + 1;
      if (it.type === 'doc' || it.type === 'lead') game.leads++;
      const PICK_MSG = {
        doc: 'LEAKED MEMO. SPICY.',
        lead: 'HOT TIP: FOLLOW THE MONEY',
        photo: 'OLD PHOTO! ARCHIVE GOLD',
        scoop: 'MUSHROOM SCOOP. EARTHY.'
      };
      toast((PICK_MSG[it.type] || ITEMS[it.type].name) + ' (BAGGED)');
      saveGame();
    }

    function useTool() {
      const f = facingTile(), key = f.x + ',' + f.y;
      const tool = TOOLS[game.tool];
      const base = tileAt(f.x, f.y);
      const obj = objAt(f.x, f.y);
      const cell = game.farm[key];

      if (tool === 'HOE') {
        if (game.map !== 'farm' || base !== 'soil') return toast("CAN'T TILL THAT");
        if (cell && cell.tilled) return toast('ALREADY TILLED');
        if (!spendEnergy(COST.till)) return;
        game.farm[key] = { tilled: true, wet: false, crop: null };
        sfx(50, .07, 'triangle');
        toast('PLOT OPENED. PITCH IT!');
        saveGame();
      } else if (tool === 'SEEDS') {
        if (!cell || !cell.tilled) return toast('TILL THE SOIL FIRST');
        if (cell.crop) return toast('ALREADY PLANTED');
        if (!(game.inv.seed > 0)) return toast('NO SEEDS! BUY AT THE STAND');
        game.inv.seed--;
        if (game.inv.fertilizer > 0) {
          game.inv.fertilizer--;
          cell.crop = { stage: 1, watered: cell.wet };
          sfx(64, .06);
          toast('PLANTED + FERTILIZED!');
        } else {
          cell.crop = { stage: 0, watered: cell.wet };
          sfx(64, .06);
          toast('STORY SEED PLANTED (' + game.inv.seed + ' LEFT)');
        }
        saveGame();
      } else if (tool === 'CAN') {
        if (!cell || !cell.tilled) return toast('NOTHING TO WATER');
        if (cell.wet) return toast('ALREADY REPORTED TODAY');
        if (!spendEnergy(COST.water)) return;
        cell.wet = true;
        if (cell.crop) cell.crop.watered = true;
        sfx(60, .09, 'triangle');
        toast('WATERED = REPORTING DONE');
        saveGame();
      } else if (tool === 'HAND') {
        if (cell && cell.crop && cell.crop.stage >= 3) {
          delete game.farm[key];
          game.published++;
          let pay = PUBLISH_PAY;
          let payLine = 'Editor wires ' + pay + 'g. Nice.';
          if (game.luckyPen) {
            pay *= 2; game.luckyPen = false;
            payLine = 'LUCKY PEN! Editor wires ' + pay + 'g!';
          }
          game.gold += pay;
          playJingle();
          say(['EXTRA! EXTRA! You publish:', '"' + HEADLINES[(game.published - 1) % HEADLINES.length] + '"', payLine, '(' + game.published + '/4 front pages)']);
          saveGame();
          return;
        }
        if (obj === 'stone') {
          if (!spendEnergy(COST.stone)) return;
          delete game.objs.farm[key];
          sfx(45, .08, 'triangle');
          toast('STONE CLEARED');
          saveGame();
          return;
        }
        if (obj === 'branch') {
          if (!spendEnergy(COST.branch)) return;
          delete game.objs.farm[key];
          sfx(52, .07, 'triangle');
          toast('BRANCH CLEARED');
          saveGame();
          return;
        }
        const it = itemAt(f.x, f.y) || itemAt(game.px, game.py);
        if (it) return collectItem(it);
        toast('NOTHING TO GRAB');
      } else if (tool === 'PICKAXE') {
        if (game.map !== 'cave') return toast('ONLY IN THE ARCHIVE');
        if (obj !== 'rock') return toast('SWING AT A ROCK');
        if (!spendEnergy(COST.rock)) return;
        delete game.objs.cave[key];
        sfx(43, .1, 'square');
        if (game.rareRocks[key]) {
          delete game.rareRocks[key];
          game.rareDocs++;
          playJingle();
          say(['RARE DOCUMENT ' + game.rareDocs + '/3!', RARE_FLAVOR[(game.rareDocs - 1) % 3], 'The archive remembers.']);
        } else if (Math.random() < .35) {
          game.inv.ore = (game.inv.ore || 0) + 1;
          toast('ORE CHUNK! (SELLS FOR 45g)');
        } else {
          toast('JUST GRAVEL AND REGRET');
        }
        saveGame();
      }
    }

    function interact() {
      /* A button: collect > talk to things > use tool */
      const it = itemAt(game.px, game.py) || (() => { const f = facingTile(); return itemAt(f.x, f.y); })();
      if (it) return collectItem(it);

      const f = facingTile(), t = tileAt(f.x, f.y);
      if (t === 'sign') return say(...SIGN_PAGES);
      if (t === 'mailbox') return say(MAIL[(game.day - 1) % MAIL.length]);
      if (t === 'door') {
        game.confirm = { lines: ['Crawl into bed and sleep', 'until tomorrow?'], yes: startSleep };
        return;
      }
      if (t === 'water') return say(['The pond is calm.', 'Somewhere down there:', 'an off-the-record fish.']);
      if (t === 'shop') return openShop();
      if (t === 'cavemouth') return enterCave();
      useTool();
    }

    function startSleep() {
      game.confirm = null;
      game.sleeping = { t: 0, advanced: false };
    }

    function advanceDay() {
      game.day++;
      game.energy = ENERGY_MAX;
      for (const k in game.farm) {
        const c = game.farm[k];
        if (c.crop && c.crop.watered && c.crop.stage < 3) c.crop.stage++;
        if (c.crop) c.crop.watered = false;
        c.wet = false;
      }
      /* fresh forage: yesterday's leftovers vanish, new random haul appears */
      game.items = [];
      spawnItems(2 + Math.floor(Math.random() * 3));
      saveGame();
    }

    function spawnItems(n) {
      let guard = 200;
      while (n > 0 && guard-- > 0) {
        const x = 1 + Math.floor(Math.random() * (MAPW - 2));
        const y = 1 + Math.floor(Math.random() * (MAPH - 2));
        if (tileAt(x, y, 'farm') !== 'grass') continue;
        if (game.objs.farm[x + ',' + y]) continue;
        if (game.items.some(i => i.x === x && i.y === y)) continue;
        if (game.map === 'farm' && x === game.px && y === game.py) continue;
        const r = Math.random();
        const type = r < .08 ? 'photo' : r < .3 ? 'doc' : r < .5 ? 'lead' : r < .72 ? 'scoop' : 'coffee';
        game.items.push({ x, y, type });
        n--;
      }
    }

    /* =====================================================================
       SHOP & BAG
       ===================================================================== */
    function openShop() {
      game.shop = { tab: 0, sel: 0 };
      sfx(76, .06);
    }

    /* daily rotating stock: 3-4 items, deterministic by day number */
    function shopStock() {
      const pool = ['seed', 'coffee', 'energybar', 'luckypen', 'fertilizer'];
      const n = 3 + (game.day % 2);
      const out = ['seed'];
      for (let i = 0; i < n; i++) out.push(pool[(game.day * 2 + i) % pool.length]);
      return out.filter((id, i) => i === out.indexOf(id)).slice(0, n);
    }

    const sellList = () => Object.keys(ITEMS).filter(k => game.inv[k] > 0);

    function buyItem(id) {
      const price = BUY_PRICE[id];
      if (game.gold < price) { sfx(40, .08); return toast('NOT ENOUGH GOLD'); }
      if (id === 'luckypen' && game.luckyPen) return toast('PEN ALREADY INKED');
      game.gold -= price;
      sfx(88, .06);
      if (id === 'coffee') {
        game.energy = Math.min(ENERGY_MAX, game.energy + 25);
        toast('COFFEE! +25 ENERGY');
      } else if (id === 'energybar') {
        game.energy = Math.min(ENERGY_MAX, game.energy + 50);
        toast('ENERGY BAR! +50 ENERGY');
      } else if (id === 'luckypen') {
        game.luckyPen = true;
        toast('LUCKY PEN: NEXT STORY x2');
      } else {
        game.inv[id] = (game.inv[id] || 0) + 1;
        toast('BOUGHT ' + ITEMS[id].name);
      }
      saveGame();
    }

    function sellItem(id) {
      if (!(game.inv[id] > 0)) return;
      game.inv[id]--;
      game.gold += ITEMS[id].sell;
      sfx(83, .06);
      toast('SOLD ' + ITEMS[id].name + ' +' + ITEMS[id].sell + 'g');
      saveGame();
    }

    function updateShop() {
      const p = popPress();
      if (!p) return;
      const s = game.shop;
      const list = s.tab === 0 ? shopStock() : sellList();
      if (isB(p) || p === 'bag') { game.shop = null; sfx(60, .05); return; }
      if (p === 'left' || p === 'right') { s.tab ^= 1; s.sel = 0; sfx(72, .04); return; }
      if (p && p.act === 'shoptab') { s.tab = p.data; s.sel = 0; sfx(72, .04); return; }
      if (p === 'up') { s.sel = Math.max(0, s.sel - 1); return; }
      if (p === 'down') { s.sel = Math.min(Math.max(0, list.length - 1), s.sel + 1); return; }
      if (p && p.act === 'shoprow') {
        const id = list[p.data];
        if (!id) return;
        s.sel = p.data;
        s.tab === 0 ? buyItem(id) : sellItem(id);
        s.sel = Math.min(s.sel, Math.max(0, (s.tab === 0 ? shopStock() : sellList()).length - 1));
        return;
      }
      if (p === 'A') { // keyboard Z only; canvas taps hit shop zones
        const id = list[s.sel];
        if (!id) return toast(s.tab === 0 ? 'SOLD OUT TODAY' : 'BAG IS EMPTY');
        s.tab === 0 ? buyItem(id) : sellItem(id);
        s.sel = Math.min(s.sel, Math.max(0, (s.tab === 0 ? shopStock() : sellList()).length - 1));
      }
    }

    function updateBag() {
      const p = popPress();
      if (!p) return;
      if (isB(p) || isA(p) || p === 'bag') { game.bag = false; sfx(60, .05); }
    }

    function enterCave() {
      game.map = 'cave';
      game.px = 12; game.py = 12; game.fromX = 12; game.fromY = 12;
      game.moving = false; game.dir = 'up';
      game.tool = 4; syncToolBtn();
      playTheme('cave');
      if (!game.caveVisited) {
        game.caveVisited = true;
        say(
          ['THE DEAD ARCHIVE.', 'Dust. Boxes. Cold coffee', 'from 1994. You grab an old', 'PICKAXE off a shelf.'],
          ['PICKAXE added as 5th tool.', 'Crack the rocks: 3 RARE', 'DOCUMENTS are buried here.', 'Each swing costs energy!']
        );
      }
      saveGame();
    }

    function exitCave() {
      game.map = 'farm';
      game.px = 12; game.py = 2; game.fromX = 12; game.fromY = 2;
      game.moving = false; game.dir = 'down';
      if (game.tool === 4) { game.tool = 3; syncToolBtn(); }
      playTheme('farm');
      saveGame();
    }

    function tryMove(dx, dy, dir) {
      game.dir = dir;
      const nx = game.px + dx, ny = game.py + dy;
      if (SOLID[tileAt(nx, ny)] || objAt(nx, ny)) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
    }

    function finishStep() {
      game.step++;
      const t = tileAt(game.px, game.py);
      if (game.map === 'farm' && t === 'cavemouth') enterCave();
      else if (game.map === 'cave' && t === 'ladder') exitCave();
      saveGame();
    }

    function updateWorld(dt) {
      if (game.sleeping) {
        const s = game.sleeping;
        s.t += dt * .9;
        if (s.t >= 1 && !s.advanced) { s.advanced = true; advanceDay(); }
        if (s.t >= 2) {
          game.sleeping = null;
          toast('DAY ' + game.day + '. CROPS GREW. GO!');
        }
        return;
      }

      if (game.shop) { updateShop(); return; }
      if (game.bag) { updateBag(); return; }

      if (!game.won && game.published >= 4 && game.rareDocs >= 3 && !game.msg && !game.confirm) {
        game.won = true;
        game.state = 'win';
        game.winT = 0; game.winSel = 0;
        stopMusic();
        playJingle();
        clearSave();
        return;
      }

      if (game.msg) {
        const p = popPress();
        if (isA(p) || isB(p)) {
          game.msg.idx++;
          if (game.msg.idx >= game.msg.pages.length) game.msg = null;
        }
        return;
      }

      if (game.confirm) {
        const p = popPress();
        if (p && p.act === 'yes') { const y = game.confirm.yes; game.confirm = null; y(); }
        else if (p && p.act === 'no') game.confirm = null;
        else if (isA(p)) { const y = game.confirm.yes; game.confirm = null; y(); }
        else if (isB(p)) game.confirm = null;
        return;
      }

      const p = popPress();
      if (isTool(p)) cycleTool();
      else if (p === 'bag' || (p && p.act === 'bag')) { game.bag = true; sfx(76, .05); }
      else if (p && p.act === 'toolslot') selectTool(p.data);
      else if (typeof p === 'string' && p.length === 2 && p[0] === 't') selectTool(+p[1]);
      else if (isA(p)) interact();

      if (game.moving) {
        game.moveT += dt * 5.2;
        if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
      } else {
        if (keys.up) tryMove(0, -1, 'up');
        else if (keys.down) tryMove(0, 1, 'down');
        else if (keys.left) tryMove(-1, 0, 'left');
        else if (keys.right) tryMove(1, 0, 'right');
      }

      if (game.toast) { game.toast.t += dt; if (game.toast.t > 1.3) game.toast = null; }
    }

    /* =====================================================================
       WORLD DRAW
       ===================================================================== */
    function drawWorld() {
      zones = [];
      const lerp = game.moving ? game.moveT : 1;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const animFrame = Math.floor(game.animClock * 1.6) % 2;
      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++) {
          let t = tileAt(i, j);
          if (t === 'water' && animFrame) t = 'water2';
          else if (t === 'flower' && animFrame) t = 'flower2';
          else if (t === 'grass' && ((i * 7 + j * 13) % 5 === 0)) t = 'grass2';
          const key = i + ',' + j;
          if (t === 'soil' && game.farm[key] && game.farm[key].tilled)
            t = game.farm[key].wet ? 'tilledwet' : 'tilled';
          g.drawImage(TILES[t], i * T - camX, j * T - camY);

          const cell = game.farm[key];
          if (game.map === 'farm' && cell && cell.crop)
            g.drawImage(CROPS[cell.crop.stage], i * T - camX, j * T - camY);

          const obj = game.objs[game.map][key];
          if (obj) {
            g.drawImage(OBJS[obj], i * T - camX, j * T - camY);
            if (obj === 'rock' && game.rareRocks[key] && (game.animClock * 2 + i) % 3 < .4) {
              px(i * T - camX + 4 + (i % 5), j * T - camY + 4 + (j % 4), 1, 1, '#f6e294');
              px(i * T - camX + 10 - (j % 3), j * T - camY + 8, 1, 1, '#ffffff');
            }
          }
        }

      if (game.map === 'farm') {
        for (const it of game.items) {
          const bob = Math.sin(game.animClock * 3 + it.x) * 1.5;
          g.drawImage(OBJS[it.type], it.x * T - camX, it.y * T - camY + bob - 2);
        }
      }

      /* player: stepA -> stand -> stepB -> stand (same cycle as pokemon.html) */
      const dirFrames = SPR.player[game.dir];
      const seq = [1, 0, 3, 0];
      const phase = Math.floor((game.step + (game.moving ? game.moveT : 0)) * 2) % 4;
      const frame = game.moving ? dirFrames[seq[phase]] : dirFrames[0];
      g.drawImage(frame, Math.round(wx - camX + 1), Math.round(wy - camY - 4));

      /* dusk overlay: the day grows old as your energy burns */
      if (game.map === 'farm') {
        const a = 1 - game.energy / ENERGY_MAX;
        if (a > .02) {
          px(0, 0, 256, 192, 'rgba(244,128,38,' + (a * .22).toFixed(3) + ')');
          px(0, 0, 256, 192, 'rgba(38,26,88,' + (a * .26).toFixed(3) + ')');
        }
      } else {
        px(0, 0, 256, 192, 'rgba(12,6,22,.22)');
      }

      /* HUD */
      frame9(2, 2, 170, 30, { bg: 'rgba(248,244,228,.95)' });
      text('DAY ' + game.day + '  NEWS ' + game.published + '/4  DOC ' + game.rareDocs + '/3', 8, 7, '#5b4226', 6);
      text('E', 8, 18, '#9c5230', 6);
      bar(17, 19, 56, game.energy / ENERGY_MAX);
      text(TOOLS[game.tool], 80, 18, '#3f6d3b', 6);
      text(game.gold + 'g', 130, 18, '#a87818', 6);
      zone(2, 2, 170, 30, 'tool');

      /* BAG chip (tap or press I) */
      frame9(214, 2, 40, 15, { bg: 'rgba(248,244,228,.95)' });
      text('BAG', 224, 7, '#5b4226', 6);
      zone(214, 2, 40, 15, 'bag');

      /* toolbar estilo Stardew (embaixo, sprites; nome acima do slot escolhido) */
      const nTools = game.map === 'cave' ? 5 : 4;
      const tbW = nTools * 21 + 3, tbX = Math.round(128 - tbW / 2), tbY = 168;
      px(tbX - 2, tbY - 2, tbW + 4, 26, 'rgba(43,29,18,.85)');
      for (let i = 0; i < nTools; i++) {
        const x = tbX + 2 + i * 21, y = tbY;
        const sel = game.tool === i;
        px(x, y, 20, 20, sel ? '#f6e294' : '#d9b061');
        const bc = sel ? '#c25043' : '#5b4226';
        px(x, y, 20, 1, bc); px(x, y + 19, 20, 1, bc);
        px(x, y, 1, 20, bc); px(x + 19, y, 1, 20, bc);
        if (sel) {
          px(x + 1, y + 1, 18, 1, '#e2796a'); px(x + 1, y + 18, 18, 1, '#e2796a');
          px(x + 1, y + 1, 1, 18, '#e2796a'); px(x + 18, y + 1, 1, 18, '#e2796a');
        }
        g.drawImage(TOOL_ICONS[i], x + 3, y + 3);
        text(String(i + 1), x + 14, y + 13, 'rgba(91,66,38,.75)', 5);
        zone(x, y, 20, 20, 'toolslot', i);
      }
      {
        const sel = game.tool;
        if (sel < nTools) {
          g.font = '6px "Press Start 2P"';
          const nm = TOOLS[sel];
          const w = g.measureText(nm).width + 10;
          const lx = Math.round(tbX + 2 + sel * 21 + 10 - w / 2);
          px(lx, tbY - 13, w, 11, 'rgba(43,29,18,.85)');
          text(nm, lx + 5, tbY - 10, '#f6e294', 6);
        }
      }

      if (game.toast) {
        /* aviso discreto no canto, fora do centro da ação */
        const a = game.toast.t > .9 ? 1 - (game.toast.t - .9) / .4 : 1;
        g.globalAlpha = Math.max(0, Math.min(1, a)) * .92;
        g.font = '5px "Press Start 2P"';
        const w = g.measureText(game.toast.txt).width + 10;
        px(Math.round(252 - w), 34, Math.round(w), 12, 'rgba(43,29,18,.88)');
        text(game.toast.txt, Math.round(257 - w), 38, '#f6e294', 5);
        g.globalAlpha = 1;
      }

      if (game.msg) {
        frame9(4, 138, 248, 50);
        game.msg.pages[game.msg.idx].forEach((l, i) => text(l, 12, 145 + i * 11, '#3a2c18', 7));
        text('▼', 240, 178, '#c25043', 7);
        zone(0, 0, 256, 192, 'A');
      } else if (game.confirm) {
        frame9(28, 70, 200, 56);
        game.confirm.lines.forEach((l, i) => text(l, 38, 78 + i * 11, '#3a2c18', 7));
        frame9(48, 100, 70, 18, { bg: '#4e8a38', edge: '#7ab85c', dark: '#2c5420' });
        textC('A: YES', 83, 106, '#ffffff', 6);
        zone(48, 100, 70, 18, 'yes');
        frame9(138, 100, 70, 18, { bg: '#9c5230', edge: '#c87c50', dark: '#5c2c14' });
        textC('B: NO', 173, 106, '#ffffff', 6);
        zone(138, 100, 70, 18, 'no');
      }

      if (game.shop) drawShop();
      else if (game.bag) drawBag();

      if (game.sleeping) {
        const t = game.sleeping.t;
        const a = t < 1 ? t : 2 - t;
        px(0, 0, 256, 192, 'rgba(8,4,16,' + Math.min(1, a * 1.2).toFixed(3) + ')');
        if (t > .5 && t < 1.5) {
          textC('DAY ' + game.day, 128, 84, '#f6e294', 10);
          textC('zZz...', 128, 102, '#9a8a64', 7);
        }
      }
    }

    /* ---------- shop panel ---------- */
    function drawShop() {
      zones = [];                    // shop owns the whole screen
      const s = game.shop;
      frame9(12, 6, 232, 180);
      text("MIRNA'S NEWSSTAND", 22, 13, '#5b4226', 7);
      {
        g.font = '7px "Press Start 2P"';
        const gs = game.gold + 'g';
        text(gs, Math.round(234 - g.measureText(gs).width), 13, '#a87818', 7);
      }
      /* tabs */
      const tabs = ['BUY', 'SELL'];
      for (let i = 0; i < 2; i++) {
        const tx = 22 + i * 60, on = s.tab === i;
        frame9(tx, 25, 52, 15, on ? { bg: '#c25043', edge: '#e2796a', dark: '#5c2014' } : { bg: '#d9b061', edge: '#e8d098', dark: '#6b4626' });
        textC(tabs[i], tx + 26, 30, on ? '#ffffff' : '#5b4226', 6);
        zone(tx, 25, 52, 15, 'shoptab', i);
      }
      const list = s.tab === 0 ? shopStock() : sellList();
      s.sel = Math.min(s.sel, Math.max(0, list.length - 1));
      if (!list.length) {
        textC(s.tab === 0 ? 'SOLD OUT. COME BACK TOMORROW.' : 'YOUR BAG IS EMPTY.', 128, 90, '#8a6a44', 6);
      }
      const rowH = 17, y0 = 46;
      list.slice(0, 7).forEach((id, i) => {
        const ry = y0 + i * rowH, sel = i === s.sel;
        if (sel) px(20, ry - 1, 216, rowH - 1, '#f0e0b0');
        g.drawImage(OBJS[ITEMS[id].icon], 22, ry - 1);
        text(ITEMS[id].name, 42, ry + 4, sel ? '#3a2c18' : '#6b5638', 6);
        if (s.tab === 0) {
          text(BUY_BLURB[id], 42, ry + 11, '#9a8a64', 5);
          const pr = BUY_PRICE[id] + 'g';
          g.font = '6px "Press Start 2P"';
          text(pr, Math.round(232 - g.measureText(pr).width), ry + 4, game.gold >= BUY_PRICE[id] ? '#3f6d3b' : '#c25043', 6);
        } else {
          text('x' + game.inv[id], 42, ry + 11, '#9a8a64', 5);
          const pr = '+' + ITEMS[id].sell + 'g';
          g.font = '6px "Press Start 2P"';
          text(pr, Math.round(232 - g.measureText(pr).width), ry + 4, '#3f6d3b', 6);
        }
        zone(20, ry - 1, 216, rowH, 'shoprow', i);
      });
      textC(s.tab === 0 ? 'Z BUY · ←→ TAB · X CLOSE' : 'Z SELL · ←→ TAB · X CLOSE', 128, 174, '#8a6a44', 5);
      zone(0, 0, 256, 192, 'noop'); // swallow stray taps
    }

    /* ---------- bag panel: inventory + goals ---------- */
    function drawBag() {
      zones = [];
      frame9(12, 6, 232, 180);
      text('REPORTER BAG', 22, 13, '#5b4226', 7);
      {
        g.font = '7px "Press Start 2P"';
        const gs = game.gold + 'g';
        text(gs, Math.round(234 - g.measureText(gs).width), 13, '#a87818', 7);
      }
      px(20, 24, 216, 1, '#c89858');
      const list = sellList();
      if (!list.length) textC('Empty. Even the lint quit.', 128, 50, '#8a6a44', 6);
      list.slice(0, 12).forEach((id, i) => {
        const col = i % 2, row = Math.floor(i / 2);
        const ix = 22 + col * 110, iy = 29 + row * 16;
        g.drawImage(OBJS[ITEMS[id].icon], ix, iy - 2);
        text(ITEMS[id].name, ix + 18, iy + 1, '#3a2c18', 5);
        text('x' + game.inv[id] + ' · ' + ITEMS[id].sell + 'g', ix + 18, iy + 8, '#9a8a64', 5);
      });
      if (game.luckyPen) text('LUCKY PEN INKED: NEXT STORY x2', 22, 126, '#3f7fae', 5);
      px(20, 134, 216, 1, '#c89858');
      text('GOAL: PUBLISH 4 FRONT PAGES +', 22, 140, '#8f3328', 6);
      text('DIG 3 RARE DOCS IN THE CAVE', 22, 149, '#8f3328', 6);
      text('NEWS ' + game.published + '/4   DOCS ' + game.rareDocs + '/3   LEADS ' + game.leads, 22, 160, '#3f6d3b', 6);
      textC('I / X CLOSE', 128, 174, '#8a6a44', 5);
      zone(0, 0, 256, 192, 'B');
    }

    /* =====================================================================
       TITLE & WIN
       ===================================================================== */
    function drawTitle(dt) {
      zones = [];
      game.titleT += dt;
      const grad = g.createLinearGradient(0, 0, 0, 192);
      grad.addColorStop(0, '#2c4a6e'); grad.addColorStop(.5, '#7a5a36');
      grad.addColorStop(.78, '#5d9448'); grad.addColorStop(1, '#3f6d3b');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 192);

      /* setting sun, low on the horizon */
      g.fillStyle = '#f0b264'; g.beginPath(); g.arc(226, 146, 15, 0, 7); g.fill();
      g.fillStyle = '#f6e294'; g.beginPath(); g.arc(226, 146, 10, 0, 7); g.fill();

      for (let i = 0; i < 16; i++) g.drawImage(TILES.grass, i * 16, 176);
      g.drawImage(TILES.soil, 32, 176);
      g.drawImage(TILES.tilled, 48, 176);
      g.drawImage(TILES.tilled, 64, 176); g.drawImage(CROPS[3], 64, 160);
      g.drawImage(TILES.tilled, 80, 176); g.drawImage(CROPS[1], 80, 172);
      g.drawImage(TILES.flower, 176, 176);
      g.drawImage(TILES.fence, 208, 176); g.drawImage(TILES.fence, 224, 176); g.drawImage(TILES.fence, 240, 176);

      const wf = Math.floor(game.titleT * 3) % 4;
      g.drawImage(SPR.player.right[[1, 0, 3, 0][wf]], 116, 156);

      /* big-art portrait, title screen only */
      if (imgAvatar.complete && imgAvatar.naturalWidth) {
        frame9(6, 118, 56, 56, { bg: '#2b1d12', edge: '#c89858', dark: '#43301f' });
        g.imageSmoothingEnabled = true;
        g.drawImage(imgAvatar, 10, 122, 48, 48);
        g.imageSmoothingEnabled = false;
      }

      textC('JOURNALISM VALLEY', 129, 25, '#2b1d12', 14);
      textC('JOURNALISM VALLEY', 128, 24, '#f6e294', 14);
      textC('the farm where stories grow', 128, 48, '#f8f4e4', 6);
      px(48, 62, 160, 1, '#c89858');
      textC('till leads - water with facts', 128, 70, '#e0cb9a', 6);
      textC('harvest 4 front pages + dig', 128, 81, '#e0cb9a', 6);
      textC('3 rare docs from the archive', 128, 92, '#e0cb9a', 6);
      if (Math.floor(game.titleT * 2) % 2) textC('- PRESS A TO START -', 128, 112, '#ffffff', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateTitle() {
      const p = popPress();
      if (!p) return;
      ensureAC();
      playTheme('farm');
      game.state = 'world';
      syncToolBtn();
      saveGame();
      if (!introShown) {
        introShown = true;
        say(
          ['Welcome to JOURNALISM VALLEY!', 'Grow stories like crops:', 'till a plot, plant a tip,', 'water it with facts daily.'],
          ['Swap tools on the bar below', '(tap a slot, C key or 1-5).', 'Sleep in bed to grow watered', 'crops and refill energy.'],
          ['Each published story pays', "120g. Spend it at MIRNA'S", 'NEWSSTAND by the house -', 'stock rotates every day.'],
          ['Press I (or the BAG button)', 'for your inventory, gold and', 'goals. You start with 3 story', 'seeds. Yes, only 3. Budget!'],
          ['GOAL: publish 4 front pages', 'and dig 3 rare documents in', 'the DEAD ARCHIVE cave up', 'north. Coffee helps. Go!']
        );
      }
    }

    function leaveWin() {
      game.state = 'world';
      playTheme(game.map === 'cave' ? 'cave' : 'farm');
    }

    function drawWin(dt) {
      zones = [];
      game.winT += dt;
      px(0, 0, 256, 192, '#f8f4e4');
      px(0, 0, 256, 34, '#2b1d12');
      textC('THE JOURNALISM VALLEY TRIBUNE', 128, 7, '#f8f4e4', 8);
      textC('harvest edition - day ' + game.day, 128, 21, '#c8b890', 6);

      textC('FRONT PAGE!', 128, 42, Math.floor(game.winT * 2) % 2 ? '#c25043' : '#8f3328', 14);

      px(20, 62, 216, 1, '#9a8a64');
      textC('Reporter-farmer L. TOLEDO grows', 128, 68, '#43301f', 5);
      textC('4 stories from seed and digs 3', 128, 77, '#43301f', 5);
      textC('rare documents out of the archive.', 128, 86, '#43301f', 5);
      textC('Sources: ' + game.leads + ' leads. Editor: "fine."', 128, 95, '#8a6a44', 5);
      px(20, 106, 216, 1, '#9a8a64');

      if (imgPaper.complete && imgPaper.naturalWidth) {
        g.imageSmoothingEnabled = true;
        g.drawImage(imgPaper, 18, 112, 42, 42);
        g.drawImage(imgPaper, 196, 112, 42, 42);
        g.imageSmoothingEnabled = false;
      }
      g.drawImage(CROPS[3], 72, 122);
      g.drawImage(OBJS.doc, 104, 122);
      g.drawImage(OBJS.coffee, 136, 122);
      g.drawImage(CROPS[3], 168, 122);

      textC(game.winSel === 0 ? '> back to the homepage <' : '> keep farming stories <', 128, 154, '#8a6a44', 5);
      const selA = game.winSel === 0, selB = game.winSel === 1;
      frame9(24, 164, 120, 22, { bg: selA ? '#c25043' : '#9c5230', edge: selA ? '#e2796a' : '#b06a40', dark: '#5c2014' });
      textC('EXIT TO SITE', 84, 172, '#ffffff', 6);
      zone(24, 164, 120, 22, 'win', 'exit');
      frame9(156, 164, 76, 22, { bg: selB ? '#4e8a38' : '#3f6d3b', edge: selB ? '#7ab85c' : '#5a8a4c', dark: '#234018' });
      textC('PLAY ON', 194, 172, '#ffffff', 6);
      zone(156, 164, 76, 22, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      if (!p) return;
      if (p === 'left' || p === 'right') { game.winSel ^= 1; return; }
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else leaveWin();
        return;
      }
      if (isA(p)) {
        if (game.winSel === 0) window.location.href = 'index.html';
        else leaveWin();
        return;
      }
      if (isB(p)) leaveWin();
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    if (!loadGame()) spawnItems(3);
    syncToolBtn();

    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      game.animClock += dt;
      g.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); if (game.state === 'title') drawTitle(dt); else drawWorld(); }
      else if (game.state === 'world') { updateWorld(dt); if (game.state === 'world') drawWorld(); else drawWin(dt); }
      else if (game.state === 'win') { updateWin(); if (game.state === 'win') drawWin(dt); else drawWorld(); }

      requestAnimationFrame(loop);
    }

    Promise.race([
      document.fonts.load('8px "Press Start 2P"'),
      new Promise(r => setTimeout(r, 1200))
    ]).then(() => requestAnimationFrame(loop));

    /* =====================================================================
       TEST HOOKS
       ===================================================================== */

    /* ---------- volume master (persistido entre os jogos) ---------- */
    (function () {
      const volRange = document.getElementById('volRange');
      const muteBtn = document.getElementById('muteBtn');
      let masterVol = parseFloat(localStorage.getItem('lft_game_vol') || '.6');
      let muted = localStorage.getItem('lft_game_mute') === '1';
      window.__applyVol = function () {
        const v = muted ? 0 : masterVol;
        const el = document.getElementById('bgm');
        if (el) el.volume = .75 * v;
        if (typeof musGain !== 'undefined' && musGain) musGain.gain.value = v * 1.4;
        volRange.value = Math.round(masterVol * 100);
        muteBtn.textContent = muted ? '✕' : '♪';
        localStorage.setItem('lft_game_vol', masterVol);
        localStorage.setItem('lft_game_mute', muted ? '1' : '0');
      };
      volRange.addEventListener('input', () => { masterVol = volRange.value / 100; muted = false; window.__applyVol(); });
      muteBtn.addEventListener('click', () => { muted = !muted; window.__applyVol(); });
      window.__applyVol();
      setInterval(window.__applyVol, 1500); // reaplica (áudio criado depois do load)
    })();

    window.__game = game;
    window.__give = (pub, docs) => { game.published = pub; game.rareDocs = docs; };
    window.__act = {
      useTool, interact, cycleTool, advanceDay, enterCave, exitCave,
      sleep: startSleep,
      openShop, openBag: () => { game.bag = true; },
      give: (item, n) => { game.inv[item] = (game.inv[item] || 0) + (n == null ? 1 : n); },
      gold: n => { game.gold = n; },
      setTool: i => { game.tool = i; syncToolBtn(); },
      warp: (map, x, y, dir) => {
        game.map = map; game.px = x; game.py = y;
        game.fromX = x; game.fromY = y; game.moving = false;
        if (dir) game.dir = dir;
        playTheme(map === 'cave' ? 'cave' : 'farm');
      }
    };
  </script>
</body>

</html>
