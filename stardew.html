<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Journalism Valley — Investigative Farming | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #170f08;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      background:
        radial-gradient(circle at 25% 15%, rgba(150, 110, 50, .14), transparent 50%),
        radial-gradient(circle at 75% 85%, rgba(70, 130, 60, .12), transparent 50%),
        #170f08;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw - 16px, 168vh - 290px, 760px);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 6px solid #2c2014;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .65), inset 0 0 16px rgba(0, 0, 0, .8);
    }

    canvas#screen {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    /* ===== controls below the screen (never over the image) ===== */
    .pad {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(100vw - 16px, 760px);
      padding: 10px 14px;
      background: #221709;
      border: 2px solid #3c2c16;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
    }

    .dpad {
      position: relative;
      width: 108px;
      height: 108px;
      flex: 0 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #4a3820;
      border: 2px solid #66502e;
      color: #e0cb9a;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .dpad button:active { background: #6e5630; }
    .dpad .up { top: 0; left: 36px; }
    .dpad .down { bottom: 0; left: 36px; }
    .dpad .left { top: 36px; left: 0; }
    .dpad .right { top: 36px; right: 0; }
    .dpad .mid { top: 36px; left: 36px; background: #32250f; border-color: #32250f; pointer-events: none; border-radius: 4px; }

    .pad-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      color: #f0dfae;
      background: #44351c;
      border: 2px solid #6e5830;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill-btn:active { background: #6e5630; }

    .key-hint {
      font-size: 7px;
      line-height: 1.7;
      color: #8a774e;
      text-align: center;
    }

    .ab {
      position: relative;
      width: 116px;
      height: 96px;
      flex: 0 0 auto;
    }

    .ab button {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      border: 0;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .45);
      touch-action: none;
    }

    .ab button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, .45); }
    .ab .a { right: 0; top: 0; background: #4e8a38; border: 2px solid #7ab85c; }
    .ab .b { left: 0; bottom: 0; background: #9c5230; border: 2px solid #c87c50; }

    .quit-link {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #9a8a64;
      text-decoration: none;
      border: 2px solid #4a3820;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(23, 15, 8, .8);
    }

    .quit-link:hover { color: #fff; border-color: #9a8a64; }

    @media (max-width: 560px) {
      body { gap: 8px; padding: 6px; }
      .pad { padding: 8px 8px; gap: 6px; }
      .dpad { width: 96px; height: 96px; }
      .dpad button { width: 32px; height: 32px; }
      .dpad .up, .dpad .down { left: 32px; }
      .dpad .mid { top: 32px; left: 32px; }
      .key-hint { display: none; }
      .ab { width: 104px; height: 88px; }
      .ab button { width: 48px; height: 48px; }
    }
  </style>
</head>

    function makeSprite(rows, scale = 1) {
      const h = rows.length, w = Math.max(...rows.map(r => r.length));
      const c = document.createElement('canvas');
      c.width = w * scale; c.height = h * scale;
      const x = c.getContext('2d');
      for (let j = 0; j < h; j++) for (let i = 0; i < rows[j].length; i++) {
        const col = PAL[rows[j][i]];
        if (col) { x.fillStyle = col; x.fillRect(i * scale, j * scale, scale, scale); }
      }
      return c;
    }

      const f = document.createElement('canvas');

      return f;

    function ensureAC() {
      if (AC) return;
      try {

        musGain.connect(AC.destination);
      } catch (e) { AC = null; }
    }

    function noteAt(t, m, dur, wave, vol, dest) {
      const o = AC.createOscillator();
      o.type = wave; o.frequency.setValueAtTime(midi(m), t);
      const e = AC.createGain();
      e.gain.setValueAtTime(0.0001, t);
      e.gain.linearRampToValueAtTime(vol, t + .015);
      e.gain.setValueAtTime(vol, Math.max(t + .02, t + dur - .05));
      e.gain.linearRampToValueAtTime(0.0001, t + dur);
      o.connect(e); e.connect(dest);
      o.start(t); o.stop(t + dur + .03);
    }

    function stopMusic() {
      if (musTimer) clearTimeout(musTimer);
      musTimer = null; musTheme = null;
      musNodes.forEach(n => { try { n.disconnect(); } catch (e) { } });

    function playTheme(name) {
      if (!AC || musTheme === name) return;

    function scheduleLoop(t0) {
      if (!musTheme) return;
      const th = THEMES[musTheme], spb = 60 / th.bpm;
      const gn = AC.createGain();
      gn.gain.value = th.vol;
      gn.connect(musGain);
      musNodes.push(gn);
      let dur = 0;
      for (const v of th.voices) {
        let t = t0;
        for (const [m, b] of v.notes) {
          if (m > 0) noteAt(t, m, b * spb * .92, v.wave, v.vol, gn);
          t += b * spb;
        }
        dur = Math.max(dur, t - t0);
      }
      musTimer = setTimeout(() => scheduleLoop(t0 + dur), Math.max(50, (t0 + dur - AC.currentTime) * 1000 - 250));
    }

          game.published++;
          playJingle();
          say(['EXTRA! EXTRA! You publish:', '"' + HEADLINES[(game.published - 1) % HEADLINES.length] + '"', '(' + game.published + '/4 front pages)']);
          return;
        }
        if (obj === 'stone') {
          if (!spendEnergy(COST.stone)) return;
          delete game.objs.farm[key];
          sfx(45, .08, 'triangle');
          toast('STONE CLEARED');
          return;
        }
        if (obj === 'branch') {
          if (!spendEnergy(COST.branch)) return;
          delete game.objs.farm[key];
          sfx(52, .07, 'triangle');
          toast('BRANCH CLEARED');
          return;
        }
        const it = itemAt(f.x, f.y) || itemAt(game.px, game.py);
        if (it) return collectItem(it);
        toast('NOTHING TO GRAB');
      } else if (tool === 'PICKAXE') {
        if (game.map !== 'cave') return toast('ONLY IN THE ARCHIVE');
        if (obj !== 'rock') return toast('SWING AT A ROCK');
        if (!spendEnergy(COST.rock)) return;
        delete game.objs.cave[key];
        sfx(43, .1, 'square');
        if (game.rareRocks[key]) {
          delete game.rareRocks[key];
          game.rareDocs++;
          playJingle();
          say(['RARE DOCUMENT ' + game.rareDocs + '/3!', RARE_FLAVOR[(game.rareDocs - 1) % 3], 'The archive remembers.']);
        } else {
          toast('JUST GRAVEL AND REGRET');
        }
      }
    }

    function interact() {
      /* A button: collect > talk to things > use tool */
      const it = itemAt(game.px, game.py) || (() => { const f = facingTile(); return itemAt(f.x, f.y); })();
      if (it) return collectItem(it);

      const f = facingTile(), t = tileAt(f.x, f.y);
      if (t === 'sign') return say(...SIGN_PAGES);
      if (t === 'mailbox') return say(MAIL[(game.day - 1) % MAIL.length]);
      if (t === 'door') {
        game.confirm = { lines: ['Crawl into bed and sleep', 'until tomorrow?'], yes: startSleep };
        return;
      }
      if (t === 'water') return say(['The pond is calm.', 'Somewhere down there:', 'an off-the-record fish.']);
      if (t === 'cavemouth') return enterCave();
      useTool();
    }

    function startSleep() {
      game.confirm = null;
      game.sleeping = { t: 0, advanced: false };
    }

    function advanceDay() {
      game.day++;
      game.energy = ENERGY_MAX;
      for (const k in game.farm) {
        const c = game.farm[k];
        if (c.crop && c.crop.watered && c.crop.stage < 3) c.crop.stage++;
        if (c.crop) c.crop.watered = false;
        c.wet = false;
      }
      spawnItems(3);
    }

    function spawnItems(n) {
      const types = ['coffee', 'doc', 'lead', 'coffee'];
      let guard = 200;
      while (n > 0 && guard-- > 0) {
        const x = 1 + Math.floor(Math.random() * (MAPW - 2));
        const y = 1 + Math.floor(Math.random() * (MAPH - 2));
        if (tileAt(x, y, 'farm') !== 'grass') continue;
        if (game.objs.farm[x + ',' + y]) continue;
        if (game.items.some(i => i.x === x && i.y === y)) continue;
        if (game.map === 'farm' && x === game.px && y === game.py) continue;
        game.items.push({ x, y, type: types[Math.floor(Math.random() * types.length)] });
        n--;
      }
    }

    function enterCave() {
      game.map = 'cave';
      game.px = 12; game.py = 12; game.fromX = 12; game.fromY = 12;
      game.moving = false; game.dir = 'up';
      game.tool = 4; syncToolBtn();
      playTheme('cave');
      if (!game.caveVisited) {
        game.caveVisited = true;
        say(
          ['THE DEAD ARCHIVE.', 'Dust. Boxes. Cold coffee', 'from 1994. You grab an old', 'PICKAXE off a shelf.'],
          ['PICKAXE added as 5th tool.', 'Crack the rocks: 3 RARE', 'DOCUMENTS are buried here.', 'Each swing costs energy!']
        );
      }
    }

    function exitCave() {
      game.map = 'farm';
      game.px = 12; game.py = 2; game.fromX = 12; game.fromY = 2;
      game.moving = false; game.dir = 'down';
      if (game.tool === 4) { game.tool = 3; syncToolBtn(); }
      playTheme('farm');
    }

    function tryMove(dx, dy, dir) {
      game.dir = dir;
      const nx = game.px + dx, ny = game.py + dy;
      if (SOLID[tileAt(nx, ny)] || objAt(nx, ny)) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
    }

    function finishStep() {
      game.step++;
      const t = tileAt(game.px, game.py);
      if (game.map === 'farm' && t === 'cavemouth') enterCave();
      else if (game.map === 'cave' && t === 'ladder') exitCave();
    }

    function updateWorld(dt) {
      if (game.sleeping) {
        const s = game.sleeping;
        s.t += dt * .9;
        if (s.t >= 1 && !s.advanced) { s.advanced = true; advanceDay(); }
        if (s.t >= 2) {
          game.sleeping = null;
          toast('DAY ' + game.day + '. CROPS GREW. GO!');
        }
        return;
      }

      if (!game.won && game.published >= 4 && game.rareDocs >= 3 && !game.msg && !game.confirm) {
        game.won = true;
        game.state = 'win';
        game.winT = 0; game.winSel = 0;
        stopMusic();
        playJingle();
        return;
      }

      if (game.msg) {
        const p = popPress();
        if (isA(p) || isB(p)) {
          game.msg.idx++;
          if (game.msg.idx >= game.msg.pages.length) game.msg = null;
        }
        return;
      }

      if (game.confirm) {
        const p = popPress();
        if (p && p.act === 'yes') { const y = game.confirm.yes; game.confirm = null; y(); }
        else if (p && p.act === 'no') game.confirm = null;
        else if (isA(p)) { const y = game.confirm.yes; game.confirm = null; y(); }
        else if (isB(p)) game.confirm = null;
        return;
      }

      const p = popPress();
      if (isTool(p)) cycleTool();
      else if (isA(p)) interact();

      if (game.moving) {
        game.moveT += dt * 5.2;
        if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
      } else {
        if (keys.up) tryMove(0, -1, 'up');
        else if (keys.down) tryMove(0, 1, 'down');
        else if (keys.left) tryMove(-1, 0, 'left');
        else if (keys.right) tryMove(1, 0, 'right');
      }

      if (game.toast) { game.toast.t += dt; if (game.toast.t > 1.6) game.toast = null; }
    }

    /* =====================================================================
       WORLD DRAW
       ===================================================================== */
    function drawWorld() {
      zones = [];
      const lerp = game.moving ? game.moveT : 1;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const animFrame = Math.floor(game.animClock * 1.6) % 2;
      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++) {
          let t = tileAt(i, j);
          if (t === 'water' && animFrame) t = 'water2';
          else if (t === 'flower' && animFrame) t = 'flower2';
          else if (t === 'grass' && ((i * 7 + j * 13) % 5 === 0)) t = 'grass2';
          const key = i + ',' + j;
          if (t === 'soil' && game.farm[key] && game.farm[key].tilled)
            t = game.farm[key].wet ? 'tilledwet' : 'tilled';
          g.drawImage(TILES[t], i * T - camX, j * T - camY);

          const cell = game.farm[key];
          if (game.map === 'farm' && cell && cell.crop)
            g.drawImage(CROPS[cell.crop.stage], i * T - camX, j * T - camY);

          const obj = game.objs[game.map][key];
          if (obj) {
            g.drawImage(OBJS[obj], i * T - camX, j * T - camY);
            if (obj === 'rock' && game.rareRocks[key] && (game.animClock * 2 + i) % 3 < .4) {
              px(i * T - camX + 4 + (i % 5), j * T - camY + 4 + (j % 4), 1, 1, '#f6e294');
              px(i * T - camX + 10 - (j % 3), j * T - camY + 8, 1, 1, '#ffffff');
            }
          }
        }

      if (game.map === 'farm') {
        for (const it of game.items) {
          const bob = Math.sin(game.animClock * 3 + it.x) * 1.5;
          g.drawImage(OBJS[it.type], it.x * T - camX, it.y * T - camY + bob - 2);
        }
      }

      /* player: stepA -> stand -> stepB -> stand (same cycle as pokemon.html) */
      const dirFrames = SPR.player[game.dir];
      const seq = [1, 0, 3, 0];
      const phase = Math.floor((game.step + (game.moving ? game.moveT : 0)) * 2) % 4;
      const frame = game.moving ? dirFrames[seq[phase]] : dirFrames[0];
      g.drawImage(frame, Math.round(wx - camX + 1), Math.round(wy - camY - 4));

      /* dusk overlay: the day grows old as your energy burns */
      if (game.map === 'farm') {
        const a = 1 - game.energy / ENERGY_MAX;
        if (a > .02) {
          px(0, 0, 256, 192, 'rgba(244,128,38,' + (a * .22).toFixed(3) + ')');
          px(0, 0, 256, 192, 'rgba(38,26,88,' + (a * .26).toFixed(3) + ')');
        }
      } else {
        px(0, 0, 256, 192, 'rgba(12,6,22,.22)');
      }

      /* HUD */
      frame9(2, 2, 170, 30, { bg: 'rgba(248,244,228,.95)' });
      text('DAY ' + game.day + '  NEWS ' + game.published + '/4  DOC ' + game.rareDocs + '/3', 8, 7, '#5b4226', 6);
      text('E', 8, 18, '#9c5230', 6);
      bar(17, 19, 56, game.energy / ENERGY_MAX);
      text(TOOLS[game.tool], 80, 18, '#3f6d3b', 6);
      zone(2, 2, 170, 30, 'tool');

      if (game.toast) {
        const a = game.toast.t > 1.2 ? 1 - (game.toast.t - 1.2) / .4 : 1;
        g.globalAlpha = Math.max(0, Math.min(1, a));
        g.font = '6px "Press Start 2P"';
        const w = g.measureText(game.toast.txt).width + 14;
        frame9(Math.round(128 - w / 2), 122, Math.round(w), 17, { bg: '#2e2418', edge: '#8a6a44', dark: '#150e07' });
        textC(game.toast.txt, 128, 128, '#f6e294', 6);
        g.globalAlpha = 1;
      }

      if (game.msg) {
        frame9(4, 138, 248, 50);
        game.msg.pages[game.msg.idx].forEach((l, i) => text(l, 12, 145 + i * 11, '#3a2c18', 7));
        text('▼', 240, 178, '#c25043', 7);
        zone(0, 0, 256, 192, 'A');
      } else if (game.confirm) {
        frame9(28, 70, 200, 56);
        game.confirm.lines.forEach((l, i) => text(l, 38, 78 + i * 11, '#3a2c18', 7));
        frame9(48, 100, 70, 18, { bg: '#4e8a38', edge: '#7ab85c', dark: '#2c5420' });
        textC('A: YES', 83, 106, '#ffffff', 6);
        zone(48, 100, 70, 18, 'yes');
        frame9(138, 100, 70, 18, { bg: '#9c5230', edge: '#c87c50', dark: '#5c2c14' });
        textC('B: NO', 173, 106, '#ffffff', 6);
        zone(138, 100, 70, 18, 'no');
      }

      if (game.sleeping) {
        const t = game.sleeping.t;
        const a = t < 1 ? t : 2 - t;
        px(0, 0, 256, 192, 'rgba(8,4,16,' + Math.min(1, a * 1.2).toFixed(3) + ')');
        if (t > .5 && t < 1.5) {
          textC('DAY ' + game.day, 128, 84, '#f6e294', 10);
          textC('zZz...', 128, 102, '#9a8a64', 7);
        }
      }
    }

    /* =====================================================================
       TITLE & WIN
       ===================================================================== */
    function drawTitle(dt) {
      zones = [];
      game.titleT += dt;
      const grad = g.createLinearGradient(0, 0, 0, 192);
      grad.addColorStop(0, '#2c4a6e'); grad.addColorStop(.5, '#7a5a36');
      grad.addColorStop(.78, '#5d9448'); grad.addColorStop(1, '#3f6d3b');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 192);

      /* setting sun, low on the horizon */
      g.fillStyle = '#f0b264'; g.beginPath(); g.arc(226, 146, 15, 0, 7); g.fill();
      g.fillStyle = '#f6e294'; g.beginPath(); g.arc(226, 146, 10, 0, 7); g.fill();

      for (let i = 0; i < 16; i++) g.drawImage(TILES.grass, i * 16, 176);
      g.drawImage(TILES.soil, 32, 176);
      g.drawImage(TILES.tilled, 48, 176);
      g.drawImage(TILES.tilled, 64, 176); g.drawImage(CROPS[3], 64, 160);
      g.drawImage(TILES.tilled, 80, 176); g.drawImage(CROPS[1], 80, 172);
      g.drawImage(TILES.flower, 176, 176);
      g.drawImage(TILES.fence, 208, 176); g.drawImage(TILES.fence, 224, 176); g.drawImage(TILES.fence, 240, 176);

      const wf = Math.floor(game.titleT * 3) % 4;
      g.drawImage(SPR.player.right[[1, 0, 3, 0][wf]], 116, 156);

      /* big-art portrait, title screen only */
      if (imgAvatar.complete && imgAvatar.naturalWidth) {
        frame9(6, 118, 56, 56, { bg: '#2b1d12', edge: '#c89858', dark: '#43301f' });
        g.imageSmoothingEnabled = true;
        g.drawImage(imgAvatar, 10, 122, 48, 48);
        g.imageSmoothingEnabled = false;
      }

      textC('JOURNALISM VALLEY', 129, 25, '#2b1d12', 14);
      textC('JOURNALISM VALLEY', 128, 24, '#f6e294', 14);
      textC('the farm where stories grow', 128, 48, '#f8f4e4', 6);
      px(48, 62, 160, 1, '#c89858');
      textC('till leads - water with facts', 128, 70, '#e0cb9a', 6);
      textC('harvest 4 front pages + dig', 128, 81, '#e0cb9a', 6);
      textC('3 rare docs from the archive', 128, 92, '#e0cb9a', 6);
      if (Math.floor(game.titleT * 2) % 2) textC('- PRESS A TO START -', 128, 112, '#ffffff', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateTitle() {
      const p = popPress();
      if (!p) return;
      ensureAC();
      playTheme('farm');
      game.state = 'world';
      syncToolBtn();
    }

    function leaveWin() {
      game.state = 'world';
      playTheme(game.map === 'cave' ? 'cave' : 'farm');
    }

    function drawWin(dt) {
      zones = [];
      game.winT += dt;
      px(0, 0, 256, 192, '#f8f4e4');
      px(0, 0, 256, 34, '#2b1d12');
      textC('THE JOURNALISM VALLEY TRIBUNE', 128, 7, '#f8f4e4', 8);
      textC('harvest edition - day ' + game.day, 128, 21, '#c8b890', 6);

      textC('FRONT PAGE!', 128, 42, Math.floor(game.winT * 2) % 2 ? '#c25043' : '#8f3328', 14);

      px(20, 62, 216, 1, '#9a8a64');
      textC('Reporter-farmer L. TOLEDO grows', 128, 68, '#43301f', 5);
      textC('4 stories from seed and digs 3', 128, 77, '#43301f', 5);
      textC('rare documents out of the archive.', 128, 86, '#43301f', 5);
      textC('Sources: ' + game.leads + ' leads. Editor: "fine."', 128, 95, '#8a6a44', 5);
      px(20, 106, 216, 1, '#9a8a64');

      if (imgPaper.complete && imgPaper.naturalWidth) {
        g.imageSmoothingEnabled = true;
        g.drawImage(imgPaper, 18, 112, 42, 42);
        g.drawImage(imgPaper, 196, 112, 42, 42);
        g.imageSmoothingEnabled = false;
      }
      g.drawImage(CROPS[3], 72, 122);
      g.drawImage(OBJS.doc, 104, 122);
      g.drawImage(OBJS.coffee, 136, 122);
      g.drawImage(CROPS[3], 168, 122);

      textC(game.winSel === 0 ? '> back to the homepage <' : '> keep farming stories <', 128, 154, '#8a6a44', 5);
      const selA = game.winSel === 0, selB = game.winSel === 1;
      frame9(24, 164, 120, 22, { bg: selA ? '#c25043' : '#9c5230', edge: selA ? '#e2796a' : '#b06a40', dark: '#5c2014' });
      textC('EXIT TO SITE', 84, 172, '#ffffff', 6);
      zone(24, 164, 120, 22, 'win', 'exit');
      frame9(156, 164, 76, 22, { bg: selB ? '#4e8a38' : '#3f6d3b', edge: selB ? '#7ab85c' : '#5a8a4c', dark: '#234018' });
      textC('PLAY ON', 194, 172, '#ffffff', 6);
      zone(156, 164, 76, 22, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      if (!p) return;
      if (p === 'left' || p === 'right') { game.winSel ^= 1; return; }
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else leaveWin();
        return;
      }
      if (isA(p)) {
        if (game.winSel === 0) window.location.href = 'index.html';
        else leaveWin();
        return;
      }
      if (isB(p)) leaveWin();
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    spawnItems(3);

    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      game.animClock += dt;
      g.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); if (game.state === 'title') drawTitle(dt); else drawWorld(); }
      else if (game.state === 'world') { updateWorld(dt); if (game.state === 'world') drawWorld(); else drawWin(dt); }
      else if (game.state === 'win') { updateWin(); if (game.state === 'win') drawWin(dt); else drawWorld(); }

      requestAnimationFrame(loop);
    }

    Promise.race([
      document.fonts.load('8px "Press Start 2P"'),
      new Promise(r => setTimeout(r, 1200))
    ]).then(() => requestAnimationFrame(loop));

    /* =====================================================================
       TEST HOOKS
       ===================================================================== */
    window.__game = game;
    window.__give = (pub, docs) => { game.published = pub; game.rareDocs = docs; };
    window.__act = {
      useTool, interact, cycleTool, advanceDay, enterCave, exitCave,
      sleep: startSleep,
      setTool: i => { game.tool = i; syncToolBtn(); },
      warp: (map, x, y, dir) => {
        game.map = map; game.px = x; game.py = y;
        game.fromX = x; game.fromY = y; game.moving = false;
        if (dir) game.dir = dir;
        playTheme(map === 'cave' ? 'cave' : 'farm');
      }
    };
  </script>
</body>
