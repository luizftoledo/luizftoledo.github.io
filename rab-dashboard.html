<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAB — Pesquisa de donos de aeronaves</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f7f8fa; color:#222; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background:#fff; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    .row { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom: 16px; }
    label { font-size: .9rem; display:block; margin-bottom: 4px; color:#444; }
    input { width:100%; padding:10px; border:1px solid #d0d7de; border-radius: 8px; }
    table { width:100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom:1px solid #eee; padding:10px; text-align:left; font-size:.92rem; }
    .muted { color:#666; font-size:.88rem; }
    .pill { background:#eef3ff; border-radius:999px; padding:3px 10px; font-size:.78rem; display:inline-block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Pesquisa de proprietários de aeronaves (RAB/ANAC)</h1>
      <p class="muted">Busca flexível por prefixo, nome do proprietário e CPF/CNPJ (com ou sem pontuação, sem diferenciação de maiúsculas/minúsculas e sem acentos).</p>
      <p class="pill" id="meta"></p>

      <div class="row">
        <div>
          <label for="prefixo">Prefixo da aeronave</label>
          <input id="prefixo" placeholder="Ex.: PT-ABC" />
        </div>
        <div>
          <label for="nome">Nome do proprietário</label>
          <input id="nome" placeholder="Ex.: JOAO SILVA" />
        </div>
        <div>
          <label for="doc">CPF ou CNPJ</label>
          <input id="doc" placeholder="Ex.: 12345678909 ou 12.345.678/0001-90" />
        </div>
      </div>

      <div id="count" class="muted"></div>
      <table>
        <thead>
          <tr>
            <th>Prefixo</th>
            <th>Proprietário</th>
            <th>CPF/CNPJ</th>
            <th>Modelo</th>
            <th>UF</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <hr />
      <footer class="muted" id="footer"></footer>
    </div>
  </div>
  <script src="rab-dashboard/app.js"></script>
</body>
</html>
