<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Retrato de Jean Valjean</title>
  <desc id="desc">Retrato vetorial de Jean Valjean com expressão austera, casaco escuro e fundo em papel aquecido.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7efe2"/>
      <stop offset="55%" stop-color="#efe1cb"/>
      <stop offset="100%" stop-color="#e4d0b3"/>
    </linearGradient>
    <linearGradient id="coat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24333f"/>
      <stop offset="100%" stop-color="#111a20"/>
    </linearGradient>
    <linearGradient id="skin" x1="35%" y1="10%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#dcb69a"/>
      <stop offset="100%" stop-color="#b88467"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#854235"/>
      <stop offset="100%" stop-color="#5a2a24"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="32%" r="55%">
      <stop offset="0%" stop-color="rgba(157,60,47,0.34)"/>
      <stop offset="100%" stop-color="rgba(157,60,47,0)"/>
    </radialGradient>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="32" flood-color="#44261a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="#000" filter="url(#paper)" opacity="0.45"/>
