name: Update Basometro Dashboard Data

on:
  schedule:
    # Segunda-feira 09:00 America/Cuiaba ~= 13:00 UTC
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build basometro data
        run: |
          python scripts/build_basometro_dashboard_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- basometro-dashboard/data; then
            echo "No basometro data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add basometro-dashboard/data
          git commit -m "chore(data): update basometro-dashboard dataset"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
