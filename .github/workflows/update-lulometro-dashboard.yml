name: Update Lulometro Dashboard Data

on:
  schedule:
    # 10:20 horario de Brasilia ~= 13:20 UTC
    - cron: "20 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 playwright pypdf pymupdf
          python -m playwright install chromium

      - name: Build Lulometro data
        run: |
          python scripts/build_lulometro_data.py --max-details 2500 --max-failures 3

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- lulometro-dashboard/data; then
            echo "No lulometro data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lulometro-dashboard/data
          git commit -m "chore(data): update lulometro-dashboard dataset"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
