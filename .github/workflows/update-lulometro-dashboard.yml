name: Update Lulometro Dashboard Data

on:
  schedule:
    # 09:00 America/Cuiaba ~= 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BQ_PROJECT_ID: ${{ vars.BQ_PROJECT_ID }}
      BQ_DATASET: ${{ vars.BQ_DATASET }}
      BQ_LOCATION: ${{ vars.BQ_LOCATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 playwright pypdf pymupdf google-cloud-bigquery
          python -m playwright install chromium

      - name: Build Lulometro data
        run: |
          python scripts/build_lulometro_data.py --max-details 2500 --max-failures 3

      - name: Write GCP credentials file
        if: ${{ secrets.GCP_SA_KEY != '' && vars.BQ_PROJECT_ID != '' && vars.BQ_DATASET != '' }}
        run: |
          cat > "$RUNNER_TEMP/gcp-key.json" <<'JSON'
          ${{ secrets.GCP_SA_KEY }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-key.json" >> "$GITHUB_ENV"

      - name: Sync Lulometro to BigQuery
        if: ${{ secrets.GCP_SA_KEY != '' && vars.BQ_PROJECT_ID != '' && vars.BQ_DATASET != '' }}
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          python scripts/sync_lulometro_bigquery.py \
            --project "$BQ_PROJECT_ID" \
            --dataset "$BQ_DATASET" \
            --location "${BQ_LOCATION:-US}" \
            --workflow-run-id "${{ github.run_id }}" \
            --commit-sha "${{ github.sha }}"

      - name: BigQuery sync skipped (missing secrets/vars)
        if: ${{ secrets.GCP_SA_KEY == '' || vars.BQ_PROJECT_ID == '' || vars.BQ_DATASET == '' }}
        run: |
          echo "Skipping BigQuery sync. Configure secrets/vars: GCP_SA_KEY, BQ_PROJECT_ID, BQ_DATASET (and optional BQ_LOCATION)."

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- lulometro-dashboard/data; then
            echo "No lulometro data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lulometro-dashboard/data
          git commit -m "chore(data): update lulometro-dashboard dataset"
          git push
