name: Update Lulometro Dashboard Data

on:
  schedule:
    # 09:00 America/Cuiaba ~= 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BQ_PROJECT_ID: ${{ vars.BQ_PROJECT_ID }}
      BQ_DATASET: ${{ vars.BQ_DATASET }}
      BQ_LOCATION: ${{ vars.BQ_LOCATION }}
      BQ_PROJECT_ID_FALLBACK: "militares-376417"
      BQ_DATASET_FALLBACK: "militares"
      BQ_LOCATION_FALLBACK: "US"
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 playwright pypdf pymupdf google-cloud-bigquery
          python -m playwright install chromium

      - name: Build Lulometro data
        run: |
          python scripts/build_lulometro_data.py --max-details 2500 --max-failures 3

      - name: Prepare GCP credentials file
        if: ${{ env.GCP_SA_KEY != '' }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          raw = (os.getenv("GCP_SA_KEY") or "").strip()
          if not raw:
            raise SystemExit("Missing secret GCP_SA_KEY.")

          def maybe_json_object(text):
            text = (text or "").strip()
            if not text:
              return None

            tries = [text]
            if text.startswith('"') and text.endswith('"'):
              tries.append(text[1:-1])

            start = text.find("{")
            end = text.rfind("}")
            if start >= 0 and end > start:
              tries.append(text[start : end + 1])

            for candidate in tries:
              try:
                parsed = json.loads(candidate)
              except Exception:
                continue
              if isinstance(parsed, dict):
                return parsed
              if isinstance(parsed, str):
                try:
                  parsed2 = json.loads(parsed)
                  if isinstance(parsed2, dict):
                    return parsed2
                except Exception:
                  continue
            return None

          candidates = [raw.encode("utf-8", errors="ignore")]
          try:
            candidates.append(base64.b64decode(raw))
          except Exception:
            pass
          try:
            candidates.append(base64.b64decode(raw, validate=False))
          except Exception:
            pass

          parsed = None
          for candidate in candidates:
            try:
              text = candidate.decode("utf-8", errors="ignore")
            except Exception:
              text = str(candidate)
            parsed = maybe_json_object(text)
            if parsed is not None:
              break

          if parsed is None:
            raise SystemExit("GCP_SA_KEY must be raw JSON or base64(JSON).")

          out = Path(os.environ["RUNNER_TEMP"]) / "gcp-key.json"
          out.write_text(json.dumps(parsed), encoding="utf-8")
          PY

          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-key.json" >> "$GITHUB_ENV"

      - name: Sync Lulometro to BigQuery
        if: ${{ env.GCP_SA_KEY != '' }}
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          PROJECT_ID="${BQ_PROJECT_ID:-$BQ_PROJECT_ID_FALLBACK}"
          DATASET_ID="${BQ_DATASET:-$BQ_DATASET_FALLBACK}"
          LOCATION_ID="${BQ_LOCATION:-$BQ_LOCATION_FALLBACK}"
          python scripts/sync_lulometro_bigquery.py \
            --project "$PROJECT_ID" \
            --dataset "$DATASET_ID" \
            --location "$LOCATION_ID" \
            --workflow-run-id "${{ github.run_id }}" \
            --commit-sha "${{ github.sha }}"

      - name: BigQuery sync skipped (missing secret)
        if: ${{ env.GCP_SA_KEY == '' }}
        run: |
          echo "Skipping BigQuery sync. Configure at least secret GCP_SA_KEY."

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- lulometro-dashboard/data; then
            echo "No lulometro data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lulometro-dashboard/data
          git commit -m "chore(data): update lulometro-dashboard dataset"
          git push
