name: Update IBAMA Dashboard Data

on:
  schedule:
    # 09:00 America/Cuiaba ~= 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Build optimized data
        run: |
          python scripts/build_ibama_dashboard_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- ibama-dashboard/data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ibama-dashboard/data
          git commit -m "chore(data): update ibama-dashboard dataset"
          git push
