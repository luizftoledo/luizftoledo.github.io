name: Update LAI Dashboard Data

on:
  schedule:
    # 09:00 America/Cuiaba ~= 13:00 UTC (mensal)
    - cron: "0 13 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Build LAI data (incremental)
        run: |
          python scripts/build_lai_dashboard_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- lai-dashboard/data; then
            echo "No LAI data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lai-dashboard/data
          git commit -m "chore(data): update lai-dashboard dataset"
          git push
