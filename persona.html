<!DOCTYPE html>
<html lang="en">

<head>

  <title>Palace of Secrets — A Phantom Press Heist | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="images/persona/calling_card.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0c0a0e;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      background:
        radial-gradient(circle at 20% 12%, rgba(190, 20, 40, .14), transparent 50%),
        radial-gradient(circle at 80% 88%, rgba(190, 20, 40, .10), transparent 50%),
        #0c0a0e;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw - 16px, 168vh - 290px, 760px);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 6px solid #1c1216;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .7), inset 0 0 16px rgba(0, 0, 0, .8);
    }

    canvas#screen {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    /* ===== controls below the screen (never over the image) ===== */
    .pad {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(100vw - 16px, 760px);
      padding: 10px 14px;
      background: #161014;
      border: 2px solid #321820;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
    }

    .dpad {
      position: relative;
      width: 108px;
      height: 108px;
      flex: 0 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #2a1018;
      border: 2px solid #5a1c28;
      color: #d8a8b0;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .dpad button:active { background: #7a1424; }
    .dpad .up { top: 0; left: 36px; }
    .dpad .down { bottom: 0; left: 36px; }
    .dpad .left { top: 36px; left: 0; }
    .dpad .right { top: 36px; right: 0; }
    .dpad .mid { top: 36px; left: 36px; background: #1c0c10; border-color: #1c0c10; pointer-events: none; border-radius: 4px; }

    .pad-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      color: #f0dce0;
      background: #38101c;
      border: 2px solid #6a1c2c;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill-btn:active { background: #7a1424; }

    .key-hint {
      font-size: 7px;
      line-height: 1.7;
      color: #7c5860;
      text-align: center;
    }

    .ab {
      position: relative;
      width: 116px;
      height: 96px;
      flex: 0 0 auto;
    }

    .ab button {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      border: 0;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .45);
      touch-action: none;
    }

    .ab button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, .45); }
    .ab .a { right: 0; top: 0; background: #c01428; border: 2px solid #f04858; }
    .ab .b { left: 0; bottom: 0; background: #2a2230; border: 2px solid #5c4c68; }

    .quit-link {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #98808a;
      text-decoration: none;
      border: 2px solid #44202c;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(12, 10, 14, .8);
    }

    .quit-link:hover { color: #fff; border-color: #c01428; }

    @media (max-width: 560px) {
      body { gap: 8px; padding: 6px; }
      .pad { padding: 8px 8px; gap: 6px; }
      .dpad { width: 96px; height: 96px; }
      .dpad button { width: 32px; height: 32px; }
      .dpad .up, .dpad .down { left: 32px; }
      .dpad .mid { top: 32px; left: 32px; }
      .key-hint { display: none; }
      .ab { width: 104px; height: 88px; }
      .ab button { width: 48px; height: 48px; }
    }
  </style>
</head>

    function makeSprite(rows, scale = 1) {

      const x = c.getContext('2d');

      }
      return c;
    }

    const MAPW = MAP_STR[0].length, MAPH = MAP_STR.length;
    const CHAR2TILE = {
      '#': 'wall', '.': 'floor', 'r': 'carpet', 'c': 'column', 's': 'safe',
      'v': 'vase', 'D': 'door', 'T': 'pedestal', 'E': 'exit',
      'B': 'floor', 'M': 'floor', 'P': 'floor'
    };
    function mapChar(x, y) {
      if (x < 0 || y < 0 || x >= MAPW || y >= MAPH) return '#';
      return MAP_STR[y][x];
    }
    function tileAt(x, y) {
      const ch = mapChar(x, y);
      if (ch === 'D') return game.doorOpen ? 'dooropen' : 'door';
      return CHAR2TILE[ch] || 'floor';
    }
    const SOLID_TILES = { wall: 1, column: 1, safe: 1, door: 1, pedestal: 1 };
    const SIGHT_TILES = { wall: 1, column: 1, safe: 1, door: 1 };
    const isSolid = (x, y) => !!SOLID_TILES[tileAt(x, y)];
    const blocksSight = (x, y) => !!SIGHT_TILES[tileAt(x, y)];

    /* key spawns scanned from the map */
    const KEY_DEFS = [];
    for (let y = 0; y < MAPH; y++) for (let x = 0; x < MAPW; x++) {
      const ch = MAP_STR[y][x];
      if (ch === 'B') KEY_DEFS.push({ id: 'badge', x, y, label: 'VISITOR BADGE' });
      if (ch === 'M') KEY_DEFS.push({ id: 'map', x, y, label: 'VAULT MAP' });
      if (ch === 'P') KEY_DEFS.push({ id: 'pass', x, y, label: 'PASSWORD' });
    }
    const DOOR_POS = { x: 12, y: 4 };
    const TREASURE_POS = { x: 12, y: 2 };
    const SPAWN = { x: 12, y: 15 };
    /* alarm respawn point per zone (0 lobby / 1 halls / 2 top floor) */
    const ZONE_ENTRY = [[12, 15], [12, 14], [12, 5]];
    const ZONE_NAME = ['THE LOBBY', 'THE HALLS', 'THE TOP FLOOR'];
    const zoneOfRow = y => y >= 14 ? 0 : y >= 5 ? 1 : 2;

    /* =====================================================================
       GUARDS (Shadows) — fixed patrol routes
       ===================================================================== */
    const GUARD_DEFS = [
      { path: [[3, 8], [8, 8], [8, 12], [3, 12]], name: 'SHADOW GUARD' },
      { path: [[21, 8], [16, 8], [16, 12], [21, 12]], name: 'SHADOW GUARD' },
      { path: [[17, 3], [23, 3]], name: 'SHADOW LAWYER' },
      { path: [[2, 5], [23, 5]], name: 'SHADOW BUTLER' },
      { path: [[23, 15], [2, 15]], name: 'SHADOW INTERN' }
    ];
    const CONE_LEN = 58, CONE_HALF = 0.5;
    let guards = [];
    function makeGuards() {
      guards = GUARD_DEFS.map(d => ({
        name: d.name, path: d.path,
        px: d.path[0][0], py: d.path[0][1],
        wi: 1, wait: 0, fx: 1, fy: 0, animT: 0
      }));
      guards.forEach(gd => {
        const wp = gd.path[1];
        const dx = wp[0] - gd.px, dy = wp[1] - gd.py;
        gd.fx = Math.abs(dx) >= Math.abs(dy) ? Math.sign(dx) || 1 : 0;
        gd.fy = gd.fx ? 0 : Math.sign(dy) || 0;
      });
    }

    /* =====================================================================
       STATE
       ===================================================================== */
    const game = {
      state: 'title',
      px: SPAWN.x, py: SPAWN.y, dir: 'up',
      moving: false, moveT: 0, fromX: SPAWN.x, fromY: SPAWN.y,
      step: 0,
      keysHave: {},                 /* badge / map / pass */
      doorOpen: false,
      dossier: false,
      escape: false,
      alert: 0,
      hidden: false,
      grace: 0,
      spot: null,                   /* {t, guard} caught cutscene */
      msg: null,                    /* {lines, after} */
      cardT: 0, bustedT: 0, winT: 0, winSel: 0,
      exitNagged: false,
      animClock: 0
    };
    makeGuards();
    const keyCount = () => ['badge', 'map', 'pass'].filter(k => game.keysHave[k]).length;
    const allKeys = () => keyCount() === 3;

    function resetRun() {
      game.keysHave = {};
      game.doorOpen = false; game.dossier = false; game.escape = false;
      game.alert = 0; game.hidden = false; game.spot = null; game.msg = null;
      game.px = game.fromX = SPAWN.x; game.py = game.fromY = SPAWN.y;
      game.dir = 'up'; game.moving = false; game.moveT = 0;
      game.grace = 2; game.exitNagged = false;
      makeGuards();
    }

    /* =====================================================================
       INPUT — keyboard + DOM pad + canvas touch zones
       ===================================================================== */
    const keys = {};
    const KEYMAP = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      z: 'A', Enter: 'A', ' ': 'A', x: 'B', Escape: 'B', Backspace: 'B'
    };
    let pressQueue = [];
    window.addEventListener('keydown', e => {
      const k = KEYMAP[e.key];
      if (!k) return;
      e.preventDefault();
      initAudio();
      if (!keys[k]) pressQueue.push(k);
      keys[k] = true;
    });
    window.addEventListener('keyup', e => { const k = KEYMAP[e.key]; if (k) keys[k] = false; });

    document.querySelectorAll('.dpad button').forEach(btn => {
      const dir = btn.dataset.dir;
      const dn = e => { e.preventDefault(); initAudio(); if (!keys[dir]) pressQueue.push(dir); keys[dir] = true; };
      const up = e => { e.preventDefault(); keys[dir] = false; };
      btn.addEventListener('pointerdown', dn);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('pointercancel', up);
    });
    document.querySelectorAll('.ab button').forEach(btn => {
      btn.addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); pressQueue.push(btn.dataset.btn); });
    });
    document.getElementById('noteBtn').addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); pressQueue.push('note'); });

    let zones = [];
    function zone(x, y, w, h, act, data) { zones.push({ x, y, w, h, act, data }); }
    cv.addEventListener('pointerdown', e => {
      initAudio();
      const r = cv.getBoundingClientRect();
      const x = (e.clientX - r.left) * 256 / r.width, y = (e.clientY - r.top) * 192 / r.height;
      for (const z of zones) {
        if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) { pressQueue.push(z); return; }
      }
      pressQueue.push('A');
    });
    function popPress() { return pressQueue.shift(); }
    const isA = p => p === 'A' || (p && p.act === 'A');
    const isB = p => p === 'B' || (p && p.act === 'B');
    const isNote = p => p === 'note' || (p && p.act === 'note');

    /* =====================================================================
       DRAW HELPERS — Persona-style angular UI
       ===================================================================== */
    function px(x, y, w, h, col) { g.fillStyle = col; g.fillRect(x | 0, y | 0, w, h); }

    function poly(pts, col) {
      g.fillStyle = col;
      g.beginPath();
      g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.closePath(); g.fill();
    }

    /* angular black panel with diagonal-cut corners, white edge, red accent */
    function frameP5(x, y, w, h, o = {}) {
      const cut = o.cut !== undefined ? o.cut : 6;
      const pts = [
        [x + cut, y], [x + w, y], [x + w, y + h - cut],
        [x + w - cut, y + h], [x, y + h], [x, y + cut]
      ];
      /* drop shadow */
      poly(pts.map(p => [p[0] + 2, p[1] + 2]), 'rgba(0,0,0,.55)');
      poly(pts, o.bg || 'rgba(12,9,13,.96)');
      g.strokeStyle = o.edge || '#f4f2ec';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.closePath(); g.stroke();
      if (o.acc !== false) {
        poly([[x + cut, y], [x + cut + 9, y], [x, y + cut + 9], [x, y + cut]], o.acc || '#d01830');
      }
    }

    function text(str, x, y, col = '#f4f2ec', size = 8) {
      g.font = size + 'px "Press Start 2P"';
      g.textBaseline = 'top';
      g.fillStyle = col;
      g.fillText(str, x, y);
    }

    function textC(str, cx, y, col, size = 8) {
      g.font = size + 'px "Press Start 2P"';
      const w = g.measureText(str).width;
      text(str, Math.round(cx - w / 2), y, col, size);
    }

    /* white text with hard black shadow (P5 poster look) */
    function textShadow(str, x, y, col, size, shadow = '#000') {
      text(str, x + 2, y + 2, shadow, size);
      text(str, x, y, col, size);
    }
    function textCShadow(str, cx, y, col, size, shadow = '#000') {
      g.font = size + 'px "Press Start 2P"';
      const w = g.measureText(str).width;
      textShadow(str, Math.round(cx - w / 2), y, col, size, shadow);
    }

    /* jagged P5 star splash */
    function splash(cx, cy, rOut, rIn, n, col, rot = 0) {
      const pts = [];
      for (let i = 0; i < n * 2; i++) {
        const r = (i % 2 ? rIn : rOut) * (0.82 + 0.36 * ((i * 7919) % 13) / 13);
        const a = rot + i * Math.PI / n;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      poly(pts, col);
    }

    /* =====================================================================
       AUDIO — original chiptune (acid-jazz-ish), WebAudio only
       ===================================================================== */
    const audio = { ctx: null, master: null, music: null, noise: null, next: 0, step: 0 };
    const m2f = m => 440 * Math.pow(2, (m - 69) / 12);

    function initAudio() {
      if (audio.ctx) { if (audio.ctx.state === 'suspended') audio.ctx.resume(); return; }
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ctx = audio.ctx = new AC();
      audio.master = ctx.createGain(); audio.master.gain.value = .5;
      audio.master.connect(ctx.destination);
      audio.music = ctx.createGain(); audio.music.gain.value = .42;
      audio.music.connect(audio.master);
      const buf = ctx.createBuffer(1, ctx.sampleRate * .4, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      audio.noise = buf;
      audio.next = ctx.currentTime + .08;
      audio.step = 0;
      setInterval(musicTick, 30);
    }

    function osc(type, freq, t0, dur, gain, dest, slideTo) {
      const ctx = audio.ctx;
      const o = ctx.createOscillator(), gn = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t0);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
      gn.gain.setValueAtTime(gain, t0);
      gn.gain.exponentialRampToValueAtTime(.0008, t0 + dur);
      o.connect(gn); gn.connect(dest || audio.music);
      o.start(t0); o.stop(t0 + dur + .02);
    }

    function hat(t0, gain, dur, fc) {
      const ctx = audio.ctx;
      const src = ctx.createBufferSource(); src.buffer = audio.noise;
      const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = fc || 6500;
      const gn = ctx.createGain();
      gn.gain.setValueAtTime(gain, t0);
      gn.gain.exponentialRampToValueAtTime(.0008, t0 + dur);
      src.connect(f); f.connect(gn); gn.connect(audio.music);
      src.start(t0); src.stop(t0 + dur + .02);
    }

    function kick(t0, gain) {
      osc('sine', 110, t0, .14, gain || .16, audio.music, 42);
    }

    /* calm theme: lazy walking bass + swung hats. escape: driving pulse */
    const BASS_CALM = [38, 41, 45, 48, 50, 48, 46, 45, 43, 46, 50, 53, 50, 48, 45, 41];
    const BASS_ESC = [38, 38, 50, 38, 41, 38, 53, 38, 36, 36, 48, 36, 43, 43, 46, 47];
    const STAB_DM7 = [62, 65, 69, 72], STAB_G7 = [55, 59, 62, 65], STAB_DIM = [62, 65, 68, 71];

    function scheduleStep(s, t) {
      const st = game.state;
      if (st === 'title' || st === 'win' || st === 'busted') return;
      const esc = game.escape;
      if (!esc) {
        if (s % 2 === 0) {
          const n = BASS_CALM[(s >> 1) % 16];
          osc('triangle', m2f(n), t, .30, .15);
        }
        hat(t, s % 2 ? .045 : .022, .035);
        if (s % 16 === 4 || s % 16 === 12) hat(t, .035, .09, 2200);
        if (s % 32 === 6) STAB_DM7.forEach(n => osc('square', m2f(n), t, .16, .018));
        if (s % 32 === 22) STAB_G7.forEach(n => osc('square', m2f(n), t, .16, .018));
      } else {
        const n = BASS_ESC[s % 16];
        osc('sawtooth', m2f(n), t, .11, .09);
        if (s % 4 === 0) kick(t, .15);
        hat(t, s % 2 ? .05 : .028, s % 16 === 14 ? .12 : .03);
        if (s % 16 === 8) STAB_DIM.forEach(n => osc('square', m2f(n), t, .12, .02));
        if (s % 32 === 30) osc('square', m2f(74), t, .2, .03, audio.music, m2f(80));
      }
    }

    function musicTick() {
      const ctx = audio.ctx;
      while (audio.next < ctx.currentTime + .12) {
        scheduleStep(audio.step, audio.next);
        const esc = game.escape;
        const bpm = esc ? 164 : 102;
        let dur = 60 / bpm / 2;
        if (!esc) dur *= (audio.step % 2 === 0) ? 1.18 : 0.82;  /* swing */
        audio.next += dur;
        audio.step++;
      }
    }

    /* ---------- sfx ---------- */
    function sfx(fn) { if (audio.ctx) fn(audio.ctx.currentTime + .01); }
    const sfxKey = () => sfx(t => { osc('square', m2f(76), t, .09, .06, audio.master); osc('square', m2f(83), t + .09, .14, .06, audio.master); });
    const sfxSpot = () => sfx(t => { osc('sawtooth', 660, t, .09, .1, audio.master); osc('sawtooth', 470, t + .1, .22, .1, audio.master, 180); });
    const sfxHide = () => sfx(t => osc('triangle', 220, t, .08, .06, audio.master, 150));
    const sfxCard = () => sfx(t => {
      hat(t, .12, .4, 1200);
      [62, 65, 69, 74].forEach((n, i) => osc('square', m2f(n), t + .12 + i * .07, .18, .05, audio.master));
    });
    const sfxDossier = () => sfx(t => [62, 65, 69, 74, 77].forEach((n, i) => osc('triangle', m2f(n), t + i * .08, .2, .07, audio.master)));
    const sfxBusted = () => sfx(t => [50, 46, 43, 38].forEach((n, i) => osc('sawtooth', m2f(n), t + i * .14, .22, .08, audio.master)));
    const sfxWin = () => sfx(t => [62, 66, 69, 74, 78, 81].forEach((n, i) => osc('square', m2f(n), t + i * .11, .26, .06, audio.master)));

    /* =====================================================================
       WORLD LOGIC
       ===================================================================== */
    const CATCH_LINES = [
      ["'HEY! Press badges don't", "work after midnight!'"],
      ["'Sir, this is a PRIVATE", "palace of corruption.'"],
      ["'You'll be hearing from all", "forty of our lawyers!'"],
      ["'No photos! ESPECIALLY", "not of the evidence!'"],
      ["'Security! The truth is", "trying to get in again!'"]
    ];

    function showMsg(lines, after) { game.msg = { lines, after: after || null }; }

    function tryMove(dx, dy, dir) {
      game.dir = dir;
      const nx = game.px + dx, ny = game.py + dy;
      const ch = mapChar(nx, ny);
      if (ch === 'D' && !game.doorOpen) { bumpDoor(); return; }
      if (ch === 'T') { bumpTreasure(); return; }
      if (isSolid(nx, ny)) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
      game.hidden = false;
    }

    let doorCooldown = 0, treasureCooldown = 0;
    function bumpDoor() {
      if (doorCooldown > 0) return;
      doorCooldown = .6;
      if (allKeys()) startCard();
      else showMsg(['The vault door is sealed.', 'It wants a badge, a map and', "somebody's password. Rude."]);
    }
    function bumpTreasure() {
      if (treasureCooldown > 0 || !game.doorOpen || game.dossier) return;
      treasureCooldown = .6;
      takeDossier();
    }

    function startCard() {
      game.state = 'card';
      game.cardT = 0;
      sfxCard();
    }
    function finishCard() {
      game.doorOpen = true;
      game.state = 'world';
      game.grace = 1.5;
      showMsg(['The palace shudders. Upstairs', 'the vault swings open and the', 'TREASURE materializes. Go!']);
    }

    function takeDossier() {
      game.dossier = true;
      game.escape = true;
      game.grace = 2;
      sfxDossier();
      showMsg(['You take THE DOSSIER!', "ALARM! 'SOMEONE IS STEALING", "OUR SECRETS!' Run to the exit!"]);
    }

    function spotPlayer(gd) {
      if (game.spot || game.state !== 'world') return;
      game.spot = { t: 0, guard: gd };
      game.hidden = false;
      sfxSpot();
    }

    function applyAlarm() {
      game.alert++;
      game.spot = null;
      if (game.alert >= 3) {
        game.state = 'busted';
        game.bustedT = 0;
        sfxBusted();
        return;
      }
      const z = zoneOfRow(game.py);
      const e = ZONE_ENTRY[z];
      game.px = game.fromX = e[0];
      game.py = game.fromY = e[1];
      game.moving = false; game.moveT = 0;
      game.dir = 'up';
      game.grace = 2;
    }

    function finishStep() {
      game.step++;
      /* key pickup */
      for (const k of KEY_DEFS) {
        if (!game.keysHave[k.id] && k.x === game.px && k.y === game.py) {
          game.keysHave[k.id] = true;
          sfxKey();
          if (k.id === 'badge') showMsg(['Got the VISITOR BADGE!', 'The photo looks nothing like', "you. Security won't care."]);
          if (k.id === 'map') showMsg(['Got the VAULT MAP! Helpfully', "labeled 'TOTALLY NOT THE", "VAULT' in red marker."]);
          if (k.id === 'pass') showMsg(['Got the PASSWORD! The intern', 'taped it under the keyboard,', 'as the prophecy foretold.']);
        }
      }
      /* exit */
      if (mapChar(game.px, game.py) === 'E') {
        if (game.dossier) { doWin(); return; }
        if (!game.exitNagged) {
          game.exitNagged = true;
          showMsg(['Leaving with no scoop?', 'Your editor would cry. The', 'Treasure is upstairs. Go.']);
        }
      } else game.exitNagged = false;
    }

    function doWin() {
      game.state = 'win';
      game.winT = 0; game.winSel = 0;
      sfxWin();
    }

    function facingTile() {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[game.dir];
      return { x: game.px + d[0], y: game.py + d[1] };
    }

    /* ---------- guards ---------- */
    function updateGuard(gd, dt) {
      const sp = game.escape ? 3.6 : 2.0;
      gd.animT += dt * (sp / 2);
      if (gd.wait > 0) { gd.wait -= dt; return; }
      const wp = gd.path[gd.wi];
      const dx = wp[0] - gd.px, dy = wp[1] - gd.py;
      const dist = Math.hypot(dx, dy);
      if (dist < .04) {
        gd.px = wp[0]; gd.py = wp[1];
        gd.wi = (gd.wi + 1) % gd.path.length;
        gd.wait = .35;
        const nw = gd.path[gd.wi];
        const ndx = nw[0] - gd.px, ndy = nw[1] - gd.py;
        if (Math.abs(ndx) >= Math.abs(ndy)) { gd.fx = Math.sign(ndx) || gd.fx; gd.fy = 0; }
        else { gd.fy = Math.sign(ndy) || gd.fy; gd.fx = 0; }
        return;
      }
      const m = Math.min(dist, sp * dt);
      gd.px += dx / dist * m; gd.py += dy / dist * m;
      if (Math.abs(dx) >= Math.abs(dy)) { gd.fx = Math.sign(dx); gd.fy = 0; }
      else { gd.fy = Math.sign(dy); gd.fx = 0; }
    }

    function castRay(cx, cy, ang, maxd) {
      const ca = Math.cos(ang), sa = Math.sin(ang);
      let d = 0;
      while (d < maxd) {
        d += 3;
        const x = cx + ca * d, y = cy + sa * d;
        if (blocksSight(Math.floor(x / T), Math.floor(y / T))) return d;
      }
      return maxd;
    }

    function canSee(gd, wx, wy) {
      const gx = gd.px * T + 8, gy = gd.py * T + 8;
      const dx = wx - gx, dy = wy - gy;
      const dist = Math.hypot(dx, dy);
      if (dist > CONE_LEN || dist < 1) return dist < 10;
      const fa = Math.atan2(gd.fy, gd.fx);
      let da = Math.atan2(dy, dx) - fa;
      while (da > Math.PI) da -= 2 * Math.PI;
      while (da < -Math.PI) da += 2 * Math.PI;
      if (Math.abs(da) > CONE_HALF) return false;
      const steps = Math.ceil(dist / 4);
      for (let i = 1; i < steps; i++) {
        const x = gx + dx * i / steps, y = gy + dy * i / steps;
        if (blocksSight(Math.floor(x / T), Math.floor(y / T))) return false;
      }
      return true;
    }

    function playerPixelCenter() {
      const lerp = game.moving ? game.moveT : 1;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      return [wx + 8, wy + 8, wx, wy];
    }

    /* ---------- world update ---------- */
    function updateWorld(dt) {
      if (doorCooldown > 0) doorCooldown -= dt;
      if (treasureCooldown > 0) treasureCooldown -= dt;
      if (game.grace > 0) game.grace -= dt;

      /* caught cutscene */
      if (game.spot) {
        game.spot.t += dt;
        if (game.spot.t > 1.0) {
          const L = CATCH_LINES[Math.floor(Math.random() * CATCH_LINES.length)];
          const nextAlert = game.alert + 1;
          const tail = nextAlert >= 3 ? 'The palace has had ENOUGH.' :
            'Dragged back to ' + ZONE_NAME[zoneOfRow(game.py)] + '.';
          showMsg([L[0], L[1], tail], 'alarm');
          game.spot = null;
        }
        return;
      }

      if (game.msg) {
        const p = popPress();
        if (isA(p) || isB(p)) {
          const after = game.msg.after;
          game.msg = null;
          if (after === 'alarm') applyAlarm();
        }
        return;
      }

      const p = popPress();
      if (isNote(p) || isB(p)) { game.state = 'status'; return; }
      if (isA(p)) {
        if (game.hidden) { game.hidden = false; sfxHide(); }
        else if (tileAt(game.px, game.py) === 'vase') { game.hidden = true; sfxHide(); }
        else {
          const f = facingTile(), ch = mapChar(f.x, f.y);
          if (ch === 'D' && !game.doorOpen) bumpDoor();
          else if (ch === 'T') {
            if (game.doorOpen && !game.dossier) takeDossier();
            else if (!game.doorOpen) showMsg(['A marble pedestal, waiting', 'for a Treasure that only a', 'calling card can summon.']);
          }
          else if (ch === 's') showMsg(['A decorative safe. Empty,', "like the palace's promises."]);
          else if (ch === 'c') showMsg(['A column of pure ego.', 'Load-bearing, apparently.']);
        }
      }

      if (!game.hidden) {
        if (game.moving) {
          game.moveT += dt * 5.2;
          if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
        } else {
          /* quick taps count too (queued press), then held keys */
          const DIRS = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
          if (typeof p === 'string' && DIRS[p]) tryMove(DIRS[p][0], DIRS[p][1], p);
          else if (keys.up) tryMove(0, -1, 'up');
          else if (keys.down) tryMove(0, 1, 'down');
          else if (keys.left) tryMove(-1, 0, 'left');
          else if (keys.right) tryMove(1, 0, 'right');
        }
      }

      /* guards patrol + detection */
      for (const gd of guards) updateGuard(gd, dt);
      if (game.grace <= 0 && !game.hidden && game.state === 'world') {
        const [pcx, pcy] = playerPixelCenter();
        for (const gd of guards) {
          if (canSee(gd, pcx, pcy)) { spotPlayer(gd); break; }
        }
      }
    }

    /* ---------- world draw ---------- */
    function drawCone(gd, camX, camY) {
      const gx = gd.px * T + 8 - camX, gy = gd.py * T + 8 - camY;
      const fa = Math.atan2(gd.fy, gd.fx);
      const pts = [[gx, gy]];
      const N = 9;
      for (let i = 0; i <= N; i++) {
        const a = fa - CONE_HALF + (2 * CONE_HALF) * i / N;
        const d = castRay(gd.px * T + 8, gd.py * T + 8, a, CONE_LEN);
        pts.push([gx + Math.cos(a) * d, gy + Math.sin(a) * d]);
      }
      const pulse = game.escape ? .26 + .08 * Math.sin(game.animClock * 8) : .18;
      poly(pts, 'rgba(228,26,44,' + pulse + ')');
      g.strokeStyle = 'rgba(244,60,72,' + (pulse + .12) + ')';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(pts[1][0], pts[1][1]);
      for (let i = 2; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.stroke();
    }

    function actorFrame(set, dirKey, animT, moving) {
      const frames = set[dirKey];
      if (!moving) return frames[0];
      const seq = [1, 0, 3, 0];
      return frames[seq[Math.floor(animT * 4) % 4]];
    }

    function drawWorld() {
      zones = [];
      const [pcx, pcy, wx, wy] = playerPixelCenter();
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++)
          g.drawImage(TILES[tileAt(i, j)], i * T - camX, j * T - camY);

      /* keys on the floor */
      const bob = Math.sin(game.animClock * 4) * 1.5;
      for (const k of KEY_DEFS) {
        if (game.keysHave[k.id]) continue;
        g.drawImage(ITEMS[k.id], k.x * T - camX + 3, k.y * T - camY + 4 + bob);
      }

      /* the Treasure (after calling card) */
      if (game.doorOpen && !game.dossier) {
        const ty = TREASURE_POS.y * T - camY - 12 + Math.sin(game.animClock * 3) * 1.5;
        const tx = TREASURE_POS.x * T - camX - 2;
        g.fillStyle = 'rgba(232,48,64,' + (.22 + .1 * Math.sin(game.animClock * 5)) + ')';
        g.beginPath(); g.arc(tx + 18, ty + 18, 22, 0, 7); g.fill();
        drawSmooth(imgChest, tx, ty, 36, 36);
      }

      /* vision cones under actors */
      for (const gd of guards) drawCone(gd, camX, camY);

      /* guards */
      for (const gd of guards) {
        const dirKey = gd.fx === 1 ? 'right' : gd.fx === -1 ? 'left' : gd.fy === -1 ? 'up' : 'down';
        const fr = actorFrame(SPR.guard, dirKey, gd.animT, gd.wait <= 0);
        g.drawImage(fr, Math.round(gd.px * T - camX + 1), Math.round(gd.py * T - camY - 4));
      }

      /* player (blinks while in grace) */
      const blink = game.grace > 0 && Math.floor(game.animClock * 8) % 2 === 0;
      if (!blink) {
        const phase = Math.floor((game.step + (game.moving ? game.moveT : 0)) * 2) % 4;
        const seq = [1, 0, 3, 0];
        const fr = game.moving ? SPR.player[game.dir][seq[phase]] : SPR.player[game.dir][0];
        g.drawImage(fr, Math.round(wx - camX + 1), Math.round(wy - camY - 4));
      }
      /* hidden: vase covers the player */
      if (game.hidden) {
        g.drawImage(TILES.vase, game.px * T - camX, game.py * T - camY);
        textCShadow('HIDDEN', wx - camX + 8, wy - camY - 14, '#f4f2ec', 6);
      }

      /* "!" over the guard that spotted you */
      if (game.spot) {
        const gd = game.spot.guard;
        const sx = gd.px * T - camX + 8, sy = gd.py * T - camY - 18;
        splash(sx, sy + 6, 11, 6, 7, '#d01830', game.animClock);
        textCShadow('!', sx, sy, '#fff', 9);
        g.fillStyle = 'rgba(190,10,30,' + (.20 + .14 * Math.sin(game.spot.t * 22)) + ')';
        g.fillRect(0, 0, 256, 192);
      }

      /* escape: red alarm pulse */
      if (game.escape && !game.spot) {
        g.fillStyle = 'rgba(200,12,32,' + (.08 + .07 * Math.sin(game.animClock * 7)) + ')';
        g.fillRect(0, 0, 256, 192);
        if (Math.floor(game.animClock * 2) % 2) textCShadow('ESCAPE!', 128, 4, '#ff5060', 8);
      }

      drawHUD();

      if (game.msg) {
        frameP5(3, 140, 250, 48, {});
        game.msg.lines.forEach((l, i) => text(l, 13, 147 + i * 11, '#f4f2ec', 7));
        if (Math.floor(game.animClock * 3) % 2) text('▼', 240, 178, '#e83040', 7);
        zone(0, 0, 256, 192, 'A');
      }
    }

    function drawHUD() {
      frameP5(2, 2, 96, 30, { cut: 5 });
      text('ALERT', 8, 7, '#f4f2ec', 6);
      for (let i = 0; i < 3; i++) {
        const ax = 48 + i * 14;
        poly([[ax, 13], [ax + 9, 13], [ax + 4.5, 5]], i < game.alert ? '#e83040' : '#3a2630');
      }
      const ids = ['badge', 'map', 'pass'];
      ids.forEach((id, i) => {
        const ix = 8 + i * 14;
        if (game.keysHave[id]) g.drawImage(ITEMS[id], ix, 18);
        else { g.globalAlpha = .25; g.drawImage(ITEMS[id], ix, 18); g.globalAlpha = 1; }
      });
      if (game.dossier) {
        g.drawImage(ITEMS.dossier, 56, 18);
        if (Math.floor(game.animClock * 3) % 2) text('!', 68, 19, '#e83040', 7);
      }
      zone(2, 2, 96, 30, 'note');
    }

    /* =====================================================================
       TITLE
       ===================================================================== */
    /* mini calling card (crisp pixel version for the title) */
    const CARD_MINI = makeSprite([
      '.rrrrrrrrrrrrrr.',
      'rwwwwwwwwwwwwwwr',
      'rwwwwwooooowwwwr',
      'rwwwwwooooowwwwr',
      'rwwwwwoRRoowwwwr',
      'rwwwooooooooowwr',
      'rwwwwwwwwwwwwwwr',
      'rwwrrwwrrwwrrwwr',
      'rwwwwwwwwwwwwwwr',
      'rwwooooooooowwwr',
      'rwwwwwwwwwwwwwwr',
      'rwwooooooowwwwwr',
      'rwwwwwwwwwwwwwwr',
      'rwwwwrrwrrwwwwwr',
      'rwwwwrrrrrwwwwwr',
      'rwwwwwrrrwwwwwwr',
      'rwwwwwwrwwwwwwwr',
      'rwwwwwwwwwwwwwwr',
      '.rrrrrrrrrrrrrr.'
    ], 3);

    let titleT = 0;
    function drawTitle(dt) {
      zones = [];
      titleT += dt;
      px(0, 0, 256, 192, '#0a080c');
      /* sliding diagonal stripes */
      g.save();
      for (let i = 0; i < 7; i++) {
        const off = ((titleT * 14 + i * 52) % 360) - 60;
        poly([[off, 192], [off + 70, 0], [off + 86, 0], [off + 16, 192]], 'rgba(160,12,28,.10)');
      }
      g.restore();
      /* big jagged splash behind the logo */
      splash(118, 78, 86, 46, 9, '#6e0c18', titleT * .05 + .4);
      splash(118, 76, 76, 40, 9, '#c01428', -titleT * .03);
      textCShadow('PALACE', 118, 44, '#f4f2ec', 16, '#000');
      textCShadow('OF SECRETS', 118, 68, '#f4f2ec', 14, '#000');
      textCShadow('A PHANTOM PRESS HEIST', 118, 94, '#ffd2d8', 6, '#000');

      /* the phantom, big */
      const wf = Math.floor(titleT * 3) % 4;
      const fr = SPR.player.right[[1, 0, 3, 0][wf]];
      g.drawImage(fr, 0, 0, 14, 18, 206, 108, 42, 54);
      /* calling card peeking */
      g.save();
      g.translate(24, 136); g.rotate(-.18 + Math.sin(titleT * 1.4) * .05);
      g.drawImage(CARD_MINI, -24, -28);
      g.restore();

      if (Math.floor(titleT * 2) % 2) textCShadow('- PRESS A TO START -', 128, 130, '#f4f2ec', 7);
      textC('sneak past the shadows', 128, 158, '#9a7c84', 6);
      textC('steal the dossier. publish.', 128, 170, '#9a7c84', 6);
      textC('stealth only - no combat', 128, 182, '#5c4850', 5);
      zone(0, 0, 256, 192, 'A');
    }

    function updateTitle() {
      const p = popPress();
      if (isA(p)) { resetRun(); game.state = 'world'; }
    }

    /* =====================================================================
       CALLING CARD CUTSCENE
       ===================================================================== */
    function drawCard(dt) {
      zones = [];
      game.cardT += dt;
      const t = game.cardT;
      px(0, 0, 256, 192, '#070509');
      splash(128, 96, 96, 50, 10, '#6e0c18', t * .35);
      splash(128, 96, 84, 44, 10, '#c01428', -t * .25);
      if (imgCard.complete) {
        const pop = 1 + Math.max(0, .5 - t) * 1.4;
        const s = 124 * pop;
        g.save();
        g.translate(128, 96);
        g.rotate(Math.sin(t * 2.2) * .07);
        drawSmooth(imgCard, -s / 2, -s / 2, s, s);
        g.restore();
      }
      if (t < .18) { g.fillStyle = 'rgba(255,255,255,' + (1 - t / .18) + ')'; g.fillRect(0, 0, 256, 192); }
      textCShadow('A CALLING CARD!', 128, 6, '#f4f2ec', 9);
      textC("'We have taken notice of your", 128, 164, '#ffd2d8', 5);
      textC("sins. We will take your secrets.'", 128, 173, '#ffd2d8', 5);
      textC('- sincerely, the press', 128, 182, '#9a7c84', 5);
      if (t > 1.2 && Math.floor(t * 2) % 2) textCShadow('PRESS A', 128, 146, '#fff', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateCard() {
      const p = popPress();
      if (game.cardT > 1.2 && (isA(p) || isB(p))) finishCard();
    }

    /* =====================================================================
       BUSTED (3 alerts)
       ===================================================================== */
    function drawBusted(dt) {
      zones = [];
      game.bustedT += dt;
      px(0, 0, 256, 192, '#0a080c');
      splash(128, 70, 90, 46, 9, '#6e0c18', .3);
      splash(128, 68, 78, 40, 9, '#c01428', -.2);
      textCShadow('ESCORTED', 128, 44, '#f4f2ec', 15);
      textCShadow('OUT!', 128, 68, '#f4f2ec', 15);
      textC("'And don't come back without", 128, 110, '#ffd2d8', 6);
      textC("a subpoena!' the shadows yell.", 128, 121, '#ffd2d8', 6);
      textC('The intern re-tapes the', 128, 138, '#9a7c84', 6);
      textC('password. The heist resets.', 128, 149, '#9a7c84', 6);
      if (game.bustedT > .8 && Math.floor(game.bustedT * 2) % 2)
        textCShadow('PRESS A TO RE-INFILTRATE', 128, 172, '#fff', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateBusted() {
      const p = popPress();
      if (game.bustedT > .8 && (isA(p) || isB(p))) { resetRun(); game.state = 'world'; }
    }

    /* =====================================================================
       WIN — front page
       ===================================================================== */
    function drawWin(dt) {
      zones = [];
      game.winT += dt;
      px(0, 0, 256, 192, '#f1ece0');
      /* halftone paper dots */
      g.fillStyle = 'rgba(0,0,0,.05)';
      for (let j = 0; j < 24; j++) for (let i = 0; i < 32; i++)
        if ((i + j) % 2) g.fillRect(i * 8 + 3, j * 8 + 3, 1, 1);
      px(0, 0, 256, 24, '#101014');
      textC('THE PHANTOM PRESS', 128, 4, '#f1ece0', 8);
      textC('FINAL EDITION - 1 COIN', 128, 15, '#9a948a', 5);

      textCShadow('TAKE THE', 128, 34, '#101014', 14, '#c01428');
      textCShadow('TRUTH', 128, 56, '#101014', 14, '#c01428');
      px(38, 78, 180, 2, '#c01428');
      textC('THE SCOOP IS PUBLISHED', 128, 86, '#c01428', 7);

      textC('Palace of secrets collapses as', 128, 102, '#3a3630', 5);
      textC('leaked dossier hits front page.', 128, 111, '#3a3630', 5);
      textC('Officials decline to comment,', 128, 120, '#3a3630', 5);
      textC('loudly, for several hours.', 128, 129, '#3a3630', 5);

      if (imgChest.complete) drawSmooth(imgChest, 16, 96, 44, 44);
      if (imgCard.complete) {
        g.save(); g.translate(222, 118); g.rotate(.2);
        drawSmooth(imgCard, -20, -20, 40, 40); g.restore();
      }
      if (Math.floor(game.winT * 2) % 2) textC('HEIST COMPLETE!', 128, 142, '#c01428', 8);

      const selA = game.winSel === 0, selB = game.winSel === 1;
      frameP5(26, 160, 120, 24, { bg: selA ? '#c01428' : '#1c1216', edge: selA ? '#fff' : '#6e5a60', acc: false, cut: 5 });
      textC('EXIT TO SITE', 86, 168, '#fff', 6);
      zone(26, 160, 120, 24, 'win', 'exit');
      frameP5(152, 160, 80, 24, { bg: selB ? '#c01428' : '#1c1216', edge: selB ? '#fff' : '#6e5a60', acc: false, cut: 5 });
      textC('PLAY ON', 192, 168, '#fff', 6);
      zone(152, 160, 80, 24, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      if (!p) return;
      if (p === 'left' || p === 'right') { game.winSel ^= 1; return; }
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else { resetRun(); game.state = 'world'; }
        return;
      }
      if (isA(p)) {
        if (game.winSel === 0) window.location.href = 'index.html';
        else { resetRun(); game.state = 'world'; }
      }
    }

    /* =====================================================================
       HEIST STATUS (pill button / B)
       ===================================================================== */
    function drawStatus() {
      zones = [];
      px(0, 0, 256, 192, '#0a080c');
      for (let i = 0; i < 6; i++)
        poly([[i * 52 - 30, 192], [i * 52 + 30, 0], [i * 52 + 42, 0], [i * 52 - 18, 192]], 'rgba(160,12,28,.08)');

      frameP5(6, 5, 244, 22, {});
      text('HEIST STATUS', 16, 12, '#f4f2ec', 8);
      text('B:CLOSE', 196, 13, '#9a7c84', 6);

      frameP5(6, 33, 244, 70, { acc: false });
      text('THE THREE SEALS', 16, 39, '#e83040', 6);
      const rows = [
        ['badge', 'VISITOR BADGE', 'west wing loop'],
        ['map', 'VAULT MAP', 'east wing loop'],
        ['pass', 'PASSWORD', 'top floor desk']
      ];
      rows.forEach((r, i) => {
        const y = 50 + i * 17;
        g.drawImage(ITEMS[r[0]], 16, y);
        const got = game.keysHave[r[0]];
        text(r[1], 32, y + 1, got ? '#f4f2ec' : '#6e5a60', 6);
        text(got ? 'SECURED' : r[2], 152, y + 1, got ? '#35c46e' : '#6e5a60', 5);
      });

      frameP5(6, 109, 244, 38, { acc: false });
      text('OBJECTIVE', 16, 115, '#e83040', 6);
      let obj1, obj2;
      if (game.dossier) { obj1 = 'RUN. Exit through the lobby'; obj2 = 'doors before the shadows bite.'; }
      else if (game.doorOpen) { obj1 = 'The Treasure is real. Take'; obj2 = 'THE DOSSIER from the vault.'; }
      else if (allKeys()) { obj1 = 'Send the calling card at the'; obj2 = 'vault door on the top floor.'; }
      else { obj1 = 'Collect the 3 seals. Stay out'; obj2 = 'of the red cones. Vases hide you.'; }
      text(obj1, 16, 126, '#f4f2ec', 6);
      text(obj2, 16, 136, '#f4f2ec', 6);

      frameP5(6, 153, 244, 34, { acc: false });
      text('ALERT', 16, 159, '#e83040', 6);
      for (let i = 0; i < 3; i++) {
        const ax = 64 + i * 16;
        poly([[ax, 168], [ax + 11, 168], [ax + 5.5, 158]], i < game.alert ? '#e83040' : '#3a2630');
      }
      text('3 strikes = escorted out', 110, 160, '#9a7c84', 5);
      text('A: hide on a vase tile', 16, 173, '#9a7c84', 5);
      text('cones = shadow eyes', 140, 173, '#9a7c84', 5);
      zone(0, 0, 256, 192, 'B');
    }

    function updateStatus() {
      const p = popPress();
      if (isA(p) || isB(p) || isNote(p)) game.state = 'world';
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      game.animClock += dt;
      g.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); if (game.state === 'world') drawWorld(); else drawTitle(dt); }
      else if (game.state === 'world') { updateWorld(dt); if (game.state === 'world') drawWorld(); else if (game.state === 'card') drawCard(0); else if (game.state === 'busted') drawBusted(0); else if (game.state === 'win') drawWin(0); }
      else if (game.state === 'card') { updateCard(); if (game.state === 'card') drawCard(dt); else drawWorld(); }
      else if (game.state === 'busted') { updateBusted(); if (game.state === 'busted') drawBusted(dt); else drawWorld(); }
      else if (game.state === 'status') { updateStatus(); if (game.state === 'status') drawStatus(); else drawWorld(); }
      else if (game.state === 'win') { updateWin(); drawWin(dt); }

      requestAnimationFrame(loop);
    }

    Promise.race([
      document.fonts.load('8px "Press Start 2P"'),
      new Promise(r => setTimeout(r, 1200))
    ]).then(() => requestAnimationFrame(loop));

    /* =====================================================================
       TEST HOOKS
       ===================================================================== */
    window.__game = game;
    window.__guards = () => guards;
    window.__giveKeys = () => { game.keysHave = { badge: true, map: true, pass: true }; };
    window.__warp = (x, y) => { game.px = game.fromX = x; game.py = game.fromY = y; game.moving = false; game.moveT = 0; };
    window.__card = () => startCard();
    window.__openVault = () => { game.doorOpen = true; };
    window.__dossier = () => takeDossier();
    window.__alarm = () => spotPlayer(guards[0]);
    window.__win = () => doWin();
    window.__reset = () => resetRun();
  </script>
</body>

</html>
