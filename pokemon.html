<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Route 26 — Investigative Edition | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="images/pokemon/foia_paper.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #1a1417;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 20%, rgba(120, 80, 160, .15), transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(60, 120, 160, .12), transparent 50%),
        #1a1417;
    }

    /* ============ carcaça do DS ============ */
    .ds-shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 22px 26px;
      background: linear-gradient(160deg, #2e2a33, #221e26);
      border-radius: 26px;
      border: 2px solid #443e4c;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(255, 255, 255, .08);
      position: relative;
    }

    .ds-screen {
      position: relative;
      width: 512px;
      height: 384px;
      background: #000;
      border: 10px solid #14111a;
      border-radius: 8px;
      box-shadow: inset 0 0 18px rgba(0, 0, 0, .9);
    }

    .ds-screen canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .ds-hinge {
      height: 10px;
      margin: -4px 30px;
      background: linear-gradient(90deg, #181420, #2a2530 30%, #2a2530 70%, #181420);
      border-radius: 5px;
    }

    .ds-brand {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 7px;
      letter-spacing: .35em;
      color: #6b6375;
    }

    /* responsivo: escala a carcaça inteira */
    @media (max-width: 620px), (max-height: 940px) {
      .ds-shell { transform: scale(var(--ds-scale, 1)); transform-origin: center; }
    }

    /* botão de sair discreto */
    .quit-link {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #8d8498;
      text-decoration: none;
      border: 2px solid #443e4c;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(20, 17, 26, .7);
    }

    .quit-link:hover { color: #fff; border-color: #8d8498; }
  </style>
</head>

      for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) {

        if (col) { x.fillStyle = col; x.fillRect(i * scale, j * scale, scale, scale); }
      }
      return cv;
    }

      keys[k] = true;
    });
    window.addEventListener('keyup', e => { const k = KEYMAP[e.key]; if (k) keys[k] = false; });

    /* zonas de toque da tela de baixo (coordenadas no canvas 256x192) */
    let touchZones = [];
    function zone(x, y, w, h, act, data) { touchZones.push({ x, y, w, h, act, data }); }

    function canvasPos(e) {
      const r = botC.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - r.left) * 256 / r.width, y: (t.clientY - r.top) * 192 / r.height };
    }

    let heldZone = null;
    function handleDown(e) {
      e.preventDefault();
      const p = canvasPos(e);
      for (const z of touchZones) {
        if (p.x >= z.x && p.x < z.x + z.w && p.y >= z.y && p.y < z.y + z.h) {
          if (z.act === 'dir') { heldZone = z; keys[z.data] = true; }
          else pressQueue.push(z.act === 'btn' ? z.data : z);
          return;
        }
      }
    }
    function handleUp(e) {
      e.preventDefault();
      if (heldZone) { keys[heldZone.data] = false; heldZone = null; }
    }
    botC.addEventListener('mousedown', handleDown);
    botC.addEventListener('mouseup', handleUp);
    botC.addEventListener('mouseleave', handleUp);
    botC.addEventListener('touchstart', handleDown, { passive: false });
    botC.addEventListener('touchend', handleUp, { passive: false });
    botC.addEventListener('touchcancel', handleUp, { passive: false });

    function popPress() { return pressQueue.shift(); }

    /* =====================================================================
       HELPERS DE DESENHO
       ===================================================================== */
    function px(ctx, x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(x | 0, y | 0, w, h); }

    function frame9(ctx, x, y, w, h, opts = {}) {
      // caixa de diálogo estilo DS
      const bg = opts.bg || '#f8f8f0', edge = opts.edge || '#5878a8', dark = opts.dark || '#385888';
      px(ctx, x + 2, y + 2, w - 4, h - 4, bg);
      px(ctx, x + 2, y, w - 4, 2, dark); px(ctx, x + 2, y + h - 2, w - 4, 2, dark);
      px(ctx, x, y + 2, 2, h - 4, dark); px(ctx, x + w - 2, y + 2, 2, h - 4, dark);
      px(ctx, x + 2, y + 2, w - 4, 1, edge); px(ctx, x + 2, y + h - 3, w - 4, 1, edge);
      px(ctx, x + 2, y + 2, 1, h - 4, edge); px(ctx, x + w - 3, y + 2, 1, h - 4, edge);
    }

    function text(ctx, str, x, y, col = '#303030', size = 8) {
      ctx.font = size + 'px "Press Start 2P"';
      ctx.textBaseline = 'top';
      ctx.fillStyle = col;
      ctx.fillText(str, x, y);
    }

    function hpBar(ctx, x, y, w, ratio) {
      px(ctx, x - 1, y - 1, w + 2, 6, '#404040');
      px(ctx, x, y, w, 4, '#f8f8f8');
      const col = ratio > .5 ? '#58c858' : ratio > .2 ? '#f0c020' : '#e05038';
      px(ctx, x, y, Math.max(0, Math.round(w * ratio)), 4, col);
    }

    /* =====================================================================
       OVERWORLD
       ===================================================================== */
    function tileAt(x, y) {
      if (x < 0 || y < 0 || x >= MAPW || y >= MAPH) return 'tree';
      return CHAR2TILE[MAP_STR[y][x]] || 'grass';
    }

    function tryMove(dx, dy, dir) {
      game.dir = dir;
      const nx = game.px + dx, ny = game.py + dy;
      if (SOLID[tileAt(nx, ny)]) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
    }

    function finishStep() {
      game.step++;
      const t = tileAt(game.px, game.py);
      if (t === 'tall') {
        game.rustle = { x: game.px, y: game.py, t: 0 };
        const all5 = DEX.slice(0, 5).every(d => game.caught[d.id]);
        if (!game.caught.GOVRECORD && all5 && Math.random() < .25) return startBattle(DEX[5]);
        if (Math.random() < .14) {
          const pool = DEX.slice(0, 5);
          let r = Math.random() * pool.reduce((s, d) => s + d.rate, 0);
          for (const d of pool) { r -= d.rate; if (r <= 0) return startBattle(d); }
          return startBattle(pool[0]);
        }
      }
    }

    function facingTile() {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[game.dir];
      return { x: game.px + d[0], y: game.py + d[1] };
    }

    function updateWorld(dt) {
      if (game.msg) {
        const p = popPress();
        if (p === 'A' || p === 'B') game.msg = null;
        return;
      }
      const p = popPress();
      if (p === 'A') {
        const f = facingTile();
        const key = f.x + ',' + f.y;
        if (tileAt(f.x, f.y) === 'sign' && SIGN_TEXT[key]) game.msg = { lines: SIGN_TEXT[key] };
        else if (p === 'A' && tileAt(f.x, f.y) === 'water') game.msg = { lines: ['The pond is calm.', 'A shredded document', 'floats by...'] };
      }
      if (p === 'dex' || p === 'B') game.state = 'dex';

      if (game.moving) {
        game.moveT += dt * 6.5;
        if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
      } else {
        if (keys.up) tryMove(0, -1, 'up');
        else if (keys.down) tryMove(0, 1, 'down');
        else if (keys.left) tryMove(-1, 0, 'left');
        else if (keys.right) tryMove(1, 0, 'right');
      }
      if (game.rustle) { game.rustle.t += dt * 3; if (game.rustle.t > 1) game.rustle = null; }
    }

    function drawWorld() {
      const lerp = game.moving ? game.moveT : 0;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++)
          tc.drawImage(TILES[tileAt(i, j)], i * T - camX, j * T - camY);

      /* personagem */
      const dirFrames = SPR.player[game.dir];
      const fi = game.moving ? (game.step % 2 ? 1 : 3) : 0;
      const frame = game.moving && game.moveT > .5 ? dirFrames[0] : dirFrames[fi];
      tc.drawImage(frame, Math.round(wx - camX + 1), Math.round(wy - camY - 4));

      /* matinho na frente do personagem quando dentro dele */
      if (tileAt(game.px, game.py) === 'tall' && !game.moving)
        tc.drawImage(TILES.tall, game.px * T - camX, game.py * T - camY);

      if (game.rustle) {
        const r = game.rustle;
        tc.fillStyle = 'rgba(120,200,90,.9)';
        for (let i = 0; i < 4; i++) {
          const a = r.t * Math.PI;
          tc.fillRect(r.x * T - camX + 4 + i * 3, r.y * T - camY + 4 - Math.sin(a + i) * 6, 2, 2);
        }
      }

      /* placa de mensagem */
      if (game.msg) {
        frame9(tc, 4, 130, 248, 58);
        game.msg.lines.forEach((l, i) => text(tc, l, 12, 138 + i * 12, '#303030', 8));
        text(tc, '▼', 238, 176, '#e05038', 8);
      }
    }

    function drawWorldBottom() {
      touchZones = [];
      /* fundo da tela de baixo estilo menu HGSS */
      px(bc, 0, 0, 256, 192, '#283848');
      for (let j = 0; j < 12; j++) for (let i = 0; i < 16; i++)
        if ((i + j) % 2) px(bc, i * 16, j * 16, 16, 16, '#2e4050');

      /* D-pad */
      const dx = 52, dy = 96;
      px(bc, dx - 14, dy - 42, 28, 84, '#1a232e');
      px(bc, dx - 42, dy - 14, 84, 28, '#1a232e');
      px(bc, dx - 12, dy - 40, 24, 80, '#3e5468');
      px(bc, dx - 40, dy - 12, 80, 24, '#3e5468');
      bc.fillStyle = '#243240';
      bc.beginPath(); bc.moveTo(dx, dy - 30); bc.lineTo(dx - 7, dy - 20); bc.lineTo(dx + 7, dy - 20); bc.fill();
      bc.beginPath(); bc.moveTo(dx, dy + 30); bc.lineTo(dx - 7, dy + 20); bc.lineTo(dx + 7, dy + 20); bc.fill();
      bc.beginPath(); bc.moveTo(dx - 30, dy); bc.lineTo(dx - 20, dy - 7); bc.lineTo(dx - 20, dy + 7); bc.fill();
      bc.beginPath(); bc.moveTo(dx + 30, dy); bc.lineTo(dx + 20, dy - 7); bc.lineTo(dx + 20, dy + 7); bc.fill();
      zone(dx - 14, dy - 44, 28, 30, 'dir', 'up');
      zone(dx - 14, dy + 14, 28, 30, 'dir', 'down');
      zone(dx - 44, dy - 14, 30, 28, 'dir', 'left');
      zone(dx + 14, dy - 14, 30, 28, 'dir', 'right');

      /* botões A/B */
      function roundBtn(x, y, label, col) {
        bc.fillStyle = '#1a232e'; bc.beginPath(); bc.arc(x, y, 17, 0, 7); bc.fill();
        bc.fillStyle = col; bc.beginPath(); bc.arc(x, y, 14, 0, 7); bc.fill();
        text(bc, label, x - 4, y - 5, '#fff', 9);
      }
      roundBtn(206, 78, 'A', '#b04a40');
      roundBtn(168, 114, 'B', '#3e5468');
      zone(188, 60, 36, 36, 'btn', 'A');
      zone(150, 96, 36, 36, 'btn', 'B');

      /* barra de status: caderno */
      frame9(bc, 4, 4, 248, 30, { bg: '#f0f0e0' });
      text(bc, 'SOURCE NOTEBOOK', 12, 10, '#385888', 7);
      text(bc, caughtCount() + '/6 CAUGHT', 12, 20, '#303030', 7);
      text(bc, 'HP ' + game.hp + '/' + game.maxhp, 150, 10, '#303030', 7);
      text(bc, 'COFFEE x' + game.coffee, 150, 20, '#6b4226', 7);
      zone(4, 4, 248, 30, 'btn', 'dex');

      text(bc, 'B/TAP CARD: NOTEBOOK', 50, 174, '#7a8aa0', 7);
    }

    /* =====================================================================
       CADERNO (DEX)
       ===================================================================== */
    function updateDex() {
      const p = popPress();
      if (p === 'A' || p === 'B' || (p && p.act === 'close')) game.state = 'world';
    }

    function drawDex() {
      px(tc, 0, 0, 256, 192, '#203048');
      frame9(tc, 6, 4, 244, 184, { bg: '#f0f0e0' });
      text(tc, 'SOURCE NOTEBOOK', 64, 12, '#385888', 9);
      DEX.forEach((d, i) => {
        const y = 30 + i * 25;
        const got = game.caught[d.id];
        px(tc, 14, y, 228, 22, got ? '#d8e8d0' : '#e0e0d8');
        px(tc, 14, y, 228, 1, '#a0a098');
        if (got) {
          if (d.sprite) tc.drawImage(d.sprite, 16, y + 3, 16, 16);
          else tc.drawImage(imgGovRecord, 16, y + 3, 16, 16);
          text(tc, d.name, 40, y + 3, '#283038', 8);
          text(tc, d.kind, 40, y + 13, '#687078', 6);
          text(tc, 'CAUGHT', 188, y + 8, '#388048', 7);
        } else {
          text(tc, '?????', 40, y + 8, '#909088', 8);
        }
      });
    }

    function drawDexBottom() {
      touchZones = [];
      px(bc, 0, 0, 256, 192, '#283848');
      frame9(bc, 30, 60, 196, 70, { bg: '#f0f0e0' });
      const last = game.lastInfo;
      if (last) {
        text(bc, last.name, 40, 70, '#385888', 8);
        wrapText(bc, last.blurb, 40, 84, 180, '#404040', 7);
      } else {
        text(bc, 'Walk in tall grass to', 44, 80, '#404040', 7);
        text(bc, 'find wild documents!', 44, 92, '#404040', 7);
      }
      frame9(bc, 88, 150, 80, 26, { bg: '#e8d8c0' });
      text(bc, 'CLOSE', 108, 159, '#604020', 8);
      zone(88, 150, 80, 26, 'btn', 'B');
    }

    function wrapText(ctx, str, x, y, maxW, col, size) {
      const words = str.split(' ');
      let line = '', yy = y;
      ctx.font = size + 'px "Press Start 2P"';
      for (const w of words) {
        if (ctx.measureText(line + w).width > maxW) { text(ctx, line, x, yy, col, size); line = w + ' '; yy += size + 3; }
        else line += w + ' ';
      }
      text(ctx, line, x, yy, col, size);
    }

    /* =====================================================================
       BATALHA
       ===================================================================== */
    const MOVES = [
      { name: 'TOUGH QUESTION', dmg: [4, 8] },
      { name: 'CROSS-CHECK', dmg: [6, 10] },
      { name: 'DATA SCRAPE', dmg: [3, 12] },
      { name: 'EXPOSE', dmg: [8, 11] }
    ];
    const ENEMY_MOVES = ['REDACT', 'DELAY RESPONSE', 'SPIN STORY', 'JARGON WALL'];

    function startBattle(species) {
      const lv = species.lv[0] + Math.floor(Math.random() * (species.lv[1] - species.lv[0] + 1));
      game.battle = {
        sp: species, lv,
        ehp: species.hp, emax: species.hp,
        phase: 'intro',         // intro | menu | moves | anim | msg | caught | over
        queue: [],
        foiaT: 0, shake: 0, flash: 1, t: 0
      };
      game.state = 'battle';
      playMusic(mBattle);
      bmsg(['A wild ' + species.name + ' appeared!', '(' + species.kind + ')'], 'menu');
    }

    function bmsg(lines, next) {
      game.battle.phase = 'msg';
      game.battle.queue.push({ lines, next });
    }

    function endBattle(toWorld = true) {
      game.battle = null;
      if (caughtCount() >= 6) { game.state = 'win'; game.winT = 0; playMusic(mWin); return; }
      if (toWorld) { game.state = 'world'; playMusic(mGrass); }
    }

    function enemyTurn() {
      const b = game.battle;
      const dmg = Math.max(1, Math.round(b.sp.atk * (0.7 + Math.random() * 0.7)));
      game.hp = Math.max(0, game.hp - dmg);
      b.shake = 1;
      const mv = ENEMY_MOVES[Math.floor(Math.random() * ENEMY_MOVES.length)];
      bmsg([b.sp.name + ' used ' + mv + '!', 'Your credibility took ' + dmg + ' damage.'], game.hp <= 0 ? 'faint' : 'menu');
    }

    function doAttack(mi) {
      const b = game.battle;
      const m = MOVES[mi];
      const dmg = m.dmg[0] + Math.floor(Math.random() * (m.dmg[1] - m.dmg[0] + 1));
      b.ehp = Math.max(0, b.ehp - dmg);
      b.flash = 1;
      if (b.ehp <= 0) {
        bmsg(['You used ' + m.name + '!', b.sp.name + ' was debunked!', '...but it fled before you', 'could file it. Catch them!'], 'flee');
      } else {
        bmsg(['You used ' + m.name + '!', 'It dealt ' + dmg + ' damage.'], 'enemy');
      }
    }

    function doFoia() {
      const b = game.battle;
      b.phase = 'anim';
      b.foiaT = 0;
      b.onAnimDone = () => {
        const chance = .25 + .65 * (1 - b.ehp / b.emax);
        if (Math.random() < chance) {
          game.caught[b.sp.id] = true;
          game.lastInfo = b.sp;
          b.caughtFlag = true;
          bmsg(['Gotcha! ' + b.sp.name + ' was', 'FILED in your notebook!', '(' + caughtCount() + '/6 sources secured)'], 'caughtEnd');
        } else {
          bmsg(['Oh no! The request was', 'DENIED. Article 23, they say.', b.sp.name + ' resists!'], 'enemy');
        }
      };
    }

    function doCoffee() {
      if (game.coffee <= 0) return bmsg(['No coffee left!', 'A journalist without coffee...'], 'menu');
      game.coffee--;
      game.hp = Math.min(game.maxhp, game.hp + 20);
      bmsg(['You drank strong coffee.', 'Credibility restored by 20!'], 'enemy');
    }

    function updateBattle(dt) {
      const b = game.battle;
      b.t += dt;
      if (b.flash > 0) b.flash -= dt * 2;
      if (b.shake > 0) b.shake -= dt * 2;

      if (b.phase === 'anim') {
        b.foiaT += dt * 1.2;
        if (b.foiaT >= 1) { b.phase = 'msg'; b.onAnimDone(); }
        return;
      }

      const p = popPress();
      if (b.phase === 'msg') {
        if (p === 'A' || p === 'B') {
          const cur = b.queue.shift();
          const next = cur ? cur.next : 'menu';
          if (b.queue.length) return;
          if (next === 'menu') b.phase = 'menu';
          else if (next === 'enemy') enemyTurn();
          else if (next === 'flee') endBattle();
          else if (next === 'caughtEnd') endBattle();
          else if (next === 'faint') {
            game.hp = Math.round(game.maxhp / 2);
            bmsg(['You blacked out from stress!', '...an editor revived you', 'with deadline pressure.'], 'fleeHome');
          }
          else if (next === 'fleeHome') endBattle();
        }
        return;
      }

      if (b.phase === 'menu' && p && p.act === 'battle') {
        const a = p.data;
        if (a === 'fight') b.phase = 'moves';
        else if (a === 'foia') doFoia();
        else if (a === 'bag') doCoffee();
        else if (a === 'run') {
          if (b.sp.id === 'GOVRECORD') bmsg(['You cannot run from', 'public records!'], 'menu');
          else bmsg(['You got away safely.', '(The story can wait.)'], 'flee');
        }
      } else if (b.phase === 'moves' && p) {
        if (p === 'B') { b.phase = 'menu'; return; }
        if (p.act === 'move') doAttack(p.data);
        if (p.act === 'back') b.phase = 'menu';
      }
    }

    function drawBattle() {
      const b = game.battle;
      /* céu HGSS */
      const grad = tc.createLinearGradient(0, 0, 0, 192);
      grad.addColorStop(0, '#78c8f0'); grad.addColorStop(.55, '#b8e4f8'); grad.addColorStop(.56, '#88c060'); grad.addColorStop(1, '#58a048');
      tc.fillStyle = grad; tc.fillRect(0, 0, 256, 192);

      /* plataformas */
      tc.fillStyle = '#70b058';
      tc.beginPath(); tc.ellipse(186, 92, 56, 16, 0, 0, 7); tc.fill();
      tc.fillStyle = '#5c9848';
      tc.beginPath(); tc.ellipse(64, 168, 62, 18, 0, 0, 7); tc.fill();

      const shakeX = b.shake > 0 ? Math.round(Math.sin(b.t * 60) * 3 * b.shake) : 0;

      /* inimigo */
      const bob = Math.sin(b.t * 2.5) * 2;
      if (!(b.phase === 'anim' && b.foiaT > .8)) {
        if (b.flash > 0 && Math.floor(b.t * 20) % 2) { /* pisca ao tomar dano */ }
        else if (b.sp.sprite) tc.drawImage(b.sp.sprite, 154, 28 + bob, 64, 64);
        else tc.drawImage(imgGovRecord, 150, 20 + bob, 72, 72);
      }

      /* jornalista (costas) */
      tc.drawImage(imgTrainerBack, 18 + shakeX, 96, 84, 84);

      /* papel FOIA voando */
      if (b.phase === 'anim') {
        const t = b.foiaT;
        const fx = 90 + t * 90, fy = 140 - Math.sin(t * Math.PI) * 90;
        tc.save();
        tc.translate(fx, fy); tc.rotate(t * 9);
        tc.drawImage(imgFoia, -10, -10, 20, 20);
        tc.restore();
      }

      /* caixa de status do inimigo */
      frame9(tc, 6, 10, 120, 36, { bg: '#f8f8e8' });
      text(tc, b.sp.name, 12, 16, '#303030', 7);
      text(tc, 'Lv' + b.lv, 96, 16, '#303030', 7);
      hpBar(tc, 30, 30, 84, b.ehp / b.emax);
      text(tc, 'HP', 12, 28, '#e07820', 7);

      /* caixa de status do jogador */
      frame9(tc, 132, 130, 118, 42, { bg: '#f8f8e8' });
      text(tc, 'JOURNALIST', 140, 136, '#303030', 7);
      text(tc, 'Lv99', 216, 136, '#303030', 7);
      hpBar(tc, 158, 150, 80, game.hp / game.maxhp);
      text(tc, 'HP', 140, 148, '#e07820', 7);
      text(tc, game.hp + '/' + game.maxhp, 168, 160, '#484848', 7);

      /* mensagem */
      if (b.phase === 'msg' && b.queue.length) {
        frame9(tc, 2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        b.queue[0].lines.forEach((l, i) => text(tc, l, 10, 149 + i * 10, '#f8f8f8', 7));
        text(tc, '▼', 240, 180, '#f8b048', 7);
      }
    }

    function drawBattleBottom() {
      touchZones = [];
      const b = game.battle;
      /* fundo touch HGSS */
      px(bc, 0, 0, 256, 192, '#203040');
      for (let j = 0; j < 12; j++) for (let i = 0; i < 16; i++)
        if ((i + j) % 2) px(bc, i * 16, j * 16, 16, 16, '#243648');

      function bigBtn(x, y, w, h, label, sub, colA, colB, act, data) {
        px(bc, x + 3, y + h, w, 4, 'rgba(0,0,0,.4)');
        px(bc, x, y, w, h, colB);
        px(bc, x + 3, y + 3, w - 6, h - 6, colA);
        text(bc, label, x + Math.round(w / 2 - label.length * 4), y + Math.round(h / 2) - (sub ? 12 : 5), '#fff', 8);

      }

      if (b.phase === 'menu') {
        bigBtn(10, 14, 114, 70, 'INVESTIGATE', 'attack moves', '#c85038', '#882818', 'battle', 'fight');
        bigBtn(132, 14, 114, 70, 'FILE FOIA', 'try to catch!', '#3878c8', '#184888', 'battle', 'foia');
        bigBtn(10, 96, 114, 60, 'BAG', 'coffee x' + game.coffee, '#c8a030', '#886810', 'battle', 'bag');
        bigBtn(132, 96, 114, 60, 'RUN', 'drop the story', '#588048', '#305828', 'battle', 'run');

      } else if (b.phase === 'moves') {

        });
        bigBtn(78, 152, 100, 28, 'BACK', null, '#606878', '#383e48', 'back', 0);
      } else {
        frame9(bc, 58, 70, 140, 50, { bg: '#f0f0e0' });
        text(bc, b.phase === 'anim' ? 'FILING REQUEST...' : 'PRESS A TO CONTINUE', b.phase === 'anim' ? 64 : 58, 90, '#385888', 6);
        zone(0, 0, 256, 192, 'btn', 'A');
      }
    }

    /* =====================================================================
       TITLE & WIN
       ===================================================================== */
    let titleT = 0;
    function drawTitle(dt) {
      titleT += dt;
      px(tc, 0, 0, 256, 192, '#102030');
      /* faixa de céu noturno com "matinho" */
      const g = tc.createLinearGradient(0, 0, 0, 192);
      g.addColorStop(0, '#16283e'); g.addColorStop(.7, '#1c3a2e'); g.addColorStop(1, '#234828');
      tc.fillStyle = g; tc.fillRect(0, 0, 256, 192);
      for (let i = 0; i < 24; i++) {
        const sx = (i * 47) % 256, sy = (i * 31) % 80;
        if (Math.floor(titleT * 2 + i) % 3) px(tc, sx, sy, 1, 1, '#cfe8ff');
      }
      for (let i = 0; i < 16; i++) tc.drawImage(TILES.tall, i * 16, 176);
      tc.drawImage(SPR.player.right[Math.floor(titleT * 3) % 2 ? 1 : 0], 120, 156);

      text(tc, 'ROUTE 26', 92, 38, '#f8d048', 9);
      text(tc, 'INVESTIGATIVE EDITION', 45, 56, '#f8f8f8', 8);
      px(tc, 44, 70, 168, 1, '#48688a');
      text(tc, 'catch wild documents', 50, 82, '#9ab8d0', 7);
      text(tc, 'in the tall grass', 62, 94, '#9ab8d0', 7);
      if (Math.floor(titleT * 2) % 2) text(tc, '- PRESS A / TAP START -', 38, 126, '#f8f8f8', 7);
    }

    function drawTitleBottom() {
      touchZones = [];
      px(bc, 0, 0, 256, 192, '#182838');
      frame9(bc, 48, 60, 160, 44, { bg: '#c84838', edge: '#f8a890', dark: '#802818' });
      text(bc, 'START', 108, 78, '#fff', 9);
      zone(48, 60, 160, 44, 'btn', 'A');
      text(bc, 'ARROWS/WASD: MOVE', 56, 130, '#7a8aa0', 7);
      text(bc, 'Z/ENTER: A   X: B', 60, 144, '#7a8aa0', 7);
      text(bc, 'OR USE THE TOUCH SCREEN', 36, 158, '#7a8aa0', 7);
    }

    function updateTitle() {
      const p = popPress();
      if (p === 'A') {
        game.state = 'world';
        playMusic(mGrass);
      }
    }

    function drawWin(dt) {
      game.winT += dt;
      px(tc, 0, 0, 256, 192, '#f8f4e8');
      /* manchete de jornal */
      px(tc, 0, 0, 256, 40, '#202020');
      text(tc, 'THE DAILY RECORD', 56, 10, '#f8f4e8', 9);
      text(tc, 'special edition', 86, 26, '#c8c0a8', 6);
      text(tc, 'SCOOP! ALL 6 SOURCES', 30, 56, '#202020', 9);
      text(tc, 'SECURED VIA FOIA', 54, 72, '#202020', 9);
      px(tc, 24, 92, 208, 1, '#888');
      text(tc, 'Journalist L. TOLEDO closes', 26, 102, '#404040', 6);
      text(tc, 'the notebook: every wild', 26, 114, '#404040', 6);
      text(tc, 'document is now on record.', 26, 126, '#404040', 6);
      DEX.forEach((d, i) => {
        const x = 40 + i * 30;
        if (d.sprite) tc.drawImage(d.sprite, x, 140, 24, 24);
        else tc.drawImage(imgGovRecord, x, 140, 24, 24);
      });
      if (Math.floor(game.winT * 2) % 2) text(tc, 'CASE CLOSED!', 84, 174, '#c83828', 8);
    }

    function drawWinBottom() {
      touchZones = [];
      px(bc, 0, 0, 256, 192, '#182838');
      text(bc, 'CONGRATULATIONS!', 64, 40, '#f8d048', 8);
      text(bc, 'you finished the route', 42, 58, '#9ab8d0', 7);
      frame9(bc, 38, 90, 180, 36, { bg: '#c84838', edge: '#f8a890', dark: '#802818' });
      text(bc, 'BACK TO PORTFOLIO', 60, 103, '#fff', 8);
      zone(38, 90, 180, 36, 'win', 'exit');
      frame9(bc, 58, 138, 140, 30, { bg: '#385888', edge: '#88a8d8', dark: '#182848' });
      text(bc, 'KEEP WALKING', 80, 148, '#fff', 8);
      zone(58, 138, 140, 30, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else { game.caught = {}; game.hp = game.maxhp; game.coffee = 3; game.state = 'world'; playMusic(mGrass); }
      }
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      tc.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); drawTitle(dt); drawTitleBottom(); }
      else if (game.state === 'world') { updateWorld(dt); drawWorld(); drawWorldBottom(); }
      else if (game.state === 'dex') { updateDex(); drawDex(); drawDexBottom(); }
      else if (game.state === 'battle') {
        updateBattle(dt);
        if (game.state === 'battle' && game.battle) { drawBattle(); drawBattleBottom(); }
      }
      else if (game.state === 'win') { updateWin(); drawWin(dt); drawWinBottom(); }

      requestAnimationFrame(loop);
    }

    document.fonts.load('8px "Press Start 2P"').then(() => {
      fitShell();
      requestAnimationFrame(loop);
    });

    /* hook de teste */
    window.__game = game;
    window.__startBattle = i => startBattle(DEX[i]);
  </script>
</body>

</html>
