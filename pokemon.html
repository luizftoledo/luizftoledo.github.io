<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Route 26 — Investigative Edition | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="images/pokemon/foia_paper.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #14101a;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      background:
        radial-gradient(circle at 25% 15%, rgba(110, 70, 150, .16), transparent 50%),
        radial-gradient(circle at 75% 85%, rgba(50, 110, 150, .13), transparent 50%),
        #14101a;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw - 16px, 168vh - 290px, 760px);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 6px solid #221c2c;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .65), inset 0 0 16px rgba(0, 0, 0, .8);
    }

    canvas#screen {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    /* ===== controles abaixo da tela (nunca sobre a imagem) ===== */
    .pad {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(100vw - 16px, 760px);
      padding: 10px 14px;
      background: #1d1726;
      border: 2px solid #2e2640;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
    }

    .dpad {
      position: relative;
      width: 108px;
      height: 108px;
      flex: 0 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #3a3050;
      border: 2px solid #4e4070;
      color: #b8a8d8;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .dpad button:active { background: #574a80; }
    .dpad .up { top: 0; left: 36px; }
    .dpad .down { bottom: 0; left: 36px; }
    .dpad .left { top: 36px; left: 0; }
    .dpad .right { top: 36px; right: 0; }
    .dpad .mid { top: 36px; left: 36px; background: #2a2438; border-color: #2a2438; pointer-events: none; border-radius: 4px; }

    .pad-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      color: #cfc2e8;
      background: #322a48;
      border: 2px solid #4e4070;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill-btn:active { background: #574a80; }

    .key-hint {
      font-size: 7px;
      line-height: 1.7;
      color: #6e6288;
      text-align: center;
    }

    .ab {
      position: relative;
      width: 116px;
      height: 96px;
      flex: 0 0 auto;
    }

    .ab button {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      border: 0;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .45);
      touch-action: none;
    }

    .ab button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, .45); }
    .ab .a { right: 0; top: 0; background: #c0463c; border: 2px solid #e07868; }
    .ab .b { left: 0; bottom: 0; background: #3e5468; border: 2px solid #648098; }

    /* ===== topo: sair fácil + volume ===== */
    .quit-link {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #fff;
      text-decoration: none;
      border: 2px solid #e07868;
      padding: 9px 13px;
      border-radius: 8px;
      background: rgba(192, 70, 60, .92);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .4);
    }

    .quit-link:hover { background: #d85848; }

    .audio-ctl {
      position: fixed;
      top: 10px;
      left: 12px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(29, 23, 38, .92);
      border: 2px solid #2e2640;
      border-radius: 999px;
      padding: 6px 12px;
    }

    .audio-ctl button {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      background: none;
      border: 0;
      color: #cfc2e8;
      cursor: pointer;
      line-height: 1;
    }

    .audio-ctl input[type=range] {
      width: 74px;
      accent-color: #b04a40;
      cursor: pointer;
    }

    /* desktop (mouse + teclado): esconde o pad, mostra dica de teclas, tela maior */
    .kbd-bar {
      display: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      line-height: 1.8;
      color: #8d8498;
      text-align: center;
      padding: 4px 10px;
    }

    @media (hover: hover) and (pointer: fine) {
      .pad { display: none; }
      .kbd-bar { display: block; }
      .screen-wrap { width: min(100vw - 16px, 152vh - 120px, 840px); }
    }

    @media (max-width: 560px) {
      body { gap: 8px; padding: 6px; }
      .pad { padding: 8px 8px; gap: 6px; }
      .dpad { width: 96px; height: 96px; }
      .dpad button { width: 32px; height: 32px; }
      .dpad .up, .dpad .down { left: 32px; }
      .dpad .mid { top: 32px; left: 32px; }
      .key-hint { display: none; }
      .ab { width: 104px; height: 88px; }
      .ab button { width: 48px; height: 48px; }
      .audio-ctl input[type=range] { width: 52px; }
    }
  </style>
</head>

<body>
  <div class="audio-ctl">
    <button id="muteBtn" aria-label="mute">♪</button>
    <input id="volRange" type="range" min="0" max="100" value="60" aria-label="volume">
  </div>
  <a class="quit-link" href="index.html">&larr; PORTFOLIO</a>

  <div class="screen-wrap">
    <!-- buffer interno 4x (1024x768) pra ficar nítido mesmo onde o CSS borra (Safari) -->
    <canvas id="screen" width="1024" height="768"></canvas>
  </div>

  <div class="pad">
    <div class="dpad">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <div class="mid dpad-mid"></div>
      <button class="right" data-dir="right">▶</button>
      <button class="down" data-dir="down">▼</button>
    </div>
    <div class="pad-center">
      <button class="pill-btn" id="noteBtn">NOTEBOOK</button>
      <div class="key-hint">ARROWS/WASD&nbsp;MOVE<br>Z/ENTER&nbsp;=&nbsp;A&nbsp;&nbsp;X/ESC&nbsp;=&nbsp;B</div>
    </div>
    <div class="ab">
      <button class="b" data-btn="B">B</button>
      <button class="a" data-btn="A">A</button>
    </div>
  </div>

  <div class="kbd-bar">ARROWS/WASD move &nbsp;·&nbsp; Z/ENTER = A &nbsp;·&nbsp; X/ESC = B (notebook)</div>

    /* =====================================================================

       ===================================================================== */

    const cv = document.getElementById('screen'), g = cv.getContext('2d');
    g.scale(4, 4);               // coordenadas lógicas continuam 256x192
    g.imageSmoothingEnabled = false;

    const WIN_N = 3;             // capturas necessárias pra fechar o caderno

    /* ---------- áudio + volume ---------- */
    const mGrass = document.getElementById('mGrass');
    const mBattle = document.getElementById('mBattle');
    const mWin = document.getElementById('mWin');
    const BASE_VOL = [[mGrass, .9], [mBattle, .82], [mWin, 1]];

    let masterVol = parseFloat(localStorage.getItem('lft_game_vol') || '.6');
    let muted = localStorage.getItem('lft_game_mute') === '1';
    const volRange = document.getElementById('volRange');
    const muteBtn = document.getElementById('muteBtn');

    function applyVol() {
      BASE_VOL.forEach(([el, b]) => el.volume = muted ? 0 : b * masterVol);
      volRange.value = Math.round(masterVol * 100);
      muteBtn.textContent = muted ? '✕' : '♪';
      localStorage.setItem('lft_game_vol', masterVol);
      localStorage.setItem('lft_game_mute', muted ? '1' : '0');
    }
    volRange.addEventListener('input', () => { masterVol = volRange.value / 100; muted = false; applyVol(); });
    muteBtn.addEventListener('click', () => { muted = !muted; applyVol(); });
    applyVol();

    function playMusic(which) {
      [mGrass, mBattle, mWin].forEach(a => { if (a !== which) { a.pause(); a.currentTime = 0; } });
      if (which) which.play().catch(() => { });
    }

       PALETA & SPRITES

    function makeSprite(rows, scale = 1) {
      const h = rows.length, w = Math.max(...rows.map(r => r.length));
      const c = document.createElement('canvas');
      c.width = w * scale; c.height = h * scale;
      const x = c.getContext('2d');
      for (let j = 0; j < h; j++) for (let i = 0; i < rows[j].length; i++) {
        const col = PAL[rows[j][i]];
        if (col) { x.fillStyle = col; x.fillRect(i * scale, j * scale, scale, scale); }
      }
      return c;
    }

      f.width = c.width; f.height = c.height;

    /* # árvore  , grama  ; matinho  = caminho  ~ água  * flor  ! placa  F cerca */

    let pressQueue = [];
    window.addEventListener('keydown', e => {
      const k = KEYMAP[e.key];
      if (!k) return;
      e.preventDefault();
      if (!keys[k]) pressQueue.push(k);
      keys[k] = true;
    });
    window.addEventListener('keyup', e => { const k = KEYMAP[e.key]; if (k) keys[k] = false; });

    document.querySelectorAll('.dpad button').forEach(btn => {
      const dir = btn.dataset.dir;
      const dn = e => { e.preventDefault(); if (!keys[dir]) pressQueue.push(dir); keys[dir] = true; };
      const up = e => { e.preventDefault(); keys[dir] = false; };
      btn.addEventListener('pointerdown', dn);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('pointercancel', up);
    });

    let zones = [];

      const r = cv.getBoundingClientRect();
      const x = (e.clientX - r.left) * 256 / r.width, y = (e.clientY - r.top) * 192 / r.height;
      for (const z of zones) {
        if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) { pressQueue.push(z); return; }
      }
      pressQueue.push('A');
    });
    function popPress() { return pressQueue.shift(); }

    /* =====================================================================

    function px(x, y, w, h, col) { g.fillStyle = col; g.fillRect(x | 0, y | 0, w, h); }

      const bg = opts.bg || '#f8f8f0', edge = opts.edge || '#7890b8', dark = opts.dark || '#384878';
      px(x + 2, y + 2, w - 4, h - 4, bg);
      px(x + 2, y, w - 4, 2, dark); px(x + 2, y + h - 2, w - 4, 2, dark);
      px(x, y + 2, 2, h - 4, dark); px(x + w - 2, y + 2, 2, h - 4, dark);
      px(x + 2, y + 2, w - 4, 1, edge); px(x + 2, y + h - 3, w - 4, 1, edge);

    function tryMove(dx, dy, dir) {
      game.dir = dir;

      if (SOLID[tileAt(nx, ny)]) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
    }

    function finishStep() {
      game.step++;
      /* pokébola no chão? */
      const ball = BALLS.find(b => b.x === game.px && b.y === game.py && !game.balls[b.x + ',' + b.y]);
      if (ball) {
        game.balls[ball.x + ',' + ball.y] = true;
        game.items[ball.item]++;
        showMsg(ball.item === 'coffee'
          ? ['You found a COFFEE!', '(Restores 25 HP in battle.)']
          : ['You found an ESPRESSO!', '(Restores 5 PP to every', 'move in battle.)']);
        return;
      }
      if (tileAt(game.px, game.py) === 'tall') {
        game.rustle = { x: game.px, y: game.py, t: 0 };
        if (!game.caught.GOVRECORD && caughtCount() >= WIN_N - 1 && Math.random() < .25)
          return startBattle(DEX[N_ALL - 1]);
        if (Math.random() < .15) {
          const pool = DEX.slice(0, N_ALL - 1);
          let r = Math.random() * pool.reduce((s, d) => s + d.enc, 0);
          for (const d of pool) { r -= d.enc; if (r <= 0) return startBattle(d); }
          return startBattle(pool[0]);
        }
      }
    }

    function facingTile() {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[game.dir];
      return { x: game.px + d[0], y: game.py + d[1] };

    function updateWorld(dt) {
      if (game.msg) {
        const p = popPress();
        if (isA(p) || isB(p)) {
          game.msg.idx++;
          if (game.msg.idx >= game.msg.pages.length) game.msg = null;
        }
        return;
      }
      const p = popPress();
      if (isA(p)) {
        const f = facingTile(), key = f.x + ',' + f.y, t = tileAt(f.x, f.y);
        if (t === 'sign' && SIGN_TEXT[key]) showMsg(...SIGN_TEXT[key]);
        else if (t === 'water') showMsg(['The pond is calm.', 'A shredded document', 'floats by...']);
      }
      if (p === 'note' || isB(p)) { game.state = 'dex'; game.dexSel = 0; return; }

      if (game.moving) {
        game.moveT += dt * 5.2;
        if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
      } else {
        if (keys.up) tryMove(0, -1, 'up');
        else if (keys.down) tryMove(0, 1, 'down');
        else if (keys.left) tryMove(-1, 0, 'left');
        else if (keys.right) tryMove(1, 0, 'right');
      }
      if (game.rustle) { game.rustle.t += dt * 3; if (game.rustle.t > 1) game.rustle = null; }
    }

    function drawWorld() {
      zones = [];
      // parado = posição NOVA (lerp 1); usar 0 fazia o sprite "voltar" ao tile anterior
      const lerp = game.moving ? game.moveT : 1;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const animFrame = Math.floor(game.animClock * 1.6) % 2;
      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++) {
          let t = tileAt(i, j);
          if (t === 'water' && animFrame) t = 'water2';
          else if (t === 'flower' && animFrame) t = 'flower2';
          else if (t === 'grass' && ((i * 7 + j * 13) % 5 === 0)) t = 'grass2';
          g.drawImage(TILES[t], i * T - camX, j * T - camY);
        }

      /* pokébolas no chão */
      for (const b of BALLS) {
        if (game.balls[b.x + ',' + b.y]) continue;
        g.drawImage(BALL_SPR, b.x * T - camX + 3, b.y * T - camY + 4);
      }

      /* personagem: ciclo passoA → parado → passoB → parado */
      const dirFrames = SPR.player[game.dir];
      const seq = [1, 0, 3, 0];
      const phase = Math.floor((game.step + (game.moving ? game.moveT : 0)) * 2) % 4;

      g.drawImage(frame, Math.round(wx - camX + 1), Math.round(wy - camY - 4));

      if (tileAt(game.px, game.py) === 'tall' && !game.moving)
        g.drawImage(TILES.tall, game.px * T - camX, game.py * T - camY);

      if (game.rustle) {

        game.msg.pages[game.msg.idx].forEach((l, i) => text(l, 12, 144 + i * 11, '#303030', 7));
        text(game.msg.idx < game.msg.pages.length - 1 ? '▼' : '✕', 240, 178, '#e05038', 7);

        phase: 'intro', introT: 0,
        queue: [], menuSel: 0, moveSel: 0, bagSel: 0,
        lungeT: 0, eLungeT: 0, eFlashT: 0, efxT: 0, shake: 0, t: 0,
        fx: null,                 // { kind, t, mi } efeito do golpe do jogador
        foia: null
      };
      game.state = 'battle';
      playMusic(mBattle);
    }

    function bmsg(lines, next) {
      game.battle.queue.push({ lines, next });
      game.battle.phase = 'msg';
    }

    function endBattle() {
      game.battle = null;
      if (caughtCount() >= WIN_N) { game.state = 'win'; game.winT = 0; game.winSel = 0; playMusic(mWin); return; }
      game.state = 'world'; playMusic(mGrass);
    }

    function enemyTurn() {
      const b = game.battle;
      const dmg = Math.max(1, Math.round(b.sp.atk * (0.7 + Math.random() * 0.7)));
      game.hp = Math.max(0, game.hp - dmg);
      b.eLungeT = 1; b.shake = 1; b.efxT = 1;
      const mv = ENEMY_MOVES[Math.floor(Math.random() * ENEMY_MOVES.length)];
      bmsg([b.sp.name + ' used ' + mv + '!', 'Your credibility took ' + dmg + ' damage.'], game.hp <= 0 ? 'faint' : 'menu');
    }

    function doAttack(mi) {
      const b = game.battle, m = MOVES[mi];
      if (game.pp[mi] <= 0) { bmsg(['No uses left for ' + m.name + '!', 'Drink an ESPRESSO to', 'restore your moves.'], 'menu'); return; }
      game.pp[mi]--;
      b.lungeT = 1;
      b.fx = { kind: m.fx, t: 0, mi };
      b.phase = 'atkfx';
    }

    function resolveAttack() {
      const b = game.battle, m = MOVES[b.fx.mi];
      b.fx = null;
      if (!m.dmg) { // SUBPOENA
        b.cornered = true;
        bmsg(['You served a SUBPOENA!', b.sp.name + ' is cornered -', 'it cannot dodge the request!'], 'enemy');
        return;
      }
      const dmg = m.dmg[0] + Math.floor(Math.random() * (m.dmg[1] - m.dmg[0] + 1));
      b.ehp = Math.max(0, b.ehp - dmg);
      b.eFlashT = 1;
      if (b.ehp <= 0) {
        bmsg(['You used ' + m.name + '!', b.sp.name + ' was debunked!', 'But it shredded itself...', 'file them BEFORE they faint!'], 'flee');
      } else {
        bmsg(['You used ' + m.name + '!', 'It dealt ' + dmg + ' damage.'], 'enemy');
      }
    }

    /* captura estilo Pokémon: quanto menos HP, maior a chance */
    function catchChance(b) {
      let p = b.sp.rate * (3 * b.emax - 2 * b.ehp) / (3 * b.emax);
      if (b.cornered) p *= 1.5;
      return Math.min(.95, p);
    }

    function doFoia() {
      const b = game.battle;
      const p = catchChance(b);
      const success = Math.random() < p;
      b.foia = { t: 0, success, shakes: success ? 3 : Math.floor(Math.random() * 3) };
      b.phase = 'anim';
    }

    const CATCH_LINES = [
      ['Gotcha! NAME was FILED', 'in your notebook!'],
      ['Access GRANTED! NAME is', 'now on the public record!'],
      ['The archive opens. NAME', 'is officially yours!']
    ];
    const FAIL_LINES = [
      ['It BROKE OUT of the file!', 'NAME refuses to comply.'],
      ['Request DENIED! "Article 23",', 'says NAME, smugly.'],
      ['So close! NAME slipped', 'out of the paperwork.']
    ];

    function resolveFoia() {
      const b = game.battle;
      if (b.foia.success) {
        game.caught[b.sp.id] = true;
        game.lastInfo = b.sp;
        const l = CATCH_LINES[Math.floor(Math.random() * CATCH_LINES.length)]
          .map(s => s.replace('NAME', b.sp.name));
        bmsg([...l, '(' + Math.min(caughtCount(), WIN_N) + '/' + WIN_N + ' sources secured)'], 'end');
      } else {
        const l = FAIL_LINES[Math.floor(Math.random() * FAIL_LINES.length)]
          .map(s => s.replace('NAME', b.sp.name));
        bmsg([...l, 'Weaken it and try again!'], 'enemy');
      }
      b.foia = null;
    }

    function useBagItem(which) {
      const b = game.battle;
      if (which === 'coffee') {
        if (game.items.coffee <= 0) { bmsg(['No coffee in the bag!', 'Find red balls on the route.'], 'menu'); return; }
        game.items.coffee--;
        game.hp = Math.min(game.maxhp, game.hp + 25);
        bmsg(['You drank strong coffee.', 'Credibility restored by 25!'], 'enemy');
      } else {
        if (game.items.espresso <= 0) { bmsg(['No espresso in the bag!', 'Find red balls on the route.'], 'menu'); return; }
        game.items.espresso--;
        MOVES.forEach((m, i) => game.pp[i] = Math.min(m.pp, game.pp[i] + 5));
        bmsg(['A double shot of espresso!', 'All moves restored 5 PP.'], 'enemy');
      }
    }

    function updateBattle(dt) {
      const b = game.battle;
      b.t += dt;
      if (b.eFlashT > 0) b.eFlashT -= dt * 2.5;
      if (b.efxT > 0) b.efxT -= dt * 1.6;
      if (b.shake > 0) b.shake -= dt * 2;
      if (b.lungeT > 0) b.lungeT -= dt * 3;
      if (b.eLungeT > 0) b.eLungeT -= dt * 3;

      if (b.phase === 'intro') {
        b.introT += dt * 1.4;
        if (b.introT >= 1) {
          b.introT = 1;
          bmsg(['A wild ' + b.sp.name + ' appeared!', '(' + b.sp.kind + ' - Lv' + b.lv + ')'], 'menu');
        }
        return;
      }

      if (b.phase === 'atkfx' && b.fx) {
        b.fx.t += dt;
        if (b.fx.t >= .7) resolveAttack();
        return;
      }

      if (b.phase === 'anim' && b.foia) {
        b.foia.t += dt;
        const total = 1 + .5 + b.foia.shakes * .55 + .95;   // arremesso + flash + chacoalhadas + splash
        if (b.foia.t >= total) resolveFoia();
        return;
      }

      const p = popPress();
      if (!p) return;

      if (b.phase === 'msg') {
        if (isA(p) || isB(p)) {
          const cur = b.queue.shift();
          if (b.queue.length) return;
          const next = cur ? cur.next : 'menu';
          if (next === 'menu') b.phase = 'menu';
          else if (next === 'enemy') enemyTurn();
          else if (next === 'flee' || next === 'end') endBattle();
          else if (next === 'faint') {
            game.hp = Math.round(game.maxhp / 2);
            MOVES.forEach((m, i) => game.pp[i] = m.pp);
            bmsg(['You blacked out from stress!', 'An editor revived you with', 'deadline pressure...'], 'end');
          }
        }
        return;
      }

      if (b.phase === 'menu') {
        const acts = ['fight', 'foia', 'bag', 'run'];
        if (p === 'left' || p === 'right') b.menuSel ^= 1;
        else if (p === 'up' || p === 'down') b.menuSel ^= 2;
        else if (isA(p)) execMenu(acts[b.menuSel]);
        else if (p && p.act === 'menu') { b.menuSel = p.data; execMenu(acts[p.data]); }
        return;
      }

      if (b.phase === 'moves') {
        if (isB(p) || (p && p.act === 'back')) { b.phase = 'menu'; return; }
        if (p === 'left' || p === 'right') b.moveSel = (b.moveSel % 2 === 0) ? Math.min(b.moveSel + 1, MOVES.length - 1) : b.moveSel - 1;
        else if (p === 'up' || p === 'down') {
          const c = b.moveSel + (p === 'down' ? 2 : -2);
          if (c >= 0 && c < MOVES.length) b.moveSel = c;
        }
        else if (isA(p)) doAttack(b.moveSel);
        else if (p && p.act === 'move') { b.moveSel = p.data; doAttack(p.data); }
        return;
      }

      if (b.phase === 'bag') {
        if (isB(p) || (p && p.act === 'back')) { b.phase = 'menu'; return; }
        if (p === 'up' || p === 'down') b.bagSel ^= 1;
        else if (isA(p)) useBagItem(b.bagSel === 0 ? 'coffee' : 'espresso');
        else if (p && p.act === 'bag') { b.bagSel = p.data; useBagItem(p.data === 0 ? 'coffee' : 'espresso'); }
      }
    }

    function execMenu(a) {
      const b = game.battle;
      if (a === 'fight') { b.phase = 'moves'; b.moveSel = 0; }
      else if (a === 'foia') doFoia();
      else if (a === 'bag') { b.phase = 'bag'; b.bagSel = 0; }
      else if (a === 'run') {
        if (b.sp.id === 'GOVRECORD') bmsg(['You cannot run from', 'public records!'], 'menu');
        else bmsg(['You got away safely.', '(The story can wait.)'], 'flee');
      }
    }

    function drawBattleBg() {
      const grad = g.createLinearGradient(0, 0, 0, 110);
      grad.addColorStop(0, '#68b8ec'); grad.addColorStop(1, '#c4e8f8');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 110);
      g.fillStyle = '#f8ecb0'; g.beginPath(); g.arc(226, 18, 13, 0, 7); g.fill();
      g.fillStyle = '#fff8d8'; g.beginPath(); g.arc(226, 18, 9, 0, 7); g.fill();
      g.fillStyle = 'rgba(255,255,255,.85)';
      [[30, 22, 22], [78, 12, 16], [150, 26, 19], [205, 44, 13]].forEach(([cx, cy, r]) => {
        g.beginPath(); g.ellipse(cx, cy, r, r * .45, 0, 0, 7); g.fill();
        g.beginPath(); g.ellipse(cx + r * .7, cy + 3, r * .7, r * .35, 0, 0, 7); g.fill();
      });
      g.fillStyle = '#4e9050';
      for (let i = 0; i < 16; i++) { g.beginPath(); g.ellipse(i * 17 + 8, 108, 12, 9, 0, 0, 7); g.fill(); }
      g.fillStyle = '#3c7842';
      for (let i = 0; i < 16; i++) { g.beginPath(); g.ellipse(i * 17, 112, 11, 7, 0, 0, 7); g.fill(); }
      g.fillStyle = '#8cc45c'; g.fillRect(0, 110, 256, 82);
      g.fillStyle = '#80b854'; g.fillRect(0, 126, 256, 22);
      g.fillStyle = '#74ac4c'; g.fillRect(0, 148, 256, 44);
      g.fillStyle = 'rgba(255,255,255,.10)';
      for (let i = 0; i < 30; i++) g.fillRect((i * 41) % 256, 112 + (i * 23) % 76, 2, 2);
    }

    function platform(cx, cy, rx, ry, light, dark) {
      g.fillStyle = dark; g.beginPath(); g.ellipse(cx, cy + 2, rx, ry, 0, 0, 7); g.fill();
      g.fillStyle = light; g.beginPath(); g.ellipse(cx, cy, rx, ry, 0, 0, 7); g.fill();
      g.fillStyle = 'rgba(0,0,0,.12)'; g.beginPath(); g.ellipse(cx, cy + 1, rx * .8, ry * .6, 0, 0, 7); g.fill();
    }

    /* efeitos visuais dos golpes (sobre o inimigo em ~186,60) */
    function drawAttackFx(fx) {
      const t = fx.t / .7;             // 0..1
      const ex = 186, ey = 60;
      g.save();
      if (fx.kind === 'question') {
        for (let i = 0; i < 3; i++) {
          const tt = Math.max(0, Math.min(1, t * 1.4 - i * .18));
          if (tt <= 0 || tt >= 1) continue;
          const x = 95 + (ex - 95) * tt, y = 130 - Math.sin(tt * Math.PI) * 70 - i * 8;
          splash('?', x, y, i % 2 ? '#f8d048' : '#fff', 10);
        }
        if (t > .75) splash('!', ex, ey - 10, '#f85838', 12);
      } else if (fx.kind === 'ring') {
        for (let i = 0; i < 3; i++) {
          const tt = t * 1.3 - i * .22;
          if (tt <= 0 || tt > 1) continue;
          g.strokeStyle = 'rgba(124,255,240,' + (1 - tt) + ')';
          g.lineWidth = 2;
          g.beginPath(); g.arc(ex, ey, 8 + tt * 34, 0, 7); g.stroke();
        }
      } else if (fx.kind === 'cross') {
        const tt = Math.min(1, t * 1.6);
        g.strokeStyle = 'rgba(255,255,255,.95)'; g.lineWidth = 3;
        g.beginPath(); g.moveTo(ex - 34, ey - 34); g.lineTo(ex - 34 + tt * 68, ey - 34 + tt * 68); g.stroke();
        if (t > .35) {
          const t2 = Math.min(1, (t - .35) * 1.8);
          g.beginPath(); g.moveTo(ex + 34, ey - 34); g.lineTo(ex + 34 - t2 * 68, ey - 34 + t2 * 68); g.stroke();
        }
      } else if (fx.kind === 'rain') {
        g.font = '7px "Press Start 2P"';
        for (let i = 0; i < 10; i++) {
          const yy = ((t * 130 + i * 23) % 90) + ey - 50;
          g.fillStyle = i % 2 ? '#48e088' : '#a8ffc8';
          g.fillText(i % 3 ? '1' : '0', ex - 36 + (i * 17) % 72, yy);
        }
      } else if (fx.kind === 'flash') {
        if (t < .45) {
          g.fillStyle = 'rgba(255,255,255,' + (.9 - t * 1.6) + ')';
          g.fillRect(0, 0, 256, 192);
        }
        for (let i = 0; i < 8; i++) {
          const a = i * Math.PI / 4, rr = t * 46;
          g.strokeStyle = 'rgba(248,208,72,' + (1 - t) + ')'; g.lineWidth = 2;
          g.beginPath(); g.moveTo(ex + Math.cos(a) * 10, ey + Math.sin(a) * 10);
          g.lineTo(ex + Math.cos(a) * rr, ey + Math.sin(a) * rr); g.stroke();
        }
      } else if (fx.kind === 'stamp') {
        const drop = Math.min(1, t * 1.8);
        g.drawImage(imgFoia, ex - 14, -30 + drop * (ey - 4), 28, 28);
        if (t > .6) {
          g.strokeStyle = 'rgba(200,60,50,' + (1 - (t - .6) * 2.5) + ')'; g.lineWidth = 2;
          g.beginPath(); g.arc(ex, ey + 6, 16 + (t - .6) * 50, 0, 7); g.stroke();
          splash('SERVED!', ex, ey - 28, '#f85838', 8);
        }
      }
      g.restore();
    }

    function drawBattle() {
      zones = [];
      const b = game.battle;
      drawBattleBg();

      const intro = b.phase === 'intro' ? b.introT : 1;
      const shakeX = b.shake > 0 ? Math.round(Math.sin(b.t * 60) * 3 * b.shake) : 0;

      platform(186, 96, 58, 15, '#9cd06c', '#6c9c48');
      platform(62, 166, 60, 16, '#88bc5c', '#5c8c40');

      /* inimigo */
      const eX = 150 + (1 - intro) * 130;
      const eLunge = b.eLungeT > 0 ? Math.round(Math.sin(b.eLungeT * Math.PI) * -8) : 0;
      const bob = Math.sin(b.t * 2.5) * 2;
      let hideEnemy = false;
      if (b.foia) {
        const f = b.foia;
        const breakT = 1.5 + f.shakes * .55;        // quando o resultado aparece
        hideEnemy = f.t > 1.0 && !(f.t > breakT && !f.success);
      }
      if (!hideEnemy) {
        const flash = b.eFlashT > 0 && Math.floor(b.t * 24) % 2;
        if (!flash) {
          if (b.sp.sprite) g.drawImage(b.sp.sprite, eX + eLunge, 26 + bob, 72, 72);
          else g.drawImage(imgGovRecord, eX + eLunge - 2, 22 + bob, 78, 78);
        }
      }

      /* jornalista */
      const pX = 16 - (1 - intro) * 110;
      const lunge = b.lungeT > 0 ? Math.round(Math.sin(b.lungeT * Math.PI) * 10) : 0;
      g.drawImage(imgTrainerBack, pX + lunge + shakeX, 92, 86, 86);

      /* golpe inimigo: rasgos vermelhos sobre o jogador */
      if (b.efxT > .3) {
        const tt = 1 - b.efxT;
        g.strokeStyle = 'rgba(232,72,56,' + Math.min(1, b.efxT) + ')';
        g.lineWidth = 3;
        for (let i = 0; i < 3; i++) {
          g.beginPath();
          g.moveTo(30 + i * 16, 100 + tt * 20);
          g.lineTo(54 + i * 16, 150 + tt * 20);
          g.stroke();
        }
      }

      /* efeito do golpe do jogador */
      if (b.phase === 'atkfx' && b.fx) drawAttackFx(b.fx);

      /* papel FOIA: voo + chacoalhadas + resultado */
      if (b.foia) {
        const f = b.foia, t = f.t;
        const breakT = 1.5 + f.shakes * .55;
        if (t < 1) {
          const fx = 95 + t * 95, fy = 130 - Math.sin(t * Math.PI) * 85;
          g.save(); g.translate(fx, fy); g.rotate(t * 10);
          g.drawImage(imgFoia, -11, -11, 22, 22);
          g.restore();
        } else if (t <= breakT || f.success) {
          const sh = Math.max(0, t - 1.5);
          const idx = Math.floor(sh / .55);
          const local = (sh % .55) / .55;
          const wob = (idx < f.shakes && t > 1.5) ? Math.sin(local * Math.PI * 2) * 6 : 0;
          g.save(); g.translate(186 + wob, 84); g.rotate(wob * .04);
          g.drawImage(imgFoia, -13, -13, 26, 26);
          g.restore();
          if (t < 1.4) {
            g.fillStyle = 'rgba(255,255,255,' + Math.max(0, .9 - (t - 1) * 2.5) + ')';
            g.beginPath(); g.arc(186, 70, 40, 0, 7); g.fill();
          }
        }
        /* resultado: estrelinhas (sucesso) ou estouro (falha) */
        if (t > breakT) {
          const rt = Math.min(1, (t - breakT) / .9);
          if (f.success) {
            for (let i = 0; i < 7; i++) {
              const a = i * Math.PI * 2 / 7 + rt;
              const rr = 12 + rt * 26;
              splash('★', 186 + Math.cos(a) * rr, 80 + Math.sin(a) * rr * .6, i % 2 ? '#f8d048' : '#fff', 8);
            }
            splash('GOTCHA!', 186, 44, '#f8d048', 11);
          } else {
            g.fillStyle = 'rgba(255,255,255,' + Math.max(0, .8 - rt * 1.6) + ')';
            g.beginPath(); g.arc(186, 76, 14 + rt * 30, 0, 7); g.fill();
            for (let i = 0; i < 6; i++) {
              const a = i * Math.PI / 3;
              px(186 + Math.cos(a) * (16 + rt * 30) - 2, 76 + Math.sin(a) * (12 + rt * 22) - 2, 4, 4, '#f5f5ef');
            }
            splash('BROKE FREE!', 186, 44, '#f85838', 9);
          }
        }
      }

      /* caixas de status */
      frame9(6, 8, 122, 38, { bg: '#f8f8e8' });
      text(b.sp.name, 12, 14, '#303030', 7);
      text('Lv' + b.lv, 100, 14, '#303030', 7);
      text('HP', 12, 27, '#e07820', 7);
      hpBar(30, 28, 88, b.ehpShow / b.emax);
      if (b.cornered) text('CORNERED', 12, 37, '#b03828', 6);

      frame9(128, 96, 122, 42, { bg: '#f8f8e8' });
      text('JOURNALIST', 136, 102, '#303030', 7);
      text('Lv99', 218, 102, '#303030', 7);
      text('HP', 136, 115, '#e07820', 7);
      hpBar(154, 116, 86, b.phpShow / game.maxhp);
      text(Math.round(b.phpShow) + '/' + game.maxhp, 168, 126, '#484848', 7);

      b.ehpShow += (b.ehp - b.ehpShow) * Math.min(1, .12);
      b.phpShow += (game.hp - b.phpShow) * Math.min(1, .12);

      /* ---- área de diálogo/menus ---- */
      if (b.phase === 'msg' && b.queue.length) {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        b.queue[0].lines.forEach((l, i) => text(l, 10, 149 + i * 10, '#f8f8f8', 7));
        text('▼', 240, 180, '#f8b048', 7);
        zone(0, 0, 256, 192, 'A');
      } else if (b.phase === 'menu') {
        frame9(2, 142, 122, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        text('What will', 10, 152, '#f8f8f8', 7);
        text('JOURNALIST do?', 10, 164, '#f8f8f8', 7);
        frame9(126, 142, 128, 48, { bg: '#f8f8f0' });
        const items = [['FIGHT', '#c84838'], ['FOIA', '#3878c8'], ['BAG', '#b08820'], ['RUN', '#588048']];
        items.forEach(([label, col], i) => {
          const x = 134 + (i % 2) * 62, y = 148 + Math.floor(i / 2) * 20;
          if (b.menuSel === i) { px(x - 4, y + 1, 4, 7, '#303030'); }
          text(label, x + 2, y, col, 8);
          zone(x - 6, y - 4, 62, 19, 'menu', i);
        });
      } else if (b.phase === 'moves') {
        frame9(2, 142, 252, 48, { bg: '#f8f8f0' });
        MOVES.forEach((m, i) => {
          const x = 12 + (i % 2) * 124, y = 147 + Math.floor(i / 2) * 12;
          const hitY = 143 + Math.floor(i / 2) * 13;
          const noPp = game.pp[i] <= 0;
          if (b.moveSel === i) px(x - 6, y + 1, 4, 7, '#c84838');
          text(m.name.length > 12 ? m.name.slice(0, 12) : m.name, x, y, noPp ? '#b0b0a8' : (i === b.moveSel ? '#202020' : '#585858'), 6);
          text(String(game.pp[i]), x + 102, y, noPp ? '#c05040' : '#788858', 6);
          zone(x - 8, hitY, 124, 13, 'move', i);
        });
        const m = MOVES[b.moveSel];
        px(4, 180, 248, 1, '#c8c8c0');
        text((m.dmg ? 'PWR ' + m.dmg[0] + '-' + m.dmg[1] : 'STATUS') + ' PP ' + game.pp[b.moveSel] + '/' + m.pp + ' ' + m.desc, 10, 182, '#385888', 5);
        text('B:BACK', 218, 182, '#888', 5);
        zone(194, 182, 60, 10, 'back');
      } else if (b.phase === 'bag') {
        frame9(2, 142, 252, 48, { bg: '#f8f8f0' });
        const items = [
          ['COFFEE x' + game.items.coffee, 'restores 25 HP'],
          ['ESPRESSO x' + game.items.espresso, 'restores 5 PP to all moves']
        ];
        items.forEach(([label, sub], i) => {
          const y = 149 + i * 15;
          if (b.bagSel === i) px(8, y + 1, 4, 7, '#c84838');
          text(label, 16, y, '#303030', 7);
          text(sub, 124, y + 1, '#787870', 5);
          zone(6, y - 3, 240, 14, 'bag', i);
        });
        text('B:BACK', 216, 182, '#888', 5);
        zone(206, 178, 48, 14, 'back');
      } else if (b.phase === 'anim' || b.phase === 'atkfx') {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        if (b.phase === 'anim') text(b.foia && b.foia.t < 1 ? 'You filed a FOIA request!' : '...processing...', 10, 158, '#f8f8f8', 7);
      } else if (b.phase === 'intro') {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
      }

      if (b.phase === 'menu') {
        const pc = Math.round(catchChance(b) * 100);
        text('FOIA odds: ' + pc + '%', 8, 130, '#fff', 6);
      }
    }

    /* =====================================================================
       CADERNO (DEX)
       ===================================================================== */
    function updateDex() {
      const p = popPress();
      if (!p) return;
      if (typeof p === 'string' && !['A', 'B'].includes(p)) {
        const cols = 3;
        if (p === 'left') game.dexSel = Math.max(0, game.dexSel - 1);
        if (p === 'right') game.dexSel = Math.min(N_ALL - 1, game.dexSel + 1);
        if (p === 'up') game.dexSel = Math.max(0, game.dexSel - cols);
        if (p === 'down') game.dexSel = Math.min(N_ALL - 1, game.dexSel + cols);
        if (p === 'note') game.state = 'world';
        return;
      }
      if (p && p.act === 'dexsel') { game.dexSel = p.data; return; }
      if (isB(p) || isA(p)) game.state = 'world';
    }

    function drawDex() {
      zones = [];
      px(0, 0, 256, 192, '#203048');
      for (let j = 0; j < 12; j++) for (let i = 0; i < 16; i++)
        if ((i + j) % 2) px(i * 16, j * 16, 16, 16, '#243652');
      frame9(4, 3, 248, 20, { bg: '#f0f0e0' });
      text('SOURCE NOTEBOOK', 70, 9, '#384878', 8);
      text(Math.min(caughtCount(), WIN_N) + '/' + WIN_N, 220, 9, '#303030', 8);

      DEX.forEach((d, i) => {
        const x = 8 + (i % 3) * 82, y = 27 + Math.floor(i / 3) * 42;
        const got = game.caught[d.id];
        const sel = game.dexSel === i;
        frame9(x, y, 78, 38, { bg: got ? '#e4f0d8' : '#dcdcd4', dark: sel ? '#c84838' : '#384878', edge: sel ? '#f0a890' : '#7890b8' });
        if (got) {
          if (d.sprite) g.drawImage(d.sprite, x + 4, y + 6, 26, 26);
          else g.drawImage(imgGovRecord, x + 5, y + 7, 24, 24);
          text(d.name.slice(0, 8), x + 32, y + 9, '#283038', 6);
          text('FILED', x + 32, y + 22, '#388048', 6);
        } else {
          text('?????', x + 22, y + 16, '#909088', 7);
        }
        zone(x, y, 78, 38, 'dexsel', i);
      });

      const d = DEX[game.dexSel];
      frame9(4, 155, 248, 34, { bg: '#f8f8f0' });
      if (game.caught[d.id]) {
        text(d.name + ' - ' + d.kind, 12, 161, '#384878', 6);
        let l1 = d.blurb, l2 = '';
        if (l1.length > 42) {
          const cut = l1.lastIndexOf(' ', 42);
          l2 = l1.slice(cut + 1); l1 = l1.slice(0, cut);
        }
        text(l1, 12, 172, '#404040', 5);
        if (l2) text(l2, 12, 180, '#404040', 5);
      } else {
        text('Not yet filed. Search the', 12, 163, '#707068', 6);
        text('tall grass!  (B: close)', 12, 175, '#707068', 6);
      }
    }

    /* =====================================================================
       TITLE & WIN
       ===================================================================== */
    let titleT = 0;
    function drawTitle(dt) {
      zones = [];
      titleT += dt;
      const grad = g.createLinearGradient(0, 0, 0, 192);
      grad.addColorStop(0, '#16283e'); grad.addColorStop(.65, '#1c3a2e'); grad.addColorStop(1, '#234828');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 192);
      for (let i = 0; i < 26; i++) {
        const sx = (i * 47) % 256, sy = (i * 31) % 70;
        if (Math.floor(titleT * 2 + i) % 3) px(sx, sy, 1, 1, '#cfe8ff');
      }
      g.fillStyle = '#e8e8d8'; g.beginPath(); g.arc(218, 28, 11, 0, 7); g.fill();
      g.fillStyle = '#16283e'; g.beginPath(); g.arc(222, 24, 9, 0, 7); g.fill();

      for (let i = 0; i < 16; i++) g.drawImage(TILES.tall, i * 16, 176);
      const wf = Math.floor(titleT * 3) % 4;
      g.drawImage(SPR.player.right[[1, 0, 3, 0][wf]], 121, 155);
      if (DEX[0].sprite) g.drawImage(DEX[0].sprite, 22, 150, 28, 28);
      if (DEX[2].sprite) g.drawImage(DEX[2].sprite, 206, 148, 28, 28);

      textC('ROUTE 26', 128, 40, '#f8d048', 12);
      textC('INVESTIGATIVE EDITION', 128, 60, '#f8f8f8', 8);
      px(44, 76, 168, 1, '#48688a');
      textC('catch 3 wild documents', 128, 86, '#9ab8d0', 6);
      textC('hiding in the tall grass', 128, 97, '#9ab8d0', 6);
      if (Math.floor(titleT * 2) % 2) textC('- PRESS A TO START -', 128, 126, '#f8f8f8', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateTitle() {
      const p = popPress();
      if (isA(p)) {
        game.state = 'world';
        playMusic(mGrass);
        if (!game.tutorialDone) {
          game.tutorialDone = true;
          showMsg(
            ['Welcome to ROUTE 26!', 'Wild documents hide in the', 'tall grass. Walk into it and', 'they will jump you.'],
            ['In battle: weaken a document,', 'then FILE FOIA to catch it.', 'The lower its HP, the better', 'your odds (shown on screen).'],
            ['Moves have limited PP - pick', 'up the red balls around the', 'route for coffee & espresso.', 'File 3 documents to win!']
          );
        }
      }
    }

    function drawWin(dt) {
      zones = [];
      game.winT += dt;
      px(0, 0, 256, 192, '#f8f4e8');
      px(0, 0, 256, 36, '#202020');
      textC('THE DAILY RECORD', 128, 8, '#f8f4e8', 9);
      textC('special edition', 128, 23, '#c8c0a8', 6);
      textC('SCOOP! 3 SOURCES', 128, 48, '#202020', 9);
      textC('SECURED VIA FOIA', 128, 63, '#202020', 9);
      px(24, 80, 208, 1, '#888');
      textC('Journalist L. TOLEDO closes the', 128, 88, '#404040', 5);
      textC('notebook: the documents are', 128, 97, '#404040', 5);
      textC('now on the public record.', 128, 106, '#404040', 5);
      const got = DEX.filter(d => game.caught[d.id]);
      got.forEach((d, i) => {
        const x = 128 - got.length * 16 + i * 32;
        if (d.sprite) g.drawImage(d.sprite, x, 116, 28, 28);
        else g.drawImage(imgGovRecord, x, 116, 28, 28);
      });
      if (Math.floor(game.winT * 2) % 2) textC('CASE CLOSED!', 128, 150, '#c83828', 8);
      const s0 = game.winSel === 0, s1 = game.winSel === 1;
      frame9(28, 162, 116, 24, { bg: s0 ? '#e05848' : '#c84838', edge: '#f0a890', dark: s0 ? '#f8d048' : '#802818' });
      textC((s0 ? '> ' : '') + 'EXIT TO SITE', 86, 170, '#fff', 6);
      zone(28, 162, 116, 24, 'win', 'exit');
      frame9(150, 162, 80, 24, { bg: s1 ? '#4870a8' : '#385888', edge: '#88a8d8', dark: s1 ? '#f8d048' : '#182848' });
      textC((s1 ? '> ' : '') + 'PLAY ON', 190, 170, '#fff', 6);
      zone(150, 162, 80, 24, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      const stay = () => {
        game.caught = {}; game.balls = {}; game.items = { coffee: 0, espresso: 0 };
        game.hp = game.maxhp;
        MOVES.forEach((m, i) => game.pp[i] = m.pp);
        game.state = 'world'; playMusic(mGrass);
      };
      if (p === 'left' || p === 'right') { game.winSel ^= 1; return; }
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else stay();
      } else if (isA(p)) {
        if (game.winSel === 0) window.location.href = 'index.html';
        else stay();
      }
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      game.animClock += dt;
      g.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); drawTitle(dt); }
      else if (game.state === 'world') { updateWorld(dt); drawWorld(); }
      else if (game.state === 'dex') { updateDex(); drawDex(); }
      else if (game.state === 'battle') {
        updateBattle(dt);
        if (game.state === 'battle' && game.battle) drawBattle();
      }
      else if (game.state === 'win') { updateWin(); drawWin(dt); }

      requestAnimationFrame(loop);
    }

    // inicia quando a fonte carregar OU após 1.2s (não travar o jogo se a fonte demorar)
    Promise.race([
      document.fonts.load('8px "Press Start 2P"'),
      new Promise(r => setTimeout(r, 1200))
    ]).then(() => requestAnimationFrame(loop));

    /* hooks de teste */
    window.__game = game;
    window.__startBattle = i => startBattle(DEX[i]);
  </script>
</body>

</html>
