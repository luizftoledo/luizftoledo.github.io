<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Route 26 — Investigative Edition | Luiz Fernando Toledo</title>
  <link rel="icon" type="image/png" href="images/pokemon/foia_paper.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #14101a;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      background:
        radial-gradient(circle at 25% 15%, rgba(110, 70, 150, .16), transparent 50%),
        radial-gradient(circle at 75% 85%, rgba(50, 110, 150, .13), transparent 50%),
        #14101a;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw - 16px, 168vh - 290px, 760px);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 6px solid #221c2c;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .65), inset 0 0 16px rgba(0, 0, 0, .8);
    }

    canvas#screen {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    /* ===== controles abaixo da tela (nunca sobre a imagem) ===== */
    .pad {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(100vw - 16px, 760px);
      padding: 10px 14px;
      background: #1d1726;
      border: 2px solid #2e2640;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
    }

    .dpad {
      position: relative;
      width: 108px;
      height: 108px;
      flex: 0 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #3a3050;
      border: 2px solid #4e4070;
      color: #b8a8d8;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .dpad button:active { background: #574a80; }
    .dpad .up { top: 0; left: 36px; }
    .dpad .down { bottom: 0; left: 36px; }
    .dpad .left { top: 36px; left: 0; }
    .dpad .right { top: 36px; right: 0; }
    .dpad .mid { top: 36px; left: 36px; background: #2a2438; border-color: #2a2438; pointer-events: none; border-radius: 4px; }

    .pad-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .08em;
      color: #cfc2e8;
      background: #322a48;
      border: 2px solid #4e4070;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill-btn:active { background: #574a80; }

    .key-hint {
      font-size: 7px;
      line-height: 1.7;
      color: #6e6288;
      text-align: center;
    }

    .ab {
      position: relative;
      width: 116px;
      height: 96px;
      flex: 0 0 auto;
    }

    .ab button {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      border: 0;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .45);
      touch-action: none;
    }

    .ab button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0, 0, 0, .45); }
    .ab .a { right: 0; top: 0; background: #c0463c; border: 2px solid #e07868; }
    .ab .b { left: 0; bottom: 0; background: #3e5468; border: 2px solid #648098; }

    .quit-link {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 60;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #8d8498;
      text-decoration: none;
      border: 2px solid #3a3050;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(20, 16, 26, .8);
    }

    .quit-link:hover { color: #fff; border-color: #8d8498; }

    @media (max-width: 560px) {
      body { gap: 8px; padding: 6px; }
      .pad { padding: 8px 8px; gap: 6px; }
      .dpad { width: 96px; height: 96px; }
      .dpad button { width: 32px; height: 32px; }
      .dpad .up, .dpad .down { left: 32px; }
      .dpad .left, .dpad .right { }
      .dpad .mid { top: 32px; left: 32px; }
      .key-hint { display: none; }
      .ab { width: 104px; height: 88px; }
      .ab button { width: 48px; height: 48px; }
    }
  </style>

        'llllllkggkllllll', 'llllllkggkllllll', 'llllllkggkllllll', 'llllllkggkllllll',

      ],

        'kggggggggggggggg', 'kGGGGGGGGGGGGGGG', 'lkggklllkggkllkg', 'lkggklllkggkllkg',
        'lkkkklllkkkkllkk', 'llllllllllllllll', 'llllllllllllllll', 'llllllllllllllll'
      ]
    };
    const TILES = {};
    for (const k in TILE_SRC) TILES[k] = makeSprite(TILE_SRC[k]);

    /* # árvore  , grama  ; matinho  = caminho  ~ água  * flor  ! placa  F cerca */
    const MAP_STR = [
      '############################',
      '#,,,,,,;;;;;,,,,,,,,,,,,,,,#',
      '#,*,,,,;;;;;,,,##,,;;;;;,*,#',
      '#,,,,,,;;;;;,,,##,,;;;;;,,,#',
      '#,,!,,,;;;;;,,,,,,,;;;;;,,,#',
      '#FFFFFF,FFFFFFFFFFFFFF,FFFF#',

      '#,,;;;;;,,,,=,,~~~~,,,=====#',
      '#,,;;;;;,,,,=,,~~~~,,,,,,,=#',
      '#,,;;;;;,,,,=,,~~~~,,!,,,,=#',
      '#,,,,,,,,,,,=,,,,,,,,,,,,,=#',
      '#,*,,##,,,,,=============,=#',
      '#,,,,##,,,,,,,,,,,,,,,,,=,=#',
      '#,,,,,,,,;;;;;;,,,##,,,,===#',
      '#,*,,,,,,;;;;;;,,,##,,,,,,,#',
      '#,,,,,,,,;;;;;;,,,,,,,;;;;,#',
      '#,,*,,,,,;;;;;;,*,,,,,;;;;,#',
      '############################'
    ];
    const MAPW = MAP_STR[0].length, MAPH = MAP_STR.length;
    const CHAR2TILE = { '#': 'tree', ',': 'grass', ';': 'tall', '=': 'path', '~': 'water', '*': 'flower', '!': 'sign', 'F': 'fence' };
    const SOLID = { tree: 1, water: 1, sign: 1, fence: 1 };
    const SIGN_TEXT = {
      '3,4': ['ROUTE 26 - FOIA FIELDS', 'Wild documents live in the', 'tall grass. Fill all 9 slots', 'of your source notebook!'],
      '21,11': ['TIP: weaken a document to', 'raise your FOIA catch odds.', 'SUBPOENA corners it for an', 'even better chance!']
    };

    /* =====================================================================
       ESTADO
       ===================================================================== */
    const game = {
      state: 'title',
      px: 2, py: 6, dir: 'right',
      moving: false, moveT: 0, fromX: 2, fromY: 6,
      step: 0,
      caught: {},
      hp: 60, maxhp: 60,
      coffee: 3,
      battle: null,
      msg: null,
      rustle: null,
      dexSel: 0,
      winT: 0, animClock: 0
    };
    const caughtCount = () => Object.keys(game.caught).length;

    /* =====================================================================
       INPUT — teclado + pad DOM + toque no canvas
       ===================================================================== */
    const keys = {};
    const KEYMAP = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      z: 'A', Enter: 'A', ' ': 'A', x: 'B', Escape: 'B', Backspace: 'B'
    };
    let pressQueue = [];
    window.addEventListener('keydown', e => {
      const k = KEYMAP[e.key];
      if (!k) return;
      e.preventDefault();
      if (!keys[k]) pressQueue.push(k);
      keys[k] = true;
    });
    window.addEventListener('keyup', e => { const k = KEYMAP[e.key]; if (k) keys[k] = false; });

    /* pad físico */
    document.querySelectorAll('.dpad button').forEach(btn => {
      const dir = btn.dataset.dir;
      const dn = e => { e.preventDefault(); if (!keys[dir]) pressQueue.push(dir); keys[dir] = true; };
      const up = e => { e.preventDefault(); keys[dir] = false; };
      btn.addEventListener('pointerdown', dn);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('pointercancel', up);
    });
    document.querySelectorAll('.ab button').forEach(btn => {
      btn.addEventListener('pointerdown', e => { e.preventDefault(); pressQueue.push(btn.dataset.btn); });
    });
    document.getElementById('noteBtn').addEventListener('pointerdown', e => { e.preventDefault(); pressQueue.push('note'); });

    /* toque/clique direto na tela (zonas por frame) */
    let zones = [];
    function zone(x, y, w, h, act, data) { zones.push({ x, y, w, h, act, data }); }
    cv.addEventListener('pointerdown', e => {
      const r = cv.getBoundingClientRect();
      const x = (e.clientX - r.left) * 256 / r.width, y = (e.clientY - r.top) * 192 / r.height;
      for (const z of zones) {
        if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) { pressQueue.push(z); return; }
      }
      pressQueue.push('A'); // toque fora de zona = A (avança diálogo)
    });
    function popPress() { return pressQueue.shift(); }
    const isA = p => p === 'A' || (p && p.act === 'A');
    const isB = p => p === 'B' || (p && p.act === 'B');

    /* =====================================================================
       HELPERS DE DESENHO
       ===================================================================== */
    function px(x, y, w, h, col) { g.fillStyle = col; g.fillRect(x | 0, y | 0, w, h); }

    function frame9(x, y, w, h, opts = {}) {
      const bg = opts.bg || '#f8f8f0', edge = opts.edge || '#7890b8', dark = opts.dark || '#384878';
      px(x + 2, y + 2, w - 4, h - 4, bg);
      px(x + 2, y, w - 4, 2, dark); px(x + 2, y + h - 2, w - 4, 2, dark);
      px(x, y + 2, 2, h - 4, dark); px(x + w - 2, y + 2, 2, h - 4, dark);
      px(x + 2, y + 2, w - 4, 1, edge); px(x + 2, y + h - 3, w - 4, 1, edge);
      px(x + 2, y + 2, 1, h - 4, edge); px(x + w - 3, y + 2, 1, h - 4, edge);
    }

    function text(str, x, y, col = '#303030', size = 8) {
      g.font = size + 'px "Press Start 2P"';
      g.textBaseline = 'top';
      g.fillStyle = col;
      g.fillText(str, x, y);
    }

    function textC(str, cx, y, col, size = 8) {
      g.font = size + 'px "Press Start 2P"';
      const w = g.measureText(str).width;
      text(str, Math.round(cx - w / 2), y, col, size);
    }

    function hpBar(x, y, w, ratio) {
      px(x - 1, y - 1, w + 2, 6, '#404040');
      px(x, y, w, 4, '#e8e8e0');
      const col = ratio > .5 ? '#58c858' : ratio > .2 ? '#f0c020' : '#e05038';
      px(x, y, Math.max(0, Math.round(w * ratio)), 4, col);
    }

    /* =====================================================================
       OVERWORLD
       ===================================================================== */
    function tileAt(x, y) {
      if (x < 0 || y < 0 || x >= MAPW || y >= MAPH) return 'tree';
      return CHAR2TILE[MAP_STR[y][x]] || 'grass';
    }

    function tryMove(dx, dy, dir) {
      game.dir = dir;
      const nx = game.px + dx, ny = game.py + dy;
      if (SOLID[tileAt(nx, ny)]) return;
      game.fromX = game.px; game.fromY = game.py;
      game.px = nx; game.py = ny;
      game.moving = true; game.moveT = 0;
    }

    function finishStep() {
      game.step++;
      if (tileAt(game.px, game.py) === 'tall') {
        game.rustle = { x: game.px, y: game.py, t: 0 };
        const allButBoss = DEX.slice(0, N_ALL - 1).every(d => game.caught[d.id]);
        if (!game.caught.GOVRECORD && allButBoss && Math.random() < .30) return startBattle(DEX[N_ALL - 1]);
        if (Math.random() < .15) {
          const pool = DEX.slice(0, N_ALL - 1);
          let r = Math.random() * pool.reduce((s, d) => s + d.enc, 0);
          for (const d of pool) { r -= d.enc; if (r <= 0) return startBattle(d); }
          return startBattle(pool[0]);
        }
      }
    }

    function facingTile() {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[game.dir];
      return { x: game.px + d[0], y: game.py + d[1] };
    }

    function updateWorld(dt) {
      if (game.msg) {
        const p = popPress();
        if (isA(p) || isB(p)) game.msg = null;
        return;
      }
      const p = popPress();
      if (isA(p)) {
        const f = facingTile(), key = f.x + ',' + f.y, t = tileAt(f.x, f.y);
        if (t === 'sign' && SIGN_TEXT[key]) game.msg = { lines: SIGN_TEXT[key] };
        else if (t === 'water') game.msg = { lines: ['The pond is calm.', 'A shredded document', 'floats by...'] };
      }
      if (p === 'note' || isB(p)) { game.state = 'dex'; game.dexSel = 0; return; }

      if (game.moving) {
        game.moveT += dt * 5.2;
        if (game.moveT >= 1) { game.moving = false; game.moveT = 0; finishStep(); }
      } else {
        if (keys.up) tryMove(0, -1, 'up');
        else if (keys.down) tryMove(0, 1, 'down');
        else if (keys.left) tryMove(-1, 0, 'left');
        else if (keys.right) tryMove(1, 0, 'right');
      }
      if (game.rustle) { game.rustle.t += dt * 3; if (game.rustle.t > 1) game.rustle = null; }
    }

    function drawWorld() {
      zones = [];
      // parado = posição NOVA (lerp 1); usar 0 fazia o sprite "voltar" ao tile anterior
      const lerp = game.moving ? game.moveT : 1;
      const wx = (game.fromX + (game.px - game.fromX) * lerp) * T;
      const wy = (game.fromY + (game.py - game.fromY) * lerp) * T;
      let camX = Math.round(wx - 128 + 8), camY = Math.round(wy - 96 + 9);
      camX = Math.max(0, Math.min(MAPW * T - 256, camX));
      camY = Math.max(0, Math.min(MAPH * T - 192, camY));

      const animFrame = Math.floor(game.animClock * 1.6) % 2;
      const x0 = Math.floor(camX / T), y0 = Math.floor(camY / T);
      for (let j = y0; j <= y0 + 13 && j < MAPH; j++)
        for (let i = x0; i <= x0 + 17 && i < MAPW; i++) {
          let t = tileAt(i, j);
          if (t === 'water' && animFrame) t = 'water2';
          else if (t === 'flower' && animFrame) t = 'flower2';
          else if (t === 'grass' && ((i * 7 + j * 13) % 5 === 0)) t = 'grass2';
          g.drawImage(TILES[t], i * T - camX, j * T - camY);
        }

      /* personagem: ciclo passoA → parado → passoB → parado (contínuo) */
      const dirFrames = SPR.player[game.dir];
      const seq = [1, 0, 3, 0];
      const phase = Math.floor((game.step + (game.moving ? game.moveT : 0)) * 2) % 4;
      const frame = game.moving ? dirFrames[seq[phase]] : dirFrames[0];
      g.drawImage(frame, Math.round(wx - camX + 1), Math.round(wy - camY - 4));

      /* matinho cobre os pés quando dentro dele */
      if (tileAt(game.px, game.py) === 'tall' && !game.moving)
        g.drawImage(TILES.tall, game.px * T - camX, game.py * T - camY);

      if (game.rustle) {
        const r = game.rustle;
        g.fillStyle = 'rgba(130,210,100,.9)';
        for (let i = 0; i < 5; i++) {
          const a = r.t * Math.PI;
          g.fillRect(r.x * T - camX + 3 + i * 3, r.y * T - camY + 5 - Math.sin(a + i) * 7, 2, 2);
        }
      }

      /* HUD compacto */
      frame9(2, 2, 116, 26, { bg: 'rgba(248,248,240,.95)' });
      text('NOTEBOOK ' + caughtCount() + '/' + N_ALL, 8, 7, '#384878', 6);
      text('HP', 8, 17, '#e07820', 6);
      hpBar(24, 18, 50, game.hp / game.maxhp);
      text('☕x' + game.coffee, 84, 16, '#6b4226', 7);
      zone(2, 2, 116, 26, 'note');

      if (game.msg) {
        frame9(4, 138, 248, 50);
        game.msg.lines.forEach((l, i) => text(l, 12, 145 + i * 11, '#303030', 7));
        text('▼', 240, 178, '#e05038', 7);
      }
    }

    /* =====================================================================
       BATALHA
       ===================================================================== */
    const MOVES = [
      { name: 'TOUGH QUESTION', dmg: [5, 9], desc: 'Reliable jab' },
      { name: 'CROSS-CHECK', dmg: [7, 11], desc: 'Solid hit' },
      { name: 'DATA SCRAPE', dmg: [3, 14], desc: 'Wild swing' },
      { name: 'EXPOSE', dmg: [9, 13], desc: 'Heavy hit' },
      { name: 'SUBPOENA', dmg: null, desc: 'Corner target:catch odds UP' }
    ];
    const ENEMY_MOVES = ['REDACT', 'DELAY RESPONSE', 'SPIN STORY', 'JARGON WALL', 'APPEAL', 'STONEWALL'];

    function startBattle(species) {
      const lv = species.lv[0] + Math.floor(Math.random() * (species.lv[1] - species.lv[0] + 1));
      game.battle = {
        sp: species, lv,
        ehp: species.hp, emax: species.hp, ehpShow: species.hp, phpShow: game.hp,
        cornered: false,
        phase: 'intro', introT: 0,
        queue: [], menuSel: 0, moveSel: 0,
        lungeT: 0, eLungeT: 0, eFlashT: 0, shake: 0, t: 0,
        foia: null
      };
      game.state = 'battle';
      playMusic(mBattle);
    }

    function bmsg(lines, next) {
      game.battle.queue.push({ lines, next });
      game.battle.phase = 'msg';
    }

    function endBattle() {
      game.battle = null;
      if (caughtCount() >= N_ALL) { game.state = 'win'; game.winT = 0; playMusic(mWin); return; }
      game.state = 'world'; playMusic(mGrass);
    }

    function enemyTurn() {
      const b = game.battle;
      const dmg = Math.max(1, Math.round(b.sp.atk * (0.7 + Math.random() * 0.7)));
      game.hp = Math.max(0, game.hp - dmg);
      b.eLungeT = 1; b.shake = 1;
      const mv = ENEMY_MOVES[Math.floor(Math.random() * ENEMY_MOVES.length)];
      bmsg([b.sp.name + ' used ' + mv + '!', 'Your credibility took ' + dmg + ' damage.'], game.hp <= 0 ? 'faint' : 'menu');
    }

    function doAttack(mi) {
      const b = game.battle, m = MOVES[mi];
      b.lungeT = 1;
      if (!m.dmg) { // SUBPOENA
        b.cornered = true;
        bmsg(['You served a SUBPOENA!', b.sp.name + ' is cornered -', 'it cannot dodge the request!'], 'enemy');
        return;
      }
      const dmg = m.dmg[0] + Math.floor(Math.random() * (m.dmg[1] - m.dmg[0] + 1));
      b.ehp = Math.max(0, b.ehp - dmg);
      b.eFlashT = 1;
      if (b.ehp <= 0) {
        bmsg(['You used ' + m.name + '!', b.sp.name + ' was debunked!', 'But it shredded itself...', 'file them BEFORE they faint!'], 'flee');
      } else {
        bmsg(['You used ' + m.name + '!', 'It dealt ' + dmg + ' damage.'], 'enemy');
      }
    }

    /* captura estilo Pokémon: quanto menos HP, maior a chance */
    function catchChance(b) {
      let p = b.sp.rate * (3 * b.emax - 2 * b.ehp) / (3 * b.emax);
      if (b.cornered) p *= 1.5;
      return Math.min(.95, p);
    }

    function doFoia() {
      const b = game.battle;
      const p = catchChance(b);
      const success = Math.random() < p;
      b.foia = { t: 0, success, shakes: success ? 3 : Math.floor(Math.random() * 3) };
      b.phase = 'anim';
    }

    function resolveFoia() {
      const b = game.battle;
      if (b.foia.success) {
        game.caught[b.sp.id] = true;
        b.caughtNow = true;
        bmsg(['Gotcha! ' + b.sp.name + ' was', 'FILED in your notebook!', '(' + caughtCount() + '/' + N_ALL + ' sources secured)'], 'end');
      } else {
        const cries = ['It broke out of the file!', 'The request was DENIED!', 'Argh! So close!'];
        bmsg([cries[b.foia.shakes % cries.length], b.sp.name + ' resists.', 'Weaken it and try again!'], 'enemy');
      }
      b.foia = null;
    }

    function doCoffee() {
      const b = game.battle;
      if (game.coffee <= 0) { bmsg(['No coffee left!', 'A journalist without coffee...'], 'menu'); return; }
      game.coffee--;
      game.hp = Math.min(game.maxhp, game.hp + 25);
      bmsg(['You drank strong coffee.', 'Credibility restored by 25!'], 'enemy');
    }

    function updateBattle(dt) {
      const b = game.battle;
      b.t += dt;
      if (b.eFlashT > 0) b.eFlashT -= dt * 2.5;
      if (b.shake > 0) b.shake -= dt * 2;
      if (b.lungeT > 0) b.lungeT -= dt * 3;
      if (b.eLungeT > 0) b.eLungeT -= dt * 3;

      if (b.phase === 'intro') {
        b.introT += dt * 1.4;
        if (b.introT >= 1) {
          b.introT = 1;
          bmsg(['A wild ' + b.sp.name + ' appeared!', '(' + b.sp.kind + ' - Lv' + b.lv + ')'], 'menu');
        }
        return;
      }

      if (b.phase === 'anim' && b.foia) {
        b.foia.t += dt;
        const total = 1 + .5 + b.foia.shakes * .55 + .35;
        if (b.foia.t >= total) { resolveFoia(); }
        return;
      }

      const p = popPress();
      if (!p) return;

      if (b.phase === 'msg') {
        if (isA(p) || isB(p)) {
          const cur = b.queue.shift();
          if (b.queue.length) return;
          const next = cur ? cur.next : 'menu';
          if (next === 'menu') b.phase = 'menu';
          else if (next === 'enemy') enemyTurn();
          else if (next === 'flee' || next === 'end') endBattle();
          else if (next === 'faint') {
            game.hp = Math.round(game.maxhp / 2);
            bmsg(['You blacked out from stress!', 'An editor revived you with', 'deadline pressure...'], 'end');
          }
        }
        return;
      }

      if (b.phase === 'menu') {
        const acts = ['fight', 'foia', 'bag', 'run'];
        if (p === 'left' || p === 'right') b.menuSel ^= 1;
        else if (p === 'up' || p === 'down') b.menuSel ^= 2;
        else if (isA(p)) execMenu(acts[b.menuSel]);
        else if (p && p.act === 'menu') { b.menuSel = p.data; execMenu(acts[p.data]); }
        return;
      }

      if (b.phase === 'moves') {
        if (isB(p) || (p && p.act === 'back')) { b.phase = 'menu'; return; }
        if (p === 'left' || p === 'right') b.moveSel = (b.moveSel % 2 === 0) ? Math.min(b.moveSel + 1, MOVES.length - 1) : b.moveSel - 1;
        else if (p === 'up' || p === 'down') {
          const c = b.moveSel + (p === 'down' ? 2 : -2);
          if (c >= 0 && c < MOVES.length) b.moveSel = c;
        }
        else if (isA(p)) doAttack(b.moveSel);
        else if (p && p.act === 'move') { b.moveSel = p.data; doAttack(p.data); }
      }
    }

    function execMenu(a) {
      const b = game.battle;
      if (a === 'fight') { b.phase = 'moves'; b.moveSel = 0; }
      else if (a === 'foia') doFoia();
      else if (a === 'bag') doCoffee();
      else if (a === 'run') {
        if (b.sp.id === 'GOVRECORD') bmsg(['You cannot run from', 'public records!'], 'menu');
        else bmsg(['You got away safely.', '(The story can wait.)'], 'flee');
      }
    }

    function drawBattleBg() {
      /* céu com sol e nuvens */
      const grad = g.createLinearGradient(0, 0, 0, 110);
      grad.addColorStop(0, '#68b8ec'); grad.addColorStop(1, '#c4e8f8');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 110);
      g.fillStyle = '#f8ecb0'; g.beginPath(); g.arc(226, 18, 13, 0, 7); g.fill();
      g.fillStyle = '#fff8d8'; g.beginPath(); g.arc(226, 18, 9, 0, 7); g.fill();
      g.fillStyle = 'rgba(255,255,255,.85)';
      [[30, 22, 22], [78, 12, 16], [150, 26, 19], [205, 44, 13]].forEach(([cx, cy, r]) => {
        g.beginPath(); g.ellipse(cx, cy, r, r * .45, 0, 0, 7); g.fill();
        g.beginPath(); g.ellipse(cx + r * .7, cy + 3, r * .7, r * .35, 0, 0, 7); g.fill();
      });
      /* mata ao fundo */
      g.fillStyle = '#4e9050';
      for (let i = 0; i < 16; i++) { g.beginPath(); g.ellipse(i * 17 + 8, 108, 12, 9, 0, 0, 7); g.fill(); }
      g.fillStyle = '#3c7842';
      for (let i = 0; i < 16; i++) { g.beginPath(); g.ellipse(i * 17, 112, 11, 7, 0, 0, 7); g.fill(); }
      /* campo com faixas de tom */
      g.fillStyle = '#8cc45c'; g.fillRect(0, 110, 256, 82);
      g.fillStyle = '#80b854'; g.fillRect(0, 126, 256, 22);
      g.fillStyle = '#74ac4c'; g.fillRect(0, 148, 256, 44);
      g.fillStyle = 'rgba(255,255,255,.10)';
      for (let i = 0; i < 30; i++) g.fillRect((i * 41) % 256, 112 + (i * 23) % 76, 2, 2);
    }

    function platform(cx, cy, rx, ry, light, dark) {
      g.fillStyle = dark; g.beginPath(); g.ellipse(cx, cy + 2, rx, ry, 0, 0, 7); g.fill();
      g.fillStyle = light; g.beginPath(); g.ellipse(cx, cy, rx, ry, 0, 0, 7); g.fill();
      g.fillStyle = 'rgba(0,0,0,.12)'; g.beginPath(); g.ellipse(cx, cy + 1, rx * .8, ry * .6, 0, 0, 7); g.fill();
    }

    function drawBattle() {
      zones = [];
      const b = game.battle;
      drawBattleBg();

      const intro = b.phase === 'intro' ? b.introT : 1;
      const shakeX = b.shake > 0 ? Math.round(Math.sin(b.t * 60) * 3 * b.shake) : 0;

      /* plataformas */
      platform(186, 96, 58, 15, '#9cd06c', '#6c9c48');
      platform(62, 166, 60, 16, '#88bc5c', '#5c8c40');

      /* inimigo (desliza na entrada) */
      const eX = 150 + (1 - intro) * 130;
      const eLunge = b.eLungeT > 0 ? Math.round(Math.sin(b.eLungeT * Math.PI) * -8) : 0;
      const bob = Math.sin(b.t * 2.5) * 2;
      const hideEnemy = b.foia && b.foia.t > 1.0 && !(b.foia.t > 1.5 + b.foia.shakes * .55 && !b.foia.success);
      if (!hideEnemy) {
        const flash = b.eFlashT > 0 && Math.floor(b.t * 24) % 2;
        if (!flash) {
          if (b.sp.sprite) g.drawImage(b.sp.sprite, eX + eLunge, 26 + bob, 72, 72);
          else g.drawImage(imgGovRecord, eX + eLunge - 2, 22 + bob, 78, 78);
        }
      }

      /* jornalista (desliza na entrada) */
      const pX = 16 - (1 - intro) * 110;
      const lunge = b.lungeT > 0 ? Math.round(Math.sin(b.lungeT * Math.PI) * 10) : 0;
      g.drawImage(imgTrainerBack, pX + lunge + shakeX, 92, 86, 86);

      /* papel FOIA: voo + chacoalhadas */
      if (b.foia) {
        const f = b.foia, t = f.t;
        if (t < 1) { // voo em arco
          const fx = 95 + t * 95, fy = 130 - Math.sin(t * Math.PI) * 85;
          g.save(); g.translate(fx, fy); g.rotate(t * 10);
          g.drawImage(imgFoia, -11, -11, 22, 22);
          g.restore();
        } else { // papel no chão chacoalhando
          const sh = Math.max(0, t - 1.5);
          const idx = Math.floor(sh / .55);
          const local = (sh % .55) / .55;
          const wob = (idx < f.shakes && t > 1.5) ? Math.sin(local * Math.PI * 2) * 6 : 0;
          g.save(); g.translate(186 + wob, 84); g.rotate(wob * .04);
          g.drawImage(imgFoia, -13, -13, 26, 26);
          g.restore();
          if (t < 1.4) { // flash de absorção
            g.fillStyle = 'rgba(255,255,255,' + Math.max(0, .9 - (t - 1) * 2.5) + ')';
            g.beginPath(); g.arc(186, 70, 40, 0, 7); g.fill();
          }
        }
      }

      /* caixas de status */
      frame9(6, 8, 122, 38, { bg: '#f8f8e8' });
      text(b.sp.name, 12, 14, '#303030', 7);
      text('Lv' + b.lv, 100, 14, '#303030', 7);
      text('HP', 12, 27, '#e07820', 7);
      hpBar(30, 28, 88, b.ehpShow / b.emax);
      if (b.cornered) text('CORNERED', 12, 37, '#b03828', 6);

      frame9(128, 96, 122, 42, { bg: '#f8f8e8' });
      text('JOURNALIST', 136, 102, '#303030', 7);
      text('Lv99', 218, 102, '#303030', 7);
      text('HP', 136, 115, '#e07820', 7);
      hpBar(154, 116, 86, b.phpShow / game.maxhp);
      text(Math.round(b.phpShow) + '/' + game.maxhp, 168, 126, '#484848', 7);

      /* barras de HP animadas */
      b.ehpShow += (b.ehp - b.ehpShow) * Math.min(1, .12);
      b.phpShow += (game.hp - b.phpShow) * Math.min(1, .12);

      /* ---- área de diálogo/menus (parte de baixo da MESMA tela) ---- */
      if (b.phase === 'msg' && b.queue.length) {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        b.queue[0].lines.forEach((l, i) => text(l, 10, 149 + i * 10, '#f8f8f8', 7));
        text('▼', 240, 180, '#f8b048', 7);
        zone(0, 0, 256, 192, 'A');
      } else if (b.phase === 'menu') {
        frame9(2, 142, 122, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        text('What will', 10, 152, '#f8f8f8', 7);
        text('JOURNALIST do?', 10, 164, '#f8f8f8', 7);
        frame9(126, 142, 128, 48, { bg: '#f8f8f0' });
        const items = [['FIGHT', '#c84838'], ['FOIA', '#3878c8'], ['BAG', '#b08820'], ['RUN', '#588048']];
        items.forEach(([label, col], i) => {
          const x = 134 + (i % 2) * 62, y = 148 + Math.floor(i / 2) * 20;
          if (b.menuSel === i) { px(x - 4, y + 1, 4, 7, '#303030'); }
          text(label, x + 2, y, col, 8);
          zone(x - 6, y - 4, 62, 19, 'menu', i);
        });
      } else if (b.phase === 'moves') {
        frame9(2, 142, 252, 48, { bg: '#f8f8f0' });
        MOVES.forEach((m, i) => {
          const x = 12 + (i % 2) * 124, y = 147 + Math.floor(i / 2) * 13;
          if (b.moveSel === i) px(x - 6, y + 1, 4, 7, '#c84838');
          text(m.name, x, y, i === b.moveSel ? '#202020' : '#585858', 6);
          zone(x - 7, y - 3, 122, 13, 'move', i);
        });
        const m = MOVES[b.moveSel];
        text(m.dmg ? ('PWR ' + m.dmg[0] + '-' + m.dmg[1]) : 'STATUS', 140, 173, '#385888', 6);
        text('B:BACK', 208, 181, '#888', 5);
        zone(206, 176, 48, 14, 'back');
      } else if (b.phase === 'anim') {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
        text(b.foia && b.foia.t < 1 ? 'You filed a FOIA request!' : '...processing...', 10, 158, '#f8f8f8', 7);
      } else if (b.phase === 'intro') {
        frame9(2, 142, 252, 48, { bg: '#283038', edge: '#687888', dark: '#101820' });
      }

      /* dica de chance de captura quando no menu */
      if (b.phase === 'menu') {
        const pc = Math.round(catchChance(b) * 100);
        text('FOIA odds: ' + pc + '%', 8, 130, '#fff', 6);
        px(6, 128, 86, 1, 'rgba(255,255,255,.0)');
      }
    }

    /* =====================================================================
       CADERNO (DEX) — grade 3x3
       ===================================================================== */
    function updateDex() {
      const p = popPress();
      if (!p) return;
      if (isA(p) === false && isB(p) === false && typeof p === 'string') {
        const cols = 3;
        if (p === 'left') game.dexSel = Math.max(0, game.dexSel - 1);
        if (p === 'right') game.dexSel = Math.min(N_ALL - 1, game.dexSel + 1);
        if (p === 'up') game.dexSel = Math.max(0, game.dexSel - cols);
        if (p === 'down') game.dexSel = Math.min(N_ALL - 1, game.dexSel + cols);
        if (p === 'note') game.state = 'world';
        return;
      }
      if (p && p.act === 'dexsel') { game.dexSel = p.data; return; }
      if (isB(p) || isA(p)) game.state = 'world';
    }

    function drawDex() {
      zones = [];
      px(0, 0, 256, 192, '#203048');
      for (let j = 0; j < 12; j++) for (let i = 0; i < 16; i++)
        if ((i + j) % 2) px(i * 16, j * 16, 16, 16, '#243652');
      frame9(4, 3, 248, 20, { bg: '#f0f0e0' });
      text('SOURCE NOTEBOOK', 70, 9, '#384878', 8);
      text(caughtCount() + '/' + N_ALL, 220, 9, '#303030', 8);

      DEX.forEach((d, i) => {
        const x = 8 + (i % 3) * 82, y = 27 + Math.floor(i / 3) * 42;
        const got = game.caught[d.id];
        const sel = game.dexSel === i;
        frame9(x, y, 78, 38, { bg: got ? '#e4f0d8' : '#dcdcd4', dark: sel ? '#c84838' : '#384878', edge: sel ? '#f0a890' : '#7890b8' });
        if (got) {
          if (d.sprite) g.drawImage(d.sprite, x + 4, y + 6, 26, 26);
          else g.drawImage(imgGovRecord, x + 5, y + 7, 24, 24);
          text(d.name.slice(0, 8), x + 32, y + 9, '#283038', 6);
          text('FILED', x + 32, y + 22, '#388048', 6);
        } else {
          text('?????', x + 22, y + 16, '#909088', 7);
        }
        zone(x, y, 78, 38, 'dexsel', i);
      });

      const d = DEX[game.dexSel];
      frame9(4, 155, 248, 34, { bg: '#f8f8f0' });
      if (game.caught[d.id]) {
        text(d.name + ' - ' + d.kind, 12, 161, '#384878', 6);
        let l1 = d.blurb, l2 = '';
        if (l1.length > 42) {
          const cut = l1.lastIndexOf(' ', 42);
          l2 = l1.slice(cut + 1); l1 = l1.slice(0, cut);
        }
        text(l1, 12, 172, '#404040', 5);
        if (l2) text(l2, 12, 180, '#404040', 5);
      } else {
        text('Not yet filed. Search the', 12, 163, '#707068', 6);
        text('tall grass!  (B: close)', 12, 175, '#707068', 6);
      }
    }

    /* =====================================================================
       TITLE & WIN
       ===================================================================== */
    let titleT = 0;
    function drawTitle(dt) {
      zones = [];
      titleT += dt;
      const grad = g.createLinearGradient(0, 0, 0, 192);
      grad.addColorStop(0, '#16283e'); grad.addColorStop(.65, '#1c3a2e'); grad.addColorStop(1, '#234828');
      g.fillStyle = grad; g.fillRect(0, 0, 256, 192);
      for (let i = 0; i < 26; i++) {
        const sx = (i * 47) % 256, sy = (i * 31) % 70;
        if (Math.floor(titleT * 2 + i) % 3) px(sx, sy, 1, 1, '#cfe8ff');
      }
      /* lua */
      g.fillStyle = '#e8e8d8'; g.beginPath(); g.arc(218, 28, 11, 0, 7); g.fill();
      g.fillStyle = '#16283e'; g.beginPath(); g.arc(222, 24, 9, 0, 7); g.fill();

      for (let i = 0; i < 16; i++) g.drawImage(TILES.tall, i * 16, 176);
      const wf = Math.floor(titleT * 3) % 4;
      g.drawImage(SPR.player.right[[1, 0, 3, 0][wf]], 121, 155);

      /* criaturas espiando */
      if (DEX[0].sprite) g.drawImage(DEX[0].sprite, 22, 150, 28, 28);
      if (DEX[2].sprite) g.drawImage(DEX[2].sprite, 206, 148, 28, 28);

      textC('ROUTE 26', 128, 40, '#f8d048', 12);
      textC('INVESTIGATIVE EDITION', 128, 60, '#f8f8f8', 8);
      px(44, 76, 168, 1, '#48688a');
      textC('catch all 9 wild documents', 128, 86, '#9ab8d0', 6);
      textC('hiding in the tall grass', 128, 97, '#9ab8d0', 6);
      if (Math.floor(titleT * 2) % 2) textC('- PRESS A TO START -', 128, 126, '#f8f8f8', 7);
      zone(0, 0, 256, 192, 'A');
    }

    function updateTitle() {
      const p = popPress();
      if (isA(p)) { game.state = 'world'; playMusic(mGrass); }
    }

    function drawWin(dt) {
      zones = [];
      game.winT += dt;
      px(0, 0, 256, 192, '#f8f4e8');
      px(0, 0, 256, 36, '#202020');
      textC('THE DAILY RECORD', 128, 8, '#f8f4e8', 9);
      textC('special edition', 128, 23, '#c8c0a8', 6);
      textC('SCOOP! ALL ' + N_ALL + ' SOURCES', 128, 48, '#202020', 9);
      textC('SECURED VIA FOIA', 128, 63, '#202020', 9);
      px(24, 80, 208, 1, '#888');
      textC('Journalist L. TOLEDO closes the', 128, 88, '#404040', 5);
      textC('notebook: every wild document', 128, 97, '#404040', 5);
      textC('is now on the public record.', 128, 106, '#404040', 5);
      DEX.forEach((d, i) => {
        const x = 18 + i * 25;
        if (d.sprite) g.drawImage(d.sprite, x, 118, 22, 22);
        else g.drawImage(imgGovRecord, x, 118, 22, 22);
      });
      if (Math.floor(game.winT * 2) % 2) textC('CASE CLOSED!', 128, 148, '#c83828', 8);
      frame9(28, 162, 116, 24, { bg: '#c84838', edge: '#f0a890', dark: '#802818' });
      textC('EXIT TO SITE', 86, 170, '#fff', 6);
      zone(28, 162, 116, 24, 'win', 'exit');
      frame9(150, 162, 80, 24, { bg: '#385888', edge: '#88a8d8', dark: '#182848' });
      textC('PLAY ON', 190, 170, '#fff', 6);
      zone(150, 162, 80, 24, 'win', 'stay');
    }

    function updateWin() {
      const p = popPress();
      if (p && p.act === 'win') {
        if (p.data === 'exit') window.location.href = 'index.html';
        else { game.caught = {}; game.hp = game.maxhp; game.coffee = 3; game.state = 'world'; playMusic(mGrass); }
      } else if (isA(p)) { window.location.href = 'index.html'; }
    }

    /* =====================================================================
       LOOP
       ===================================================================== */
    let last = 0;
    function loop(ts) {
      const dt = Math.min(.05, (ts - last) / 1000 || 0);
      last = ts;
      game.animClock += dt;
      g.clearRect(0, 0, 256, 192);

      if (game.state === 'title') { updateTitle(); drawTitle(dt); }
      else if (game.state === 'world') { updateWorld(dt); drawWorld(); }
      else if (game.state === 'dex') { updateDex(); drawDex(); }
      else if (game.state === 'battle') {
        updateBattle(dt);
        if (game.state === 'battle' && game.battle) drawBattle();
      }
      else if (game.state === 'win') { updateWin(); drawWin(dt); }

      requestAnimationFrame(loop);
    }

    // inicia quando a fonte carregar OU após 1.2s (não travar o jogo se a fonte demorar)
    Promise.race([
      document.fonts.load('8px "Press Start 2P"'),
      new Promise(r => setTimeout(r, 1200))
    ]).then(() => requestAnimationFrame(loop));

    /* hooks de teste */
    window.__game = game;
    window.__startBattle = i => startBattle(DEX[i]);
  </script>
</body>

</html>
